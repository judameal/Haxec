<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goleadores — Haxec Esport</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .btn-filter {
      background: var(--surface);
      border: 2px solid var(--border);
      padding: 10px 20px;
      border-radius: 10px;
      font-family: var(--font-head);
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-filter.active {
      background: var(--black);
      color: var(--accent);
      border-color: var(--accent);
    }
    .grid-players {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .player-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      transition: all 0.2s;
    }
    .player-card:hover { transform: translateY(-3px); border-color: var(--accent); }
    .player-photo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: var(--surface2); }
    .player-info h3 { margin: 0; font-family: var(--font-head); font-size: 1.1rem; }
    .player-info p { margin: 2px 0; color: var(--muted); font-size: 0.85rem; font-weight: 600; }
    .player-stats { margin-left: auto; text-align: center; }
    .stat-box { background: var(--black); color: var(--accent); padding: 5px 12px; border-radius: 8px; font-family: var(--font-head); font-weight: 900; font-size: 1.2rem; }
    .stat-label { font-size: 0.6rem; text-transform: uppercase; color: var(--muted); margin-top: 4px; font-weight: 800; }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="https://assets.football-logos.cc/logos/ecuador/512x512/liga-pro-serie-a.9a546764.png" alt="Haxec">
      <h1>Estadísticas <span>Jugadores</span></h1>
    </div>
    <div class="nav-buttons">
        <button onclick="window.location.href='/haxball.html'">Atrás</button>
    </div>
  </header>

  <div class="admin-container">
    <h1 class="admin-title">Tabla de Goleadores</h1>
    
    <div class="filter-bar">
        <button class="btn-filter active" onclick="filtrar('goles')">Global</button>
        <button class="btn-filter" onclick="filtrar('goles_liga')">LigaPro</button>
        <button class="btn-filter" onclick="filtrar('goles_copa')">Copa Ecuador</button>
        <button class="btn-filter" onclick="filtrar('goles_supercopa')">Supercopa</button>
    </div>

    <div id="jugadoresGrid" class="grid-players">
      <!-- Cargando... -->
    </div>
  </div>

  <script>
    const API = "/api/index?ruta=jugadores";
    let _jugadores = [];
    let _filtroActual = "goles";

    async function cargar() {
      const res = await fetch(API);
      _jugadores = await res.json();
      render();
    }

    function filtrar(campo) {
        _filtroActual = campo;
        document.querySelectorAll(".btn-filter").forEach(btn => {
            btn.classList.remove("active");
            if (btn.innerText.toLowerCase().includes(campo.replace("goles_","").replace("goles","global"))) {
                // Pequeño hack para la clase active
            }
        });
        // Actualizar botones visualmente
        const btns = document.querySelectorAll(".btn-filter");
        if (campo === "goles") btns[0].classList.add("active");
        if (campo === "goles_liga") btns[1].classList.add("active");
        if (campo === "goles_copa") btns[2].classList.add("active");
        if (campo === "goles_supercopa") btns[3].classList.add("active");
        
        render();
    }

    function render() {
      const container = document.getElementById("jugadoresGrid");
      container.innerHTML = "";

      // Ordenar por el filtro actual
      const sorted = [..._jugadores].sort((a,b) => (b[_filtroActual] || 0) - (a[_filtroActual] || 0));
      
      // Solo mostrar los que tienen al menos 1 gol en ese filtro
      const filtrados = sorted.filter(j => (j[_filtroActual] || 0) > 0);

      if (!filtrados.length) {
          container.innerHTML = "<p style='text-align:center; grid-column:1/-1; opacity:0.5;'>No hay goles registrados en esta categoría aún.</p>";
          return;
      }

      filtrados.forEach(j => {
        const card = document.createElement("div");
        card.className = "player-card";
        card.innerHTML = `
          <img class="player-photo" src="${j.foto || 'img/default-player.png'}" onerror="this.src='https://ui-avatars.com/api/?name=${j.nombre}'">
          <div class="player-info">
            <h3>${j.nombre}</h3>
            <p>${j.equipo}</p>
          </div>
          <div class="player-stats">
            <div class="stat-box">${j[_filtroActual] || 0}</div>
            <div class="stat-label">GOLES</div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    cargar();
  </script>
</body>
</html>
