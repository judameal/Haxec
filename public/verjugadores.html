<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jugadores — Haxec Esport</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f4f6f8;
      font-family: 'DM Sans', sans-serif;
      color: #111;
    }

    /* ── BOTÓN VOLVER ── */
    .back-btn {
      position: fixed;
      top: 0; right: 0;
      z-index: 200;
      height: 70px;
      padding: 0 28px;
      background: transparent;
      border: none;
      border-left: 1.5px solid rgba(255,255,255,.08);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: background .15s, color .15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-btn:hover { background: rgba(34,197,94,.15); color: #22c55e; }

    /* ── CONTAINER ── */
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 36px 24px 60px;
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 3px;
      color: #111;
      margin-bottom: 20px;
    }

    /* ── BÚSQUEDA ── */
    .search-wrap {
      position: relative;
      margin-bottom: 28px;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      width: 18px;
      height: 18px;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 13px 16px 13px 42px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      background: #fff;
      color: #111;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .search-input:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34,197,94,.1);
    }
    .search-input::placeholder { color: #bbb; }

    /* ── LISTA DE RESULTADOS ── */
    .players-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .player-row {
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s, transform .15s;
    }
    .player-row:hover {
      border-color: #22c55e;
      box-shadow: 0 4px 16px rgba(34,197,94,.1);
      transform: translateX(3px);
    }

    .player-row-logo {
      width: 32px;
      height: 32px;
      object-fit: contain;
      border-radius: 6px;
      background: #f4f6f8;
      padding: 2px;
      flex-shrink: 0;
    }
    .player-row-logo-placeholder {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: #f0f0f0;
      flex-shrink: 0;
    }

    .player-row-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #111;
      flex: 1;
    }
    .player-row-team {
      font-size: 0.78rem;
      color: #aaa;
      font-weight: 400;
    }

    .player-row-grl {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 1px;
      color: #22c55e;
      min-width: 36px;
      text-align: right;
    }

    /* ── LOADING / EMPTY ── */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: #bbb;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #e2e8f0;
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════════
       OVERLAY + CARTA FIFA
    ══════════════════════════════════════════ */
    .carta-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(10px);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .carta-overlay.open { display: flex; }

    .carta-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .carta-close {
      background: rgba(255,255,255,.1);
      border: 1.5px solid rgba(255,255,255,.25);
      color: rgba(255,255,255,.8);
      width: 36px; height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      align-self: flex-end;
    }
    .carta-close:hover { border-color: #22c55e; color: #22c55e; }

    /* ── CARTA BASE ── */
    .fifa-card {
      width: 280px;
      border-radius: 20px;
      overflow: hidden;
      animation: cardPop .35s cubic-bezier(.34,1.56,.64,1) both;
      position: relative;
    }

    @keyframes cardPop {
      from { opacity: 0; transform: scale(.7) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ══ BRONCE (0-69) ══ */
    .card-bronce {
      background: linear-gradient(160deg, #c8956c 0%, #8b5e3c 50%, #6b3f20 100%);
      box-shadow: 0 20px 50px rgba(139,94,60,.4);
      border: 2px solid #a0704a;
    }
    .card-bronce .card-top { background: rgba(0,0,0,.3); }
    .card-bronce .card-rating { color: #f0c9a0; }
    .card-bronce .card-label { color: rgba(240,201,160,.7); }
    .card-bronce .card-name-band { background: rgba(0,0,0,.25); border-top: 1px solid rgba(240,201,160,.2); }
    .card-bronce .card-player-name { color: #111; font-family: 'Bebas Neue', sans-serif; letter-spacing: 3px; }
    .card-bronce .card-dorsal { color: rgba(240,201,160,.8); }
    .card-bronce .card-stats { background: rgba(0,0,0,.2); border-top: 1px solid rgba(240,201,160,.15); }
    .card-bronce .stat-val { color: #111; }
    .card-bronce .stat-lbl { color: rgba(240,201,160,.8); }
    .card-bronce .card-stat { border-color: rgba(240,201,160,.15); }

    /* ══ PLATA (70-79) ══ */
    .card-plata {
      background: linear-gradient(160deg, #e8e8e8 0%, #b0b0b0 50%, #888 100%);
      box-shadow: 0 20px 50px rgba(136,136,136,.4);
      border: 2px solid #c0c0c0;
    }
    .card-plata .card-top { background: rgba(0,0,0,.2); }
    .card-plata .card-rating { color: #333; }
    .card-plata .card-label { color: rgba(50,50,50,.6); }
    .card-plata .card-name-band { background: rgba(255,255,255,.2); border-top: 1px solid rgba(255,255,255,.3); }
    .card-plata .card-player-name { color: #111; font-family: 'Bebas Neue', sans-serif; letter-spacing: 3px; }
    .card-plata .card-dorsal { color: #555; }
    .card-plata .card-stats { background: rgba(0,0,0,.1); border-top: 1px solid rgba(255,255,255,.2); }
    .card-plata .stat-val { color: #111; }
    .card-plata .stat-lbl { color: #555; }
    .card-plata .card-stat { border-color: rgba(0,0,0,.1); }

    /* ══ ORO (80-89) ══ */
    .card-oro {
      background: linear-gradient(160deg, #ffe066 0%, #d4a017 50%, #b8860b 100%);
      box-shadow: 0 20px 60px rgba(212,160,23,.5);
      border: 2px solid #d4a017;
    }
    .card-oro .card-top { background: rgba(0,0,0,.25); }
    .card-oro .card-rating { color: #fff8e1; }
    .card-oro .card-label { color: rgba(255,248,225,.65); }
    .card-oro .card-name-band { background: rgba(0,0,0,.2); border-top: 1px solid rgba(255,248,225,.2); }
    .card-oro .card-player-name { color: #111; font-family: 'Bebas Neue', sans-serif; letter-spacing: 3px; }
    .card-oro .card-dorsal { color: rgba(255,248,225,.8); }
    .card-oro .card-stats { background: rgba(0,0,0,.15); border-top: 1px solid rgba(255,248,225,.15); }
    .card-oro .stat-val { color: #111; }
    .card-oro .stat-lbl { color: rgba(255,248,225,.85); }
    .card-oro .card-stat { border-color: rgba(255,248,225,.15); }

    /* ══ LEGENDARIA (90-99) ══ */
    .card-legend {
      background: linear-gradient(160deg, #1a0533 0%, #2d1b69 35%, #1a0533 70%, #0a1628 100%);
      box-shadow: 0 0 40px rgba(139,92,246,.5), 0 20px 60px rgba(0,0,0,.6);
      border: 2px solid #d4a017;
      position: relative;
    }
    .card-legend::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 22px;
      background: linear-gradient(135deg, #d4a017, #8b5cf6, #3b82f6, #d4a017);
      z-index: -1;
      animation: borderGlow 3s linear infinite;
      background-size: 300% 300%;
    }
    @keyframes borderGlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .card-legend .card-top { background: rgba(0,0,0,.4); }
    .card-legend .card-rating { color: #d4a017; text-shadow: 0 0 20px rgba(212,160,23,.6); }
    .card-legend .card-label { color: rgba(212,160,23,.7); }
    .card-legend .card-name-band { background: rgba(0,0,0,.4); border-top: 1px solid rgba(212,160,23,.3); }
    .card-legend .card-player-name { color: #d4a017; font-family: 'Bebas Neue', sans-serif; letter-spacing: 3px; text-shadow: 0 0 12px rgba(212,160,23,.4); }
    .card-legend .card-dorsal { color: rgba(212,160,23,.7); }
    .card-legend .card-stats { background: rgba(0,0,0,.35); border-top: 1px solid rgba(212,160,23,.2); }
    .card-legend .stat-val { color: #d4a017; text-shadow: 0 0 8px rgba(212,160,23,.3); }
    .card-legend .stat-lbl { color: rgba(139,92,246,.9); }
    .card-legend .card-stat { border-color: rgba(212,160,23,.15); }

    /* ── PARTES COMUNES DE LA CARTA ── */
    .card-top {
      padding: 16px 18px 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .card-rating {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.4rem;
      line-height: 1;
      letter-spacing: -1px;
    }
    .card-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 2px;
      margin-top: 2px;
    }
    .card-team-logo {
      width: 38px;
      height: 38px;
      object-fit: contain;
      border-radius: 6px;
    }

    /* Foto del jugador sin marco */
    .card-photo-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 10px 0 0;
    }
    .card-photo {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
    }
    .card-initials-big {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(0,0,0,.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      color: rgba(255,255,255,.6);
    }

    /* Nombre */
    .card-name-band {
      width: 100%;
      text-align: center;
      padding: 12px 16px 10px;
      margin-top: 10px;
    }
    .card-player-name {
      font-size: 1.05rem;
      font-weight: 900;
      text-transform: uppercase;
    }
    .card-dorsal {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 2px;
      margin-top: 2px;
    }

    /* Stats */
    .card-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      padding: 6px 16px 18px;
    }
    .card-stat {
      padding: 10px 4px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      border-right: 1px solid;
      border-bottom: 1px solid;
    }
    .card-stat:nth-child(3),
    .card-stat:nth-child(6) { border-right: none; }
    .card-stat:nth-child(4),
    .card-stat:nth-child(5),
    .card-stat:nth-child(6) { border-bottom: none; }

    .stat-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      line-height: 1;
    }
    .stat-lbl {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 1.5px;
    }

    /* ── MODAL GRL ── */
    .grl-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(6px);
      z-index: 1100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .grl-modal-overlay.open { display: flex; }
    .grl-modal-box {
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 16px;
      padding: 28px 24px 22px;
      width: 100%;
      max-width: 300px;
      box-shadow: 0 20px 60px rgba(0,0,0,.15);
    }
    .grl-modal-box h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 3px;
      color: #111;
      border-bottom: 2px solid #22c55e;
      padding-bottom: 10px;
      margin-bottom: 16px;
    }
    .grl-modal-box label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 6px;
    }
    .grl-input {
      width: 100%;
      text-align: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem;
      font-weight: 900;
      color: #22c55e;
      background: #111;
      border: 2px solid #22c55e;
      border-radius: 10px;
      padding: 10px;
      outline: none;
      margin-bottom: 16px;
    }
    .grl-modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .btn-grl-cancel {
      background: transparent;
      border: 1.5px solid #e2e8f0;
      color: #666;
      padding: 11px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all .18s;
    }
    .btn-grl-cancel:hover { border-color: #ef4444; color: #ef4444; }
    .btn-grl-save {
      background: #111;
      border: none;
      color: #fff;
      padding: 11px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 2px;
      transition: all .18s;
    }
    .btn-grl-save:hover { background: #22c55e; color: #000; }

    .btn-edit-grl {
      display: block;
      width: calc(100% - 36px);
      margin: 10px 18px 14px;
      padding: 9px;
      background: transparent;
      border: 1px solid rgba(255,255,255,.2);
      color: rgba(255,255,255,.7);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      transition: all .2s;
    }
    .btn-edit-grl:hover { background: rgba(255,255,255,.1); color: #fff; }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 18px;
      font-size: .75rem;
      color: #fff;
      background: #111;
      border-top: 2px solid #22c55e;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="img/logo.png" alt="Haxec">
    <h1>Haxec <span>Esport</span></h1>
  </div>
</header>

<button class="back-btn" onclick="window.location.href='/haxball.html'">⬅ Volver</button>

<div class="container">
  <h1 class="page-title">Jugadores</h1>

  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Buscar jugador o equipo..." oninput="filtrarJugadores()">
  </div>

  <div id="loadingState" class="state-msg">
    <div class="spinner"></div>
    Cargando jugadores...
  </div>

  <div id="playersList" class="players-list" style="display:none;"></div>
  <div id="emptyState" class="state-msg" style="display:none;">No hay jugadores registrados.</div>
</div>

<!-- OVERLAY CARTA -->
<div class="carta-overlay" id="cartaOverlay" onclick="cerrarCarta(event)">
  <div class="carta-wrapper">
    <button class="carta-close" onclick="cerrarCartaBtn()">✕</button>
    <div class="fifa-card" id="fifaCard"></div>
  </div>
</div>

<!-- MODAL GRL -->
<div class="grl-modal-overlay" id="grlModal" onclick="if(event.target===this)cerrarGrlModal()">
  <div class="grl-modal-box">
    <h3>Editar GRL</h3>
    <label>Global Rating (1 – 99)</label>
    <input class="grl-input" type="number" id="grlInput" min="1" max="99" placeholder="––">
    <div class="grl-modal-actions">
      <button class="btn-grl-cancel" onclick="cerrarGrlModal()">Cancelar</button>
      <button class="btn-grl-save" onclick="guardarGrl()">Guardar</button>
    </div>
  </div>
</div>

<footer>
  <p>© 2026 Haxec Esport — Hecho por Judameal</p>
</footer>

<script src="js/app.js"></script>
<script>
var todosLosJugadores = [];
var todosLosEquipos   = [];
var jugadorActivo     = null;
var esAdmin           = false;

function checkAdmin() {
  try {
    const u = JSON.parse(localStorage.getItem("user") || "null");
    esAdmin = u && (u.role === "admin" || u.isAdmin === true || u.username === "admin");
  } catch { esAdmin = false; }
}

async function init() {
  checkAdmin();
  const [jugadores, equipos] = await Promise.all([
    fetch("/api/jugadores").then(r => r.json()),
    fetch("/api/teams").then(r => r.json())
  ]);
  todosLosJugadores = jugadores;
  todosLosEquipos   = equipos;
  document.getElementById("loadingState").style.display = "none";
  renderLista(jugadores);
}

/* ── Determinar rareza ── */
function getRareza(grl) {
  if (grl == null || grl === "—") return "bronce";
  const n = Number(grl);
  if (n >= 90) return "legend";
  if (n >= 80) return "oro";
  if (n >= 70) return "plata";
  return "bronce";
}

/* ── Render lista simple ── */
function renderLista(jugadores) {
  const list  = document.getElementById("playersList");
  const empty = document.getElementById("emptyState");
  list.innerHTML = "";

  if (!jugadores.length) {
    list.style.display = "none";
    empty.style.display = "block";
    return;
  }
  list.style.display = "flex";
  empty.style.display = "none";

  jugadores.forEach(j => {
    const equipo = todosLosEquipos.find(t => t.nombre.toLowerCase() === (j.equipo || "").toLowerCase());
    const grl    = j.grl != null ? j.grl : "—";
    const rareza = getRareza(j.grl);

    const logoHTML = equipo
      ? `<img class="player-row-logo" src="${equipo.logo}" alt="${equipo.nombre}">`
      : `<div class="player-row-logo-placeholder"></div>`;

    const grlColors = {
      bronce: "#b87333",
      plata:  "#888",
      oro:    "#d4a017",
      legend: "#8b5cf6"
    };

    const row = document.createElement("div");
    row.className = "player-row";
    row.innerHTML = `
      ${logoHTML}
      <div style="flex:1;min-width:0;">
        <div class="player-row-name">${j.nombre}</div>
        <div class="player-row-team">${equipo ? equipo.nombre : "Sin equipo"}</div>
      </div>
      <div class="player-row-grl" style="color:${grlColors[rareza]};">${grl}</div>
    `;
    row.addEventListener("click", () => abrirCarta(j));
    list.appendChild(row);
  });
}

/* ── Filtrar ── */
function filtrarJugadores() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  if (!q) { renderLista(todosLosJugadores); return; }
  renderLista(todosLosJugadores.filter(j =>
    j.nombre.toLowerCase().includes(q) ||
    (j.equipo || "").toLowerCase().includes(q)
  ));
}

/* ── Abrir carta FIFA ── */
function abrirCarta(j) {
  jugadorActivo = j;
  const equipo  = todosLosEquipos.find(t => t.nombre.toLowerCase() === (j.equipo || "").toLowerCase());
  const grl     = j.grl != null ? j.grl : "—";
  const rareza  = getRareza(j.grl);
  const clase   = `card-${rareza}`;

  const fotoHTML = j.foto
    ? `<img class="card-photo" src="${j.foto}" alt="${j.nombre}">`
    : `<div class="card-initials-big">${iniciales(j.nombre)}</div>`;

  const teamLogoHTML = equipo
    ? `<img class="card-team-logo" src="${equipo.logo}" alt="${equipo.nombre}">`
    : "";

  const editGrlBtn = esAdmin
    ? `<button class="btn-edit-grl" onclick="abrirGrlModal()">✎ Editar GRL</button>`
    : "";

  /* Stats con colores semánticos para AM y RJ */
  const amarillaColor = rareza === "legend" ? "#d4a017" : (rareza === "oro" ? "#92400e" : "#f59e0b");
  const rojaColor     = "#ef4444";

  const card = document.getElementById("fifaCard");
  card.className = `fifa-card ${clase}`;
  card.innerHTML = `
    <div class="card-top">
      <div>
        <div class="card-rating">${grl}</div>
        <div class="card-label">GRL</div>
      </div>
      ${teamLogoHTML}
    </div>

    <div class="card-photo-wrap">${fotoHTML}</div>

    <div class="card-name-band">
      <div class="card-player-name">${j.nombre}</div>
      <div class="card-dorsal">${j.dorsal}</div>
    </div>

    ${editGrlBtn}

    <div class="card-stats">
      <div class="card-stat">
        <span class="stat-val">${j.goles ?? 0}</span>
        <span class="stat-lbl">GOL</span>
      </div>
      <div class="card-stat">
        <span class="stat-val">${j.asistencias ?? 0}</span>
        <span class="stat-lbl">AST</span>
      </div>
      <div class="card-stat">
        <span class="stat-val">${j.mvp ?? 0}</span>
        <span class="stat-lbl">MVP</span>
      </div>
      <div class="card-stat">
        <span class="stat-val">${j.vallas_imbatidas ?? 0}</span>
        <span class="stat-lbl">VI</span>
      </div>
      <div class="card-stat">
        <span class="stat-val" style="color:${amarillaColor};">${j.amarillas ?? 0}</span>
        <span class="stat-lbl" style="color:${amarillaColor};">AM</span>
      </div>
      <div class="card-stat">
        <span class="stat-val" style="color:${rojaColor};">${j.rojas ?? 0}</span>
        <span class="stat-lbl" style="color:${rojaColor};">RJ</span>
      </div>
    </div>
  `;

  document.getElementById("cartaOverlay").classList.add("open");
}

function cerrarCarta(e) {
  if (e.target === document.getElementById("cartaOverlay")) cerrarCartaBtn();
}
function cerrarCartaBtn() {
  document.getElementById("cartaOverlay").classList.remove("open");
  jugadorActivo = null;
}

/* ── Modal GRL ── */
function abrirGrlModal() {
  if (!esAdmin) return;
  document.getElementById("grlInput").value = jugadorActivo.grl ?? "";
  document.getElementById("grlModal").classList.add("open");
}
function cerrarGrlModal() {
  document.getElementById("grlModal").classList.remove("open");
}
async function guardarGrl() {
  const val = parseInt(document.getElementById("grlInput").value);
  if (isNaN(val) || val < 1 || val > 99) { alert("El GRL debe ser entre 1 y 99"); return; }
  const res = await fetch("/api/jugadores-grl", {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id: jugadorActivo._id, grl: val })
  });
  if (res.ok) {
    jugadorActivo.grl = val;
    const idx = todosLosJugadores.findIndex(j => j._id === jugadorActivo._id);
    if (idx !== -1) todosLosJugadores[idx].grl = val;
    cerrarGrlModal();
    abrirCarta(jugadorActivo);
    renderLista(todosLosJugadores);
  } else { alert("Error al guardar el GRL"); }
}

function iniciales(nombre) {
  return String(nombre).split(" ").map(p => p[0]).join("").toUpperCase().slice(0, 2);
}

window.filtrarJugadores = filtrarJugadores;
window.cerrarCarta      = cerrarCarta;
window.cerrarCartaBtn   = cerrarCartaBtn;
window.abrirGrlModal    = abrirGrlModal;
window.cerrarGrlModal   = cerrarGrlModal;
window.guardarGrl       = guardarGrl;

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
