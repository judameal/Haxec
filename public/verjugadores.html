<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LigaPro Ecuabet — Haxec Esport</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <style>
    /* ── ANIMATIONS ── */
    @keyframes bronzeIn  { from{opacity:0;transform:translateY(40px) scale(.9)} to{opacity:1;transform:none} }
    @keyframes silverIn  { from{opacity:0;transform:translateX(-60px)} to{opacity:1;transform:none} }
    @keyframes goldIn    { from{opacity:0;transform:scale(.5) rotate(-8deg)} to{opacity:1;transform:none} }
    @keyframes eliteSpinIn { from{opacity:0;transform:perspective(1000px) rotateY(-1080deg) scale(0.3)} to{opacity:1;transform:perspective(1000px) rotateY(0deg) scale(1)} }
    @keyframes purpleIn  { from{opacity:0;transform:scale(1.3)} to{opacity:1;transform:scale(1)} }
    @keyframes shimmer   { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
    @keyframes floatUp   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes starGlow  { 0%,100%{text-shadow:0 0 6px gold} 50%{text-shadow:0 0 18px gold,0 0 32px #ffaa00} }

    /* ── PAGE HEADER ── */
    .page-hero {
      text-align:center; padding:40px 20px 30px;
      background:var(--black); border-radius:16px;
      margin-bottom:30px; border-bottom:3px solid var(--accent);
    }
    .page-hero h1 { font-family:var(--font-head); font-size:clamp(1.8rem,4vw,2.8rem); font-weight:900; color:#fff; letter-spacing:4px; text-transform:uppercase; margin:0 0 4px; }
    .page-hero h1 span { color:var(--accent); }
    .page-hero p { color:rgba(255,255,255,.4); font-size:.75rem; letter-spacing:3px; text-transform:uppercase; font-family:var(--font-head); }

    /* ── SEARCH + FILTERS ── */
    .controls { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; align-items:center; }
    .search-wrap { position:relative; flex:1; min-width:200px; }
    .search-wrap input {
      width:100%; box-sizing:border-box;
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:10px; padding:10px 14px 10px 38px;
      font-family:var(--font-body); font-size:.9rem; color:var(--text);
      transition:border-color .2s;
    }
    .search-wrap input:focus { outline:none; border-color:var(--accent); }
    .search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:.95rem; pointer-events:none; }
    .tier-filters { display:flex; gap:6px; flex-wrap:wrap; }
    .btn-tier {
      padding:8px 14px; border-radius:8px; border:1.5px solid var(--border);
      background:var(--surface2); color:var(--muted);
      font-family:var(--font-head); font-size:.7rem; font-weight:800;
      letter-spacing:1.5px; text-transform:uppercase; cursor:pointer;
      transition:all .2s;
    }
    .btn-tier.active, .btn-tier:hover { background:var(--black); color:var(--accent); border-color:var(--accent); }

    /* ── PLAYER GRID ── */
    .players-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }
    .player-row {
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:12px; padding:14px 16px;
      display:flex; align-items:center; gap:12px;
      cursor:pointer; transition:all .2s;
      animation: bronzeIn .35s ease both;
    }
    .player-row:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 6px 20px var(--accent-glow); }
    .player-row .rank { font-family:var(--font-head); font-size:.7rem; font-weight:900; color:var(--muted); min-width:22px; }
    .player-row .p-avatar { width:42px; height:42px; border-radius:50%; object-fit:cover; border:2px solid var(--border); flex-shrink:0; }
    .player-row .p-info { flex:1; min-width:0; }
    .player-row .p-name { font-family:var(--font-head); font-size:.9rem; font-weight:800; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .player-row .p-team { font-size:.72rem; color:var(--muted); font-weight:600; }
    .grl-pill {
      font-family:var(--font-head); font-size:.78rem; font-weight:900;
      padding:3px 10px; border-radius:20px; flex-shrink:0;
    }
    .grl-bronze { background:#cd7f32; color:#fff; }
    .grl-silver { background:#9ea3a8; color:#fff; }
    .grl-gold   { background:linear-gradient(135deg,#d4a017,#f5c518); color:#111; }
    .grl-elite  { background:linear-gradient(135deg,#6b21a8,#9333ea); color:#ffd700; border:1px solid #ffd700; }
    .grl-none   { background:var(--surface3); color:var(--muted); }

    /* ── OVERLAY ── */
    #cardOverlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.8); backdrop-filter:blur(8px);
      z-index:9999; align-items:center; justify-content:center; padding:16px;
    }
    #cardOverlay.open { display:flex; }

    /* ── FIFA CARD ── */
    .fifa-card {
      position:relative; width:300px; border-radius:20px;
      padding:28px 22px 24px; text-align:center;
      box-shadow:0 30px 80px rgba(0,0,0,.6);
      overflow:hidden;
    }
    /* Tiers */
    .card-bronze { background:linear-gradient(160deg,#f3d3a8,#c88e54,#f3d3a8); border:2px solid #a35d1f; animation:bronzeIn .4s cubic-bezier(.34,1.3,.64,1) both; }
    .card-silver { background:linear-gradient(160deg,#f0f2f5,#c0c5cc,#f0f2f5); border:2px solid #9ea3a8; animation:silverIn .4s cubic-bezier(.34,1.3,.64,1) both; }
    .card-gold   { background:linear-gradient(160deg,#fff2c8,#f5c518,#fff2c8); border:2px solid #d4a017; animation:goldIn .5s cubic-bezier(.34,1.3,.64,1) both; }
    .card-elite  {
      background:linear-gradient(160deg,#f2dfff,#b066ff,#f2dfff);
      border:2px solid #ffd700;
      animation:eliteSpinIn 1.5s cubic-bezier(0.1, 0.8, 0.2, 1) both;
    }
    .card-elite::before {
      content:'';position:absolute;inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,215,0,.3),transparent);
      background-size:200% 100%; animation:shimmer 2.5s infinite;
      pointer-events:none;
    }

    .card-tier-label {
      font-family:var(--font-head); font-size:.6rem; font-weight:900;
      letter-spacing:4px; text-transform:uppercase; margin-bottom:12px;
      color:#000 !important;
    }
    .card-elite .card-tier-label { animation:none; }

    .card-grl {
      font-family:var(--font-head); font-size:3.2rem; font-weight:900;
      line-height:1; margin-bottom:4px; color:#000 !important;
    }

    .card-pos { font-family:var(--font-head); font-size:.65rem; font-weight:800; letter-spacing:3px; opacity:.8; color:#000; margin-bottom:14px; }

    .card-avatar-wrap {
      width:110px; height:110px; border-radius:50%; overflow:hidden;
      margin:0 auto 14px; border:3px solid;
      animation:floatUp 3s ease-in-out infinite;
      box-shadow:0 8px 28px rgba(0,0,0,.5);
    }
    .card-bronze .card-avatar-wrap { border-color:#cd7f32; }
    .card-silver .card-avatar-wrap { border-color:#9ea3a8; }
    .card-gold   .card-avatar-wrap { border-color:#f5c518; box-shadow:0 8px 28px rgba(245,197,24,.3); }
    .card-elite  .card-avatar-wrap { border-color:#ffd700; box-shadow:0 8px 28px rgba(255,215,0,.5); }
    .card-avatar-wrap img { width:100%; height:100%; object-fit:cover; }

    .card-name { font-family:var(--font-head); font-size:1.15rem; font-weight:900; color:#000; letter-spacing:2px; text-transform:uppercase; margin-bottom:3px; }
    .card-team { font-size:.7rem; color:rgba(0,0,0,.7); font-family:var(--font-head); letter-spacing:2px; text-transform:uppercase; margin-bottom:16px; font-weight:800; }

    .card-divider { height:1px; margin:0 0 14px; opacity:.25; }
    .card-bronze .card-divider { background:#000; }
    .card-silver .card-divider { background:#000; }
    .card-gold   .card-divider { background:#000; }
    .card-elite  .card-divider { background:#000; }

    .card-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .stat-item { text-align:center; }
    .stat-val { font-family:var(--font-head); font-size:1.3rem; font-weight:900; color:#000; line-height:1; }
    .stat-key { font-size:.55rem; font-family:var(--font-head); font-weight:800; letter-spacing:1.5px; text-transform:uppercase; opacity:.7; color:#000; margin-top:2px; }

    .card-close {
      position:absolute; top:12px; right:14px;
      background:rgba(0,0,0,.1); border:1px solid rgba(0,0,0,.2);
      color:rgba(0,0,0,.7); border-radius:50%; width:28px; height:28px;
      font-size:.8rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all .15s;
    }
    .card-close:hover { background:rgba(0,0,0,.25); color:#000; }

    /* Admin GRL btn */
    .btn-set-grl {
      margin-top:14px; width:100%;
      background:rgba(0,0,0,.08); border:1px solid rgba(0,0,0,.2);
      color:rgba(0,0,0,.7); border-radius:8px; padding:8px;
      font-family:var(--font-head); font-size:.72rem; font-weight:800;
      letter-spacing:1px; text-transform:uppercase; cursor:pointer;
      transition:all .2s;
    }
    .btn-set-grl:hover { background:var(--accent); color:var(--black); border-color:var(--accent); }

    /* Stars */
    .card-stars { font-size:.9rem; margin-bottom:6px; letter-spacing:2px; }

    /* Empty */
    .empty-state { text-align:center; padding:60px 20px; color:var(--muted); grid-column:1/-1; }
    .empty-state .icon { font-size:3rem; margin-bottom:10px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="https://assets.football-logos.cc/logos/ecuador/512x512/liga-pro-serie-a.9a546764.png" alt="Haxec">
      <h1>Haxec <span>Esport</span></h1>
    </div>
    <div class="nav-buttons">
      <button onclick="window.location.href='/haxball.html'">Atrás</button>
    </div>
  </header>

  <div class="admin-container">
    <div class="page-hero">
      <h1>LigaPro <span>Ecuabet</span></h1>
      <p>Cartas · Estadísticas · Rankings</p>
    </div>

    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="searchInput" type="text" placeholder="Buscar jugador o equipo..." oninput="render()">
      </div>
    </div>

    <div class="players-grid" id="grid"></div>
  </div>

  <!-- CARD OVERLAY -->
  <div id="cardOverlay" onclick="closeCard(event)">
    <div id="fifaCard" class="fifa-card"></div>
  </div>

  <script>
    const API_J = "/api/index?ruta=jugadores";
    const API_T = "/api/index?ruta=teams";
    let _jug = [], _teams = [], _tierFilter = "all", _isAdmin = false;

    const TIER = grl => {
      if (grl == null) return "none";
      if (grl >= 91) return "elite";
      if (grl >= 80) return "gold";
      if (grl >= 70) return "silver";
      return "bronze";
    };
    const TIER_LABEL = { elite:"Elite Morado", gold:"Carta Oro", silver:"Carta Plata", bronze:"Carta Bronce", none:"Sin Rating" };
    const STARS = grl => {
      if (grl == null) return "";
      if (grl >= 91) return "⭐⭐⭐⭐⭐";
      if (grl >= 80) return "⭐⭐⭐⭐";
      if (grl >= 70) return "⭐⭐⭐";
      return "⭐⭐";
    };

    async function init() {
      const u = JSON.parse(localStorage.getItem("user") || "null");
      _isAdmin = !!(u && u.role === "admin");
      const [rj, rt] = await Promise.all([
        fetch(API_J).then(r => r.json()),
        fetch(API_T).then(r => r.json())
      ]);
      _jug   = Array.isArray(rj) ? rj : [];
      _teams = Array.isArray(rt) ? rt : [];
      render();
    }

    function teamLogo(nombre) {
      return (_teams.find(t => t.nombre === nombre) || {}).logo || "";
    }

    function setTier(t, btn) {
      _tierFilter = t;
      document.querySelectorAll(".btn-tier").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    }

    function render() {
      const q = document.getElementById("searchInput").value.toLowerCase();
      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      let list = [..._jug];
      if (q) list = list.filter(j => j.nombre.toLowerCase().includes(q) || (j.equipo||"").toLowerCase().includes(q));
      if (_tierFilter !== "all") list = list.filter(j => TIER(j.grl) === _tierFilter);

      // Sort: grl desc, then goles desc
      list.sort((a,b) => (b.grl ?? -1) - (a.grl ?? -1) || (b.goles||0) - (a.goles||0));

      if (!list.length) {
        grid.innerHTML = `<div class="empty-state"><div class="icon">🎴</div><p>No se encontraron jugadores.</p></div>`;
        return;
      }

      list.forEach((j, i) => {
        const tier = TIER(j.grl);
        const div = document.createElement("div");
        div.className = "player-row";
        div.style.animationDelay = (i * 0.04) + "s";
        const logo = teamLogo(j.equipo);
        const grlPill = j.grl != null
          ? `<span class="grl-pill grl-${tier === "none" ? "none" : tier}">${j.grl}</span>`
          : `<span class="grl-pill grl-none">—</span>`;
        div.innerHTML = `
          <span class="rank">${i+1}</span>
          <img class="p-avatar" src="${j.foto || ''}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(j.nombre)}&background=1a1a1a&color=c9a84c&bold=true'" alt="">
          <div class="p-info">
            <div class="p-name">${j.nombre}</div>
            <div class="p-team">${logo ? `<img src="${logo}" width="14" style="vertical-align:middle;border-radius:2px;margin-right:4px;">` : ""}${j.equipo || "Sin equipo"}</div>
          </div>
          ${grlPill}`;
        div.onclick = () => openCard(j);
        grid.appendChild(div);
      });
    }

    function openCard(j) {
      const tier = TIER(j.grl);
      const logo = teamLogo(j.equipo);
      const grl  = j.grl != null ? j.grl : "—";
      const card = document.getElementById("fifaCard");
      card.className = "fifa-card card-" + (tier === "none" ? "bronze" : tier);

      const adminGrlBtn = _isAdmin
        ? `<button class="btn-set-grl" onclick="promptGRL('${j._id}')">⚙️ Asignar GRL</button>`
        : "";

      card.innerHTML = `
        <button class="card-close" onclick="closeCard()">✕</button>
        <div class="card-tier-label">${TIER_LABEL[tier]}</div>
        <div class="card-grl">${grl}</div>
        <div class="card-pos">${STARS(j.grl)}</div>
        <div class="card-avatar-wrap">
          <img src="${j.foto || ''}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(j.nombre)}&size=200&background=111&color=c9a84c&bold=true'" alt="${j.nombre}">
        </div>
        <div class="card-name">${j.nombre}</div>
        <div class="card-team">${logo ? `<img src="${logo}" width="16" style="vertical-align:middle;border-radius:3px;margin-right:5px;">` : ""}${j.equipo || "Sin equipo"}</div>
        <div class="card-divider"></div>
        <div class="card-stats">
          <div class="stat-item"><div class="stat-val">${j.goles||0}</div><div class="stat-key">Goles</div></div>
          <div class="stat-item"><div class="stat-val">${j.asistencias||0}</div><div class="stat-key">Asist.</div></div>
          <div class="stat-item"><div class="stat-val">${j.mvp||0}</div><div class="stat-key">MVPs</div></div>
          <div class="stat-item"><div class="stat-val">${j.amarillas||0}</div><div class="stat-key">🟨</div></div>
          <div class="stat-item"><div class="stat-val">${j.rojas||0}</div><div class="stat-key">🟥</div></div>
          <div class="stat-item"><div class="stat-val">${(j.goles||0)+(j.asistencias||0)}</div><div class="stat-key">G+A</div></div>
        </div>
        ${adminGrlBtn}`;

      document.getElementById("cardOverlay").classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeCard(e) {
      if (e && e.target !== document.getElementById("cardOverlay")) return;
      document.getElementById("cardOverlay").classList.remove("open");
      document.body.style.overflow = "";
    }

    async function promptGRL(id) {
      const val = prompt("Ingresa el GRL del jugador (0-100):");
      if (val === null) return;
      const n = parseInt(val);
      if (isNaN(n) || n < 0 || n > 100) { alert("Ingresa un número entre 0 y 100"); return; }
      const res = await fetch("/api/index?ruta=jugadores", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, grl: n })
      });
      if (res.ok) {
        const j = _jug.find(x => x._id === id);
        if (j) j.grl = n;
        document.getElementById("cardOverlay").classList.remove("open");
        document.body.style.overflow = "";
        render();
        // Re-open with updated data
        setTimeout(() => openCard(_jug.find(x => x._id === id)), 100);
      } else {
        alert("Error al guardar GRL");
      }
    }

    init();
  </script>
</body>
</html>
