<!DOCTYPE html>
<html>
<head>
  <title>Estadísticas</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="img/logo.png">
    <h1>Haxec <span>Esport</span></h1>
  </div>

  <div id="nav" class="nav-buttons"></div>
</header>

<div class="center">

  <div class="main-card">

    <h1 class="main-title">Estadísticas</h1>

    <button class="main-btn" onclick="goGoleadores()">GOLEADORES</button>
    <button class="main-btn" onclick="goAsistencias()">ASISTENCIAS</button>
    <button class="main-btn" onclick="goVallas()">VALLAS INVICTAS</button>
    <button class="main-btn" onclick="goMVP()">MVP</button>
    <button class="main-btn" onclick="goEquipo()">EQUIPO DE LA FECHA</button>

  </div>

</div>
<button class="back-btn" onclick="goBack()">VOLVER</button>
<footer>
  <p>© 2026 Haxec Esport — Hecho por Judameal</p>
</footer>

<script src="js/app.js"></script>

<script>
function goBack() {
  window.location.href = "/haxball.html";
}
const user = JSON.parse(localStorage.getItem("user"));
const nav = document.getElementById("nav");

if (user && user.role === "admin") {
  nav.innerHTML = `
    <button onclick="goAdmin()">Panel de Control</button>
    <button onclick="logout()">Cerrar sesión</button>
  `;
} else {
  nav.innerHTML = `
    <button onclick="logout()">Cerrar sesión</button>
  `;
}

function goAdmin() {
  window.location.href = "/dashboard.html";
}

/* 🔗 REDIRECCIONES */
function goGoleadores() {
  window.location.href = "/goleadores.html";
}

function goAsistencias() {
  window.location.href = "/asistencias.html";
}

function goVallas() {
  window.location.href = "/vallas.html";
}

function goMVP() {
  window.location.href = "/mvp.html";
}

function goEquipo() {
  window.location.href = "/equipo.html";
}
</script>

</body>
</html>
