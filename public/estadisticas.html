<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estadísticas — Haxec Esport</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .home-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px 80px;
      position: relative;
      z-index: 1;
    }

    .hero-eyebrow {
      font-family: var(--font-head);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeDown .45s ease .1s forwards;
    }

    .hero-title {
      font-family: var(--font-head);
      font-size: clamp(2rem, 6vw, 3.4rem);
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--black);
      text-align: center;
      line-height: 1;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeDown .45s ease .18s forwards;
    }

    .hero-title span { color: var(--accent); }

    .hero-sub {
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 1px;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeDown .45s ease .24s forwards;
    }

    .hero-divider {
      width: 44px;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 0 auto 36px;
      opacity: 0;
      animation: fadeDown .45s ease .3s forwards;
    }

    /* ── GRID 2x3 ── */
    .stats-menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 13px;
      width: 100%;
      max-width: 440px;
    }

    .menu-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 5px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 18px 16px;
      cursor: pointer;
      text-align: left;
      overflow: hidden;
      transition: border-color .22s, transform .22s, box-shadow .22s;
      opacity: 0;
    }

    .menu-btn:nth-child(1) { animation: fadeUp .42s ease .36s forwards; }
    .menu-btn:nth-child(2) { animation: fadeUp .42s ease .42s forwards; }
    .menu-btn:nth-child(3) { animation: fadeUp .42s ease .48s forwards; }
    .menu-btn:nth-child(4) { animation: fadeUp .42s ease .54s forwards; }
    .menu-btn:nth-child(5) { animation: fadeUp .42s ease .60s forwards; }
    .menu-btn:nth-child(6) { animation: fadeUp .42s ease .66s forwards; }

    .menu-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      z-index: 0;
      border-radius: inherit;
    }

    .menu-btn:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(34,197,94,.16);
    }

    .menu-btn:hover::after { transform: scaleX(1); }

    .menu-btn:hover .btn-icon,
    .menu-btn:hover .btn-label,
    .menu-btn:hover .btn-desc { color: var(--black); }

    .btn-icon {
      font-size: 1.3rem;
      position: relative;
      z-index: 1;
      transition: color .2s;
    }

    .btn-label {
      font-family: var(--font-head);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--black);
      position: relative;
      z-index: 1;
      transition: color .2s;
      line-height: 1;
    }

    .btn-desc {
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--muted);
      position: relative;
      z-index: 1;
      transition: color .2s;
      line-height: 1.3;
    }

    .back-btn {
      animation: fadeDown .4s ease .08s both;
    }

    @media (max-width: 400px) {
      .stats-menu-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="hex-mid"></div>

<header>
  <div class="logo">
    <img
    class="hero-logo-img"
    src="https://assets.football-logos.cc/logos/ecuador/512x512/liga-pro-serie-a.9a546764.png"
    alt="LigaPro Ecuabet"
  >
    <h1>LigaPro <span>Ecuabet</span></h1>
  </div>
  <div id="nav" class="nav-buttons"></div>
</header>

<div class="home-wrap">

  <p class="hero-eyebrow">LigaPro Ecuabet</p>
  <h1 class="hero-title">Estadís<span>ticas</span></h1>
  <p class="hero-sub">Selecciona una categoría</p>
  <div class="hero-divider"></div>

  <div class="stats-menu-grid">

    <button class="menu-btn" onclick="goGoleadores()">
      <span class="btn-icon">⚽</span>
      <span class="btn-label">Goleadores</span>
      <span class="btn-desc">Máximos anotadores</span>
    </button>

    <button class="menu-btn" onclick="goAsistencias()">
      <span class="btn-icon">👟</span>
      <span class="btn-label">Asistencias</span>
      <span class="btn-desc">Pases de gol</span>
    </button>

    <button class="menu-btn" onclick="goVallas()">
      <span class="btn-icon">🧤</span>
      <span class="btn-label">Vallas</span>
      <span class="btn-desc">Arcos invictos</span>
    </button>

    <button class="menu-btn" onclick="goMVP()">
      <span class="btn-icon">👑</span>
      <span class="btn-label">MVP</span>
      <span class="btn-desc">Mejores del partido</span>
    </button>

    <button class="menu-btn" onclick="goAmarillas()">
      <span class="btn-icon">🟨</span>
      <span class="btn-label">Amarillas</span>
      <span class="btn-desc">Tarjetas amarillas</span>
    </button>

    <button class="menu-btn" onclick="goRojas()">
      <span class="btn-icon">🟥</span>
      <span class="btn-label">Rojas</span>
      <span class="btn-desc">Tarjetas rojas</span>
    </button>

  </div>

</div>

<footer>
  <p>© 2026 Haxec Esport — Hecho por Judameal</p>
</footer>
<script>
  function goGoleadores() { window.location.href = "/goleadores.html"; }
  function goAsistencias() { window.location.href = "/asistencias.html"; }
  function goAmarillas()   { window.location.href = "/amarillas.html"; }
  function goRojas()       { window.location.href = "/rojas.html"; }
  function goVallas()      { window.location.href = "/vallas.html"; }
  function goMVP()         { window.location.href = "/mvp.html"; }
</script>

</body>
</html>
