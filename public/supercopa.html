<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supercopa Ecuador — Haxec Esport</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --super-gold: var(--accent);
      --super-bg: var(--bg);
    }

    body { background: var(--super-bg); color: var(--text); }

    .hero-super {
      text-align: center;
      padding: 60px 0;
      background: var(--black);
      border-radius: 20px;
      margin-bottom: 40px;
      border-bottom: 5px solid var(--super-gold);
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      position: relative;
      overflow: hidden;
    }

    .hero-super::before {
        content: '🏆';
        position: absolute;
        font-size: 15rem;
        opacity: 0.05;
        top: -20px;
        right: -20px;
    }

    .super-title {
      font-family: var(--font-head);
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: 6px;
      margin: 0;
      color: #fff;
      text-transform: uppercase;
      text-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .super-title span { color: var(--super-gold); }

    .actions-bar {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 35px;
    }

    .btn-action {
      font-family: var(--font-head);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 14px 35px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
      font-size: 1rem;
    }

    .btn-super { background: var(--super-gold); color: var(--black); }
    .btn-super:hover { transform: translateY(-3px) scale(1.05); filter: brightness(1.1); box-shadow: 0 10px 25px var(--accent-glow); }

    .btn-reset { background: #ef4444; color: #fff; }
    .btn-reset:hover { transform: translateY(-3px) scale(1.05); background: #dc2626; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3); }

    .bracket-wrap {
      max-width: 1100px;
      margin: 50px auto;
      display: flex;
      justify-content: center;
      gap: 60px;
      padding-bottom: 80px;
    }

    .round { display: flex; flex-direction: column; justify-content: center; gap: 40px; min-width: 300px; }
    .round-label {
      text-align: center;
      font-family: var(--font-head);
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--black);
      margin-bottom: 25px;
      letter-spacing: 3px;
      text-transform: uppercase;
      border-bottom: 3px solid var(--super-gold);
      padding-bottom: 10px;
    }

    .match-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      position: relative;
      transition: all 0.3s;
      box-shadow: 0 8px 25px rgba(0,0,0,0.06);
    }
    .match-card:hover { border-color: var(--super-gold); transform: scale(1.02); }

    .team { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
    .team img { width: 40px; height: 40px; object-fit: contain; }
    .team-name { font-weight: 700; font-size: 1.15rem; color: var(--text); }
    .score { font-family: var(--font-head); font-size: 2rem; font-weight: 900; color: var(--super-gold); min-width: 40px; text-align: center; }

    .play-icon {
      position: absolute;
      right: -20px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--black);
      color: var(--super-gold);
      border: 3px solid var(--super-gold);
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: all 0.2s;
      z-index: 10;
      font-size: 1.1rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .match-card:hover .play-icon { opacity: 1; right: -23px; }
    .play-icon:hover { background: var(--super-gold); color: var(--black); transform: translateY(-50%) scale(1.15); }

    .winner { color: var(--accent-dark); }
    .winner .team-name { color: var(--accent-dark); }
    .winner .score { color: var(--accent-dark); }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="https://assets.football-logos.cc/logos/ecuador/512x512/liga-pro-serie-a.9a546764.png" alt="Supercopa">
      <h1>Supercopa <span>Ecuador</span></h1>
    </div>
    <div class="nav-buttons">
        <button onclick="window.location.href='/haxball.html'">Menú Principal</button>
    </div>
  </header>

  <div class="hero-super">
    <h1 class="super-title">Super<span>copa</span> 2026</h1>
    <p style="color:rgba(255,255,255,0.5); font-weight: 600; letter-spacing: 1px;">EL TRONO DE LOS CAMPEONES</p>
    
    <div class="actions-bar">
        <button class="btn-action btn-super" onclick="generarSupercopa()">⚙️ Generar Cruces</button>
        <button class="btn-action btn-reset" onclick="resetSuper()">🗑️ Reiniciar Supercopa</button>
    </div>
  </div>

  <div class="bracket-wrap" id="bracket">
    <!-- Partidos aquí -->
  </div>

  <footer>
    <p>© 2026 Haxec Esport — Hecho por Judameal</p>
  </footer>

  <script>
    const API = "/api/index?ruta=supercopa_partidos";
    const API_COPA = "/api/index?ruta=copa_partidos";
    const API_TABLA = "/api/index?ruta=tabla";

    let _partidos = [];

    async function init() {
      const res = await fetch(API);
      _partidos = await res.json();
      render();
    }

    async function generarSupercopa() {
      if (_partidos.length > 0) {
          if (!confirm("Ya hay una Supercopa en curso. ¿Generar una nueva?")) return;
      }

      const [resCopa, resTabla] = await Promise.all([
        fetch(API_COPA).then(r => r.json()),
        fetch(API_TABLA).then(r => r.json())
      ]);

      const finalCopa = resCopa.find(m => m.round === "final");
      if (!finalCopa || !finalCopa.jugado) { alert("La Copa Ecuador aún no ha terminado. Necesitamos Campeón y Subcampeón."); return; }
      
      const campeonCopa = finalCopa.resultado.local > finalCopa.resultado.visitante ? finalCopa.local : finalCopa.visitante;
      const subcampeonCopa = finalCopa.resultado.local > finalCopa.resultado.visitante ? finalCopa.visitante : finalCopa.local;

      const tablaSorted = resTabla.sort((a,b) => (b.PTS-a.PTS) || (b.DG-a.DG));
      if (tablaSorted.length < 2) { alert("Necesitas al menos 2 equipos en la Liga."); return; }
      
      const campeonLiga = { nombre: tablaSorted[0].equipo, logo: tablaSorted[0].logo };
      const subcampeonLiga = { nombre: tablaSorted[1].equipo, logo: tablaSorted[1].logo };

      const clasificados = [campeonCopa, subcampeonCopa, campeonLiga, subcampeonLiga];
      const shuffled = clasificados.sort(() => 0.5 - Math.random());

      const bracket = [
        { round: "semis", local: shuffled[0], visitante: shuffled[1], resultado: { local:0, visitante:0 }, jugado: false },
        { round: "semis", local: shuffled[2], visitante: shuffled[3], resultado: { local:0, visitante:0 }, jugado: false },
        { round: "final", local: { nombre: "—", logo: "" }, visitante: { nombre: "—", logo: "" }, resultado: { local:0, visitante:0 }, jugado: false }
      ];

      await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ bracket })
      });
      location.reload();
    }

    async function resetSuper() {
        if (!confirm("¿Borrar progreso de la Supercopa?")) return;
        await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ bracket: [] })
        });
        location.reload();
    }

    function render() {
      const container = document.getElementById("bracket");
      container.innerHTML = "";
      if (!_partidos.length) { 
          container.innerHTML = "<div style='text-align:center; width:100%; padding: 40px; background: var(--surface); border-radius: 15px; border: 2px dashed var(--border); color: var(--muted); font-weight: 700;'>No hay Supercopa activa. Presiona 'Generar Cruces' para ver quién se enfrenta.</div>"; 
          return; 
      }

      const rounds = ["semis", "final"];
      const labels = ["Semifinales", "Gran Final"];

      rounds.forEach((r, idx) => {
        const div = document.createElement("div");
        div.className = "round";
        div.innerHTML = `<div class="round-label">${labels[idx]}</div>`;

        const matches = _partidos.filter(m => m.round === r);
        matches.forEach(m => {
          const wl = m.jugado && m.resultado.local > m.resultado.visitante ? "winner" : "";
          const wv = m.jugado && m.resultado.visitante > m.resultado.local ? "winner" : "";
          
          const card = document.createElement("div");
          card.className = "match-card";
          card.innerHTML = `
            <div class="team ${wl}">
              <div style="display:flex;align-items:center;gap:15px;">
                  <img src="${m.local.logo || 'img/logo.png'}">
                  <span class="team-name">${m.local.nombre}</span>
              </div>
              <div class="score">${m.jugado ? m.resultado.local : ""}</div>
            </div>
            <div class="team ${wv}">
              <div style="display:flex;align-items:center;gap:15px;">
                  <img src="${m.visitante.logo || 'img/logo.png'}">
                  <span class="team-name">${m.visitante.nombre}</span>
              </div>
              <div class="score">${m.jugado ? m.resultado.visitante : ""}</div>
            </div>
            ${!m.jugado && m.local.nombre !== "—" && m.visitante.nombre !== "—" ? `<div class="play-icon" title="Jugar" onclick="jugar('${m._id}')">▶</div>` : ""}
          `;
          div.appendChild(card);
        });
        container.appendChild(div);
      });
    }

    function jugar(id) {
      localStorage.setItem("partidoSeleccionado", JSON.stringify({ pid: id, torneo: "supercopa" }));
      window.location.href = "/jugarpartido.html";
    }

    init();
  </script>
</body>
</html>
