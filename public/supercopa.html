<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supercopa Ecuador</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --super-gold: var(--accent); --super-bg: var(--bg); }
    body { background: var(--super-bg); color: var(--text); }

    .hero-super {
      text-align: center;
      padding: 60px 0;
      background: var(--black);
      border-radius: 20px;
      margin-bottom: 40px;
      border-bottom: 5px solid var(--super-gold);
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      position: relative;
    }

    .super-title {
      font-family: var(--font-head);
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: 6px;
      margin: 0;
      color: #fff;
      text-transform: uppercase;
    }
    .super-title span { color: var(--super-gold); }

    .actions-bar { display: flex; justify-content: center; gap: 15px; margin-top: 35px; flex-wrap: wrap; }

    .btn-action {
      font-family: var(--font-head);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 14px 35px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
    }
    .btn-super { background: var(--super-gold); color: var(--black); }
    .btn-schedule { background: var(--surface); color: var(--black); border: 2px solid var(--black); }
    .btn-reset { background: #ef4444; color: #fff; }

    .bracket-wrap { max-width: 1100px; margin: 50px auto; display: flex; justify-content: center; gap: 60px; }
    .round { display: flex; flex-direction: column; justify-content: center; gap: 40px; min-width: 300px; }
    .round-label { text-align: center; font-family: var(--font-head); font-size: 1.5rem; font-weight: 900; border-bottom: 3px solid var(--super-gold); padding-bottom: 10px; text-transform: uppercase; }

    .match-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      position: relative;
      transition: all 0.3s;
    }
    .match-date { font-size: 0.7rem; color: var(--muted); text-align: center; font-weight: 800; margin-bottom: 8px; }
    .team { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
    .team img { width: 40px; height: 40px; object-fit: contain; }
    .team-name { font-weight: 700; font-size: 1.15rem; }
    .score { font-family: var(--font-head); font-size: 2rem; font-weight: 900; color: var(--super-gold); }

    .play-icon, .report-icon {
      position: absolute;
      right: -20px;
      background: var(--black);
      color: var(--super-gold);
      border: 3px solid var(--super-gold);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
    }
    .play-icon { top: 25%; }
    .report-icon { top: 60%; background: var(--surface); color: var(--black); border-color: var(--black); }

    .winner { color: var(--accent-dark); }

    /* MODAL */
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
    .modal-content { background: var(--surface); margin: 10% auto; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; border: 3px solid var(--super-gold); }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="https://assets.football-logos.cc/logos/ecuador/512x512/liga-pro-serie-a.9a546764.png" alt="Supercopa">
      <h1>Supercopa <span>Ecuador</span></h1>
    </div>
    <div class="nav-buttons">
        <button onclick="window.location.href='/haxball.html'">Atrás</button>
    </div>
  </header>

  <div class="hero-super">
    <h1 class="super-title">Super<span>copa</span> 2026</h1>
    <div class="actions-bar" id="adminActions" style="display:none;">
        <button class="btn-action btn-super" onclick="generarSupercopa()">⚙️ Generar Cruces</button>
        <button class="btn-action btn-schedule" onclick="window.location.href='/supercopahorario.html'">📅 Horarios</button>
        <button class="btn-action btn-reset" onclick="resetSuper()">🗑️ Reiniciar</button>
    </div>
  </div>

  <div class="bracket-wrap" id="bracket"></div>

  <div id="modalReporte" class="modal">
    <div class="modal-content">
      <h2 id="reporteTitulo" style="text-transform:uppercase;"></h2>
      <div id="reporteBody" style="margin-top:20px;"></div>
      <button class="add-btn" onclick="cerrarReporte()" style="margin-top:20px;">Cerrar</button>
    </div>
  </div>

  <script>
    const API = "/api/index?ruta=supercopa_partidos";
    const API_COPA = "/api/index?ruta=copa_partidos";
    const API_TABLA = "/api/index?ruta=tabla";

    let _partidos = [];
    let _teams = [];

    async function init() {
      const user = JSON.parse(localStorage.getItem("user"));
      if (user && user.role === "admin") document.getElementById("adminActions").style.display = "flex";

      const [resP, resT] = await Promise.all([
        fetch(API).then(r => r.json()),
        fetch(API_TABLA).then(r => r.json())
      ]);
      _partidos = Array.isArray(resP) ? resP : [];
      _teams = Array.isArray(resT) ? resT : [];
      render();
    }

    async function generarSupercopa() {
      if (_partidos.length && !confirm("¿Generar nueva?")) return;
      const resCopa = await fetch(API_COPA).then(r => r.json());
      const finalCopa = resCopa.find(m => m.round === "final" && m.jugado);
      if (!finalCopa) { alert("La Copa Ecuador aún no ha terminado."); return; }
      
      const cC = finalCopa.resultado.local > finalCopa.resultado.visitante ? finalCopa.local : finalCopa.visitante;
      const sC = finalCopa.resultado.local > finalCopa.resultado.visitante ? finalCopa.visitante : finalCopa.local;

      const tablaSorted = _teams.sort((a,b) => (b.PTS-a.PTS) || (b.DG-a.DG));
      const cL = { nombre: tablaSorted[0].equipo };
      const sL = { nombre: tablaSorted[1].equipo };

      const clas = [cC, sC, cL, sL].sort(() => 0.5 - Math.random());
      const bracket = [
        { round:"semis", pos:0, local:{nombre:clas[0].nombre}, visitante:{nombre:clas[1].nombre}, resultado:{local:0, visitante:0}, jugado:false },
        { round:"semis", pos:1, local:{nombre:clas[2].nombre}, visitante:{nombre:clas[3].nombre}, resultado:{local:0, visitante:0}, jugado:false },
        { round:"final", pos:0, local:{nombre:"—"}, visitante:{nombre:"—"}, resultado:{local:0, visitante:0}, jugado:false }
      ];
      await fetch(API, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({bracket}) });
      location.reload();
    }

    async function resetSuper() {
        if (confirm("¿Resetear?")) {
            await fetch(API, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({bracket:[]}) });
            location.reload();
        }
    }

    function render() {
      const container = document.getElementById("bracket");
      container.innerHTML = "";
      if (!_partidos.length) { container.innerHTML = "<p>No hay Supercopa activa.</p>"; return; }

      ["semis", "final"].forEach((r, idx) => {
        const div = document.createElement("div");
        div.className = "round";
        div.innerHTML = `<div class="round-label">${r.toUpperCase()}</div>`;

        _partidos.filter(m => m.round === r).forEach(m => {
          const teamL = _teams.find(t => t.equipo === m.local?.nombre) || { logo: 'img/logo.png' };
          const teamV = _teams.find(t => t.equipo === m.visitante?.nombre) || { logo: 'img/logo.png' };
          const wl = m.jugado && m.resultado.local > m.resultado.visitante ? "winner" : "";
          const wv = m.jugado && m.resultado.visitante > m.resultado.local ? "winner" : "";
          
          const card = document.createElement("div");
          card.className = "match-card";
          card.innerHTML = `
            <div class="match-date">${m.fecha || 'PENDIENTE'} — ${m.hora || ''}</div>
            <div class="team ${wl}"><div style="display:flex;align-items:center;gap:15px;"><img src="${teamL.logo}"> <span class="team-name">${m.local.nombre}</span></div><div class="score">${m.jugado ? m.resultado.local : ''}</div></div>
            <div class="team ${wv}"><div style="display:flex;align-items:center;gap:15px;"><img src="${teamV.logo}"> <span class="team-name">${m.visitante.nombre}</span></div><div class="score">${m.jugado ? m.resultado.visitante : ''}</div></div>
            ${!m.jugado && m.local.nombre !== "—" ? `<div class="play-icon" onclick="jugar('${m._id}')">▶</div>` : ""}
            ${m.jugado ? `<div class="report-icon" onclick="verInforme('${m._id}')">📝</div>` : ""}
          `;
          div.appendChild(card);
        });
        container.appendChild(div);
      });
    }

    function verInforme(id) {
        const p = _partidos.find(x => x._id === id);
        if (!p) return;
        document.getElementById("reporteTitulo").innerText = `${p.local.nombre} vs ${p.visitante.nombre}`;
        let html = `<div><strong>MVP:</strong> ${p.mvp || '—'}</div><hr>`;
        if (p.eventos && p.eventos.length) {
            p.eventos.forEach(e => {
                html += `<div style="display:flex; justify-content:space-between; padding:5px 0;"><span>${e.minuto}' ${e.tipo.toUpperCase()}</span> <span>${e.jugador}</span></div>`;
            });
        } else { html += "<div>Sin eventos.</div>"; }
        document.getElementById("reporteBody").innerHTML = html;
        document.getElementById("modalReporte").style.display = "block";
    }

    function cerrarReporte() { document.getElementById("modalReporte").style.display = "none"; }
    function jugar(id) {
      localStorage.setItem("partidoSeleccionado", JSON.stringify({ pid: id, torneo: "supercopa" }));
      window.location.href = "/jugarpartidosupercopa.html";
    }
    init();
  </script>
</body>
</html>
