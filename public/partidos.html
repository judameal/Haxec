<!DOCTYPE html>
<html>
<head>
  <title>Partidos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="img/logo.png">
    <h1>Haxec <span>Esport</span></h1>
  </div>
</header>

<div class="admin-container">

  <h1 class="admin-title">PARTIDOS</h1>

  <button class="back-btn" onclick="goBack()">Volver</button>

  <div id="partidosContainer"></div>

</div>

<footer>
  <p>© 2026 Haxec Esport — Hecho por Judameal</p>
</footer>

<script>
const API = "/api";

const user = JSON.parse(localStorage.getItem("user"));
const esAdmin = user && user.role === "admin";

function goBack() {
  window.location.href = "/haxball.html";
}

/* 🔥 CALENDARIO */
function generarCalendario(equipos) {
  const jornadas = [];
  const lista = [...equipos];

  if (lista.length % 2 !== 0) lista.push(null);

  const n = lista.length;

  for (let i = 0; i < n - 1; i++) {
    const jornada = [];

    for (let j = 0; j < n / 2; j++) {
      const local = lista[j];
      const visitante = lista[n - 1 - j];

      if (local && visitante) {
        jornada.push({ local, visitante });
      }
    }

    jornadas.push(jornada);
    lista.splice(1, 0, lista.pop());
  }

  const vuelta = jornadas.map(jornada =>
    jornada.map(p => ({
      local: p.visitante,
      visitante: p.local
    }))
  );

  return [...jornadas, ...vuelta];
}

/* 📥 CARGAR */
async function cargarPartidos() {
  const res = await fetch(API + "/teams");
  const equipos = await res.json();

  const resPartidos = await fetch(API + "/partidos");
  const dataPartidos = await resPartidos.json();

  const container = document.getElementById("partidosContainer");

  const calendario = generarCalendario(equipos);

  calendario.forEach((jornada, i) => {
    const div = document.createElement("div");
    div.className = "admin-card";
    div.style.marginBottom = "20px";

    let html = `<h3>Jornada ${i + 1}</h3>`;

    jornada.forEach((p, indexPartido) => {

      const info = dataPartidos.find(d =>
        d.jornada === i && d.partido === indexPartido
      );

      html += `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0;">

          <span>
            <img src="${p.local.logo}" width="20"> ${p.local.nombre}
          </span>

          <div style="text-align:center;">
            <strong>vs</strong><br>
            ${info 
              ? `<small>${info.fecha} - ${info.hora}</small>` 
              : `<small style="color:gray;">Sin horario</small>`}
          </div>

          <span>
            ${p.visitante.nombre} <img src="${p.visitante.logo}" width="20">
          </span>

          ${
            esAdmin ? `
              <div style="display:flex; gap:5px;">
                <button style="font-size:12px; padding:4px 8px;"
                  onclick="abrirOpciones(${i}, ${indexPartido})">
                  Asignar
                </button>

                <button style="font-size:12px; padding:4px 8px;"
                  onclick="jugar(${i}, ${indexPartido})">
                  Jugar
                </button>
              </div>
            ` : ""
          }

        </div>
      `;
    });

    div.innerHTML = html;
    container.appendChild(div);
  });
}

/* 🔗 IR HORARIOS */
function abrirOpciones(jornada, partido) {
  localStorage.setItem("partidoSeleccionado", JSON.stringify({
    jornada,
    partido
  }));

  window.location.href = "/horarios.html";
}

/* 🎮 IR JUGAR */
function jugar(jornada, partido) {
  localStorage.setItem("partidoSeleccionado", JSON.stringify({
    jornada,
    partido
  }));

  window.location.href = "/jugarpartido.html";
}

cargarPartidos();
</script>

</body>
</html>
