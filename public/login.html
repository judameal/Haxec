<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Haxec Esport</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f5f7f5;
      display: flex;
      flex-direction: column;
      font-family: 'Rajdhani', sans-serif;
      color: #0f1410;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
    }

    /* ── CARD ── */
    .auth-card {
      width: 100%;
      max-width: 380px;
      background: #ffffff;
      border: 1.5px solid #d8e8d8;
      border-radius: 20px;
      padding: 40px 36px 34px;
      box-shadow: 0 8px 40px rgba(0,0,0,.07);
      animation: cardIn .5s cubic-bezier(.34,1.2,.64,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── LOGO ── */
    .card-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 30px;
      opacity: 0;
      animation: fadeUp .4s ease .1s forwards;
    }
    .logo-pill {
      background: #0f1410;
      color: #20ca5f;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 5px;
    }
    .logo-sep {
      flex: 1;
      height: 1px;
      background: #d8e8d8;
    }

    /* ── HEADER ── */
    .card-header {
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp .4s ease .18s forwards;
    }
    .card-eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #7a9478;
      margin-bottom: 6px;
    }
    .card-title {
      font-family: 'Exo 2', sans-serif;
      font-size: 1.9rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #0f1410;
      line-height: 1;
    }
    .card-title span { color: #24cf63; }

    /* ── TOAST ── */
    .toast-msg {
      display: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.83rem;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .toast-msg.error {
      display: block;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
    }
    .toast-msg.success {
      display: block;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #2dbb61;
    }

    /* ── FORM ── */
    .form-group {
      margin-bottom: 14px;
      opacity: 0;
      animation: fadeUp .4s ease forwards;
    }
    .form-group:nth-child(1) { animation-delay: .24s; }
    .form-group:nth-child(2) { animation-delay: .30s; }

    .form-label {
      display: block;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #7a9478;
      margin-bottom: 7px;
    }

    .form-input {
      width: 100%;
      background: #f5f8f5;
      border: 1.5px solid #d8e8d8;
      border-radius: 10px;
      padding: 12px 15px;
      font-size: 0.95rem;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      color: #0f1410;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .form-input::placeholder { color: #a8bfa8; }
    .form-input:focus {
      border-color: #24cf63;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(34,197,94,.1);
    }

    /* ── BOTÓN ── */
    .btn-submit {
      width: 100%;
      margin-top: 8px;
      background: #0f1410;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 0.85rem;
      font-weight: 800;
      font-family: 'Exo 2', sans-serif;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .18s, transform .18s, box-shadow .18s;
      opacity: 0;
      animation: fadeUp .4s ease .36s forwards;
    }
    .btn-submit:hover {
      background: #1eaf54;
      color: #0f1410;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(34,197,94,.22);
    }
    .btn-submit:active { transform: translateY(0); }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0 16px;
      opacity: 0;
      animation: fadeUp .4s ease .42s forwards;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #d8e8d8;
    }
    .divider span {
      font-size: 0.68rem;
      color: #7a9478;
      white-space: nowrap;
      letter-spacing: 1.5px;
      font-family: 'Exo 2', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
    }

    /* ── FOOTER LINK ── */
    .auth-footer {
      text-align: center;
      font-size: 0.88rem;
      color: #7a9478;
      opacity: 0;
      animation: fadeUp .4s ease .48s forwards;
    }
    .auth-footer a {
      color: #13da5c;
      font-weight: 700;
      text-decoration: none;
      transition: color .15s;
    }
    .auth-footer a:hover { color: #17e663; }


    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<main>
  <div class="auth-card">

    <div class="card-logo">
      <div class="logo-pill">Haxec Esport</div>
      <div class="logo-sep"></div>
    </div>

    <div class="card-header">
      <div class="card-eyebrow">Bienvenido de vuelta</div>
      <div class="card-title">Iniciar <span>sesión</span></div>
    </div>

    <div id="msgBox" class="toast-msg"></div>

    <div class="form-group">
      <label class="form-label" for="username">Usuario</label>
      <input class="form-input" id="username" type="text" placeholder="Tu nombre de usuario" autocomplete="username">
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Contraseña</label>
      <input class="form-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-submit" onclick="login()">Entrar →</button>

    <div class="divider"><span>¿Nuevo aquí?</span></div>

    <p class="auth-footer">
      ¿No tienes cuenta? <a href="/register.html">Regístrate gratis</a>
    </p>

  </div>
</main>

<footer>
  <p>© 2026 Haxec Esport — Hecho por Judameal</p>
</footer>

<script src="js/app.js"></script>
<script>
  document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") login();
  });
</script>
</body>
</html>
