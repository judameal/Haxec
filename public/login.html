<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="img/logo.png">
    <h1>Haxec <span>Esport</span></h1>
  </div>
</header>

<div class="center">

  <!-- 🧿 HEX DECORACIÓN -->
  <div class="hex-bg hex-top"></div>
  <div class="hex-bg hex-bottom"></div>

  <div class="card">
    <h2>Iniciar sesión</h2>

    <input id="username" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>

    <p>
      ¿No tienes cuenta?
      <a href="/register.html">Regístrate</a>
    </p>
  </div>

</div>
<footer>
  <p>© 2026 Haxec Esport — Hecho por Judameal</p>
</footer>
<script src="js/app.js"></script>
</body>
</html>
