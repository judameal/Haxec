<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header>
  <div class="logo">
    <img src="img/logo.png" alt="Haxec">
    <h1>Haxec <span>Esport</span></h1>
  </div>

  <div id="nav" class="nav-buttons"></div>
</header>
    <div id="adminPanelBtn"></div>
<div class="admin-container">
  <h1 class="admin-title">Panel de Control</h1>

<div class="admin-card">
  <table id="tablaUsuarios">
  <tr>
    <th>Usuario</th>
    <th>Rol</th>
    <th>Acciones</th>
  </tr>
</table>

<button class="back-btn" onclick="back()">Volver</button>
</div>
</div>
<script>
const API = "/api";
const user = JSON.parse(localStorage.getItem("user"));

if (!user || user.role !== "admin") {
  window.location.href = "/haxball.html";
}

async function cargarUsuarios() {
  const res = await fetch(API + "/users");
  const users = await res.json();

  const tabla = document.getElementById("tablaUsuarios");

  users.forEach(u => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${u.username}</td>
      <td>${u.role}</td>
      <td class="actions">
  <button onclick="hacerAdmin('${u.username}')">Admin</button>
  <button onclick="quitarAdmin('${u.username}')">User</button>
  <button onclick="eliminar('${u.username}')">Eliminar</button>
</td>
    `;

    tabla.appendChild(row);
  });
}

async function hacerAdmin(username) {
  await fetch(API + "/setRole", {
    method: "POST",
    body: JSON.stringify({ username, role: "admin" })
  });
  location.reload();
}

async function quitarAdmin(username) {
  await fetch(API + "/setRole", {
    method: "POST",
    body: JSON.stringify({ username, role: "user" })
  });
  location.reload();
}

async function eliminar(username) {
  await fetch(API + "/deleteUser", {
    method: "POST",
    body: JSON.stringify({ username })
  });
  location.reload();
}

function back() {
  window.location.href = "/haxball.html";
}

cargarUsuarios();
</script>

</body>
<footer>
  <p>© 2026 Haxec Esport — Hecho por Judameal</p>
</footer>
</html>
