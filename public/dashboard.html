<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 11px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .role-admin {
      background: var(--black);
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .role-user {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .ap-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="img/logo.png" alt="Haxec">
    <h1>Haxec <span>Esport</span></h1>
  </div>
  <div id="nav" class="nav-buttons"></div>
</header>

<div id="adminPanelBtn"></div>

<div class="admin-container">

  <div class="ap-title-row">
    <h1 class="admin-title">Panel de Control</h1>
    <button class="back-btn" onclick="back()">⬅ Volver</button>
  </div>

  <div class="admin-card">
    <table id="tablaUsuarios">
      <thead>
        <tr>
          <th style="text-align:left; padding-left:16px;">Usuario</th>
          <th>Rol</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<footer>
  <p>© 2026 Haxec Esport — Hecho por Judameal</p>
</footer>

<script src="js/app.js"></script>
<script>
const API = "/api";
const user = JSON.parse(localStorage.getItem("user"));

if (!user || user.role !== "admin") {
  window.location.href = "/haxball.html";
}

async function cargarUsuarios() {
  const res = await fetch(API + "/users");
  const users = await res.json();

  const tbody = document.querySelector("#tablaUsuarios tbody");

  users.forEach(u => {
    const esAdmin = u.role === "admin";
    const row = document.createElement("tr");

    row.innerHTML = `
      <td style="text-align:left; padding-left:16px; font-weight:700;">${u.username}</td>
      <td>
        <span class="role-badge ${esAdmin ? 'role-admin' : 'role-user'}">
          ${esAdmin ? '● Admin' : 'User'}
        </span>
      </td>
      <td class="actions">
        <button onclick="hacerAdmin('${u.username}')">Admin</button>
        <button onclick="quitarAdmin('${u.username}')">User</button>
        <button onclick="eliminar('${u.username}')" style="border-color:#ef4444; color:#ef4444;">Eliminar</button>
      </td>
    `;

    tbody.appendChild(row);
  });
}

async function hacerAdmin(username) {
  await fetch(API + "/setRole", {
    method: "POST",
    body: JSON.stringify({ username, role: "admin" })
  });
  location.reload();
}

async function quitarAdmin(username) {
  await fetch(API + "/setRole", {
    method: "POST",
    body: JSON.stringify({ username, role: "user" })
  });
  location.reload();
}

async function eliminar(username) {
  if (!confirm(`¿Eliminar a ${username}?`)) return;
  await fetch(API + "/deleteUser", {
    method: "POST",
    body: JSON.stringify({ username })
  });
  location.reload();
}

function back() {
  window.location.href = "/haxball.html";
}

cargarUsuarios();
</script>

</body>
</html>
