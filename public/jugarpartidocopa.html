<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jugar Copa Ecuador — Haxec Esport</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="hex-mid"></div>

<header>
  <div class="logo">
    <img class="hero-logo-img" src="https://r2.thesportsdb.com/images/media/league/badge/86kk7j1753772273.png/medium" alt="Copa Ecuador">
    <h1>Copa <span>Ecuador</span></h1>
  </div>
</header>

<div class="admin-container">
  <h1 class="admin-title">Jugar Partido — Copa</h1>
  <button class="back-btn" onclick="volver()">← Volver al Bracket</button>

  <div id="infoPartido" class="match-header-card">
    <div class="spinner"></div>
  </div>

  <div class="form-card">
    <h3>Resultado</h3>
    <div class="score-inputs">
      <input type="number" id="golesLocal" placeholder="0" min="0" value="0">
      <div class="score-sep">–</div>
      <input type="number" id="golesVisitante" placeholder="0" min="0" value="0">
    </div>
    <div style="display:grid;grid-template-columns:1fr 40px 1fr;gap:12px;margin-top:6px;">
      <div id="labelLocal" style="text-align:center;font-size:.78rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:700;"></div>
      <div></div>
      <div id="labelVisitante" style="text-align:center;font-size:.78rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:700;"></div>
    </div>
  </div>

  <div class="teams-container">
    <div class="team-box">
      <h3 id="nombreLocal">Local</h3>
      <div id="jugadoresLocal"></div>
    </div>
    <div class="team-box">
      <h3 id="nombreVisitante">Visitante</h3>
      <div id="jugadoresVisitante"></div>
    </div>
  </div>

  <div class="form-card">
    <h3>Eventos del Partido</h3>
    <div id="eventos">
      <div style="color:var(--muted);font-size:.9rem;text-align:center;padding:20px 0;">
        Haz clic en un jugador para registrar un evento
      </div>
    </div>
  </div>

  <div class="form-card">
    <h3>MVP del Partido</h3>
    <select id="mvp"><option value="">— Seleccionar MVP —</option></select>
  </div>

  <div class="form-card">
    <h3>Notas</h3>
    <textarea id="notas" placeholder="Observaciones del partido..."></textarea>
  </div>

  <button class="add-btn" onclick="guardar()">⚽ Guardar Resultado Copa</button>
</div>

<footer>
  <p>© 2026 Haxec Esport — Hecho por Judameal</p>
</footer>

<div id="modalOverlay" class="modal-overlay" style="display:none;" onclick="cerrarModalSiOverlay(event)">
  <div class="modal-box">
    <h3 id="modalTitulo">Registrar evento</h3>
    <div id="pasoAccion">
      <div class="action-grid">
        <button class="action-btn" onclick="selAccion('gol')"><span class="icon">⚽</span> Gol</button>
        <button class="action-btn" onclick="selAccion('asistencia')"><span class="icon">👟</span> Asistencia</button>
        <button class="action-btn" onclick="selAccion('amarilla')"><span class="icon">🟨</span> Amarilla</button>
        <button class="action-btn" onclick="selAccion('roja')"><span class="icon">🟥</span> Roja</button>
      </div>
      <button class="modal-cancel" onclick="cerrarModal()" style="width:100%;">Cancelar</button>
    </div>
    <div id="pasoMinuto" style="display:none;">
      <p style="color:var(--muted);font-size:.9rem;margin-bottom:14px;">Acción: <strong id="accionLabel" style="color:var(--text);"></strong></p>
      <input type="number" id="minutoInput" class="modal-input" placeholder="Minuto" min="1" max="120">
      <div class="modal-actions">
        <button class="modal-cancel" onclick="volverPaso1()">← Volver</button>
        <button class="modal-confirm" onclick="confirmarEvento()">Confirmar</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = "/api/index";
let match = null;
let eventos = [];
let eventoActual = { jugador: null, equipo: null, tipo: null };
const ICONOS = { gol: '⚽', asistencia: '👟', amarilla: '🟨', roja: '🟥' };

function volver() { window.location.href = "/copaecuador.html"; }

async function cargar() {
  const sel = JSON.parse(localStorage.getItem("partidoSeleccionado") || "null");
  if (!sel) { volver(); return; }

  const [equipos, jugadores, partidos] = await Promise.all([
    fetch(API + "?ruta=teams").then(r => r.json()),
    fetch(API + "?ruta=jugadores").then(r => r.json()),
    fetch(API + "?ruta=copa_partidos").then(r => r.json())
  ]);

  match = partidos.find(p => p._id === sel.pid);
  if (!match) { alert("Partido no encontrado"); volver(); return; }

  document.getElementById("infoPartido").innerHTML = `
    <div style="font-size:0.8rem; text-transform:uppercase; color:var(--accent); margin-bottom:10px; letter-spacing:2px; font-weight:800;">Copa Ecuador 2026</div>
    <h3>${match.local.nombre} <span style="color:var(--muted);font-size:1.2rem;margin:0 10px;">vs</span> ${match.visitante.nombre}</h3>
  `;

  document.getElementById("nombreLocal").innerText = match.local.nombre;
  document.getElementById("nombreVisitante").innerText = match.visitante.nombre;
  document.getElementById("labelLocal").innerText = match.local.nombre;
  document.getElementById("labelVisitante").innerText = match.visitante.nombre;

  const jugLocal = jugadores.filter(j => j.equipo === match.local.nombre);
  const jugVisit = jugadores.filter(j => j.equipo === match.visitante.nombre);

  renderJugadores(jugLocal, "jugadoresLocal", "local");
  renderJugadores(jugVisit, "jugadoresVisitante", "visitante");

  const mvpSel = document.getElementById("mvp");
  jugadores.forEach(j => {
    mvpSel.innerHTML += `<option value="${j.nombre}">${j.nombre} (${j.equipo})</option>`;
  });
}

function renderJugadores(lista, id, equipo) {
  const cont = document.getElementById(id);
  cont.innerHTML = "";
  lista.forEach(j => {
    const div = document.createElement("div");
    div.className = "jugador-item";
    div.innerHTML = `<span>${j.nombre}</span>`;
    div.onclick = () => abrirModal(j.nombre, equipo);
    cont.appendChild(div);
  });
}

function abrirModal(jugador, equipo) {
  eventoActual = { jugador, equipo, tipo: null };
  document.getElementById("modalTitulo").textContent = `🎮 ${jugador}`;
  document.getElementById("pasoAccion").style.display = "block";
  document.getElementById("pasoMinuto").style.display = "none";
  document.getElementById("minutoInput").value = "";
  document.getElementById("modalOverlay").style.display = "flex";
}
function cerrarModal() { document.getElementById("modalOverlay").style.display = "none"; }
function cerrarModalSiOverlay(e) { if (e.target === document.getElementById("modalOverlay")) cerrarModal(); }
function selAccion(tipo) {
  eventoActual.tipo = tipo;
  document.getElementById("accionLabel").innerHTML = `${ICONOS[tipo]} ${tipo}`;
  document.getElementById("pasoAccion").style.display = "none";
  document.getElementById("pasoMinuto").style.display = "block";
  document.getElementById("minutoInput").focus();
}
function volverPaso1() {
  document.getElementById("pasoAccion").style.display = "block";
  document.getElementById("pasoMinuto").style.display = "none";
}
function confirmarEvento() {
  const minuto = parseInt(document.getElementById("minutoInput").value);
  if (!minuto) return;
  eventos.push({ jugador: eventoActual.jugador, tipo: eventoActual.tipo, minuto, equipo: eventoActual.equipo });
  cerrarModal();
  renderEventos();
}

function renderEventos() {
  const cont = document.getElementById("eventos");
  const sorted = [...eventos].sort((a, b) => a.minuto - b.minuto);
  if (!sorted.length) return;
  cont.innerHTML = sorted.map(e => `
    <div class="evento-item">
      <span class="evento-minuto">${e.minuto}'</span>
      <span class="evento-icon">${ICONOS[e.tipo] || '•'}</span>
      <span class="evento-nombre">${e.jugador}</span>
    </div>
  `).join("");
}

async function guardar() {
  const gl = parseInt(document.getElementById("golesLocal").value) || 0;
  const gv = parseInt(document.getElementById("golesVisitante").value) || 0;
  const mvp = document.getElementById("mvp").value;
  const notas = document.getElementById("notas").value;

  const btn = document.querySelector(".add-btn");
  btn.disabled = true;
  btn.textContent = "Guardando...";

  try {
    const res = await fetch(API + "?ruta=copa_partidos", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: match._id, local: match.local, visitante: match.visitante, resultado: { local: gl, visitante: gv }, eventos, mvp, notas })
    });

    if (!res.ok) throw new Error("Fallo al guardar");
    window.location.href = "/copaecuador.html";
  } catch (e) {
    alert("Error: " + e.message);
    btn.disabled = false;
  }
}
cargar();
</script>
</body>
</html>
