<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amarillas — Haxec Esport</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .stats-table { width:100%; border-collapse:collapse; margin-top:16px; }
    .stats-table thead tr { background:#c8a000; color:#111; }
    .stats-table th, .stats-table td { padding:12px 16px; text-align:left; font-size:.9rem; }
    .stats-table tbody tr { border-bottom:1px solid rgba(255,255,255,.07); transition:background .15s; }
    .stats-table tbody tr:hover { background:rgba(255,255,255,.05); }
    .rank-num { font-weight:900; font-size:1.1rem; color:var(--muted,#888); width:36px; }
    .stat-badge { display:inline-block; background:#F5C518; color:#111; font-weight:800; border-radius:6px; padding:2px 10px; font-size:.95rem; }
    .team-tag { font-size:.78rem; color:var(--muted,#888); }
    .empty-msg { text-align:center; color:var(--muted,#888); padding:40px 0; }
    .page-subtitle { color:var(--muted,#888); margin-bottom:24px; font-size:.95rem; }
    .warn-note { background:rgba(245,197,24,.1); border-left:3px solid #F5C518; padding:10px 14px; border-radius:6px; font-size:.85rem; color:var(--muted,#aaa); margin-bottom:18px; }
  </style>
</head>
<body>
<div class="hex-mid"></div>
<header>
  <div class="logo">
    <img
    class="hero-logo-img"
    src="https://assets.football-logos.cc/logos/ecuador/512x512/liga-pro-serie-a.9a546764.png"
    alt="LigaPro Ecuabet"
  >
    <h1>LigaPro <span>Ecuabet</span></h1>
  </div>
</header>

<div class="admin-container">
  <button class="back-btn" onclick="history.back()">← Volver</button>
  <h1 class="admin-title">🟨 Tarjetas Amarillas</h1>
  <p class="page-subtitle">Jugadores con más amonestaciones en la temporada</p>

  <div class="form-card">
    <div class="warn-note">⚠️ Más tarjetas = más sanciones. Este ranking es de mayor a menor.</div>
    <div id="contenido"><div class="spinner"></div></div>
  </div>
</div>

<footer><p>© 2026 Haxec Esport — Hecho por Judameal</p></footer>

<script>
async function cargar() {
  const jugadores = await fetch("/api/jugadores").then(r => r.json());
  const amonestados = jugadores
    .filter(j => (j.amarillas || 0) > 0)
    .sort((a, b) => (b.amarillas || 0) - (a.amarillas || 0));

  const cont = document.getElementById("contenido");
  if (!amonestados.length) {
    cont.innerHTML = `<p class="empty-msg">Sin tarjetas amarillas registradas. ¡Juego limpio!</p>`;
    return;
  }

  cont.innerHTML = `
    <table class="stats-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Jugador</th>
          <th>Equipo</th>
          <th>🟨 Amarillas</th>
        </tr>
      </thead>
      <tbody>
        ${amonestados.map((j, i) => `
          <tr>
            <td class="rank-num">${i + 1}</td>
            <td>${j.nombre}</td>
            <td class="team-tag">${j.equipo || "—"}</td>
            <td><span class="stat-badge">${j.amarillas || 0}</span></td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}
cargar();
</script>
</body>
</html>
