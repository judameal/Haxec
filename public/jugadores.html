<!DOCTYPE html>
<html>
<head>
  <title>Jugadores</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="img/logo.png">
    <h1>Haxec <span>Esport</span></h1>
  </div>
</header>

<div class="admin-container">

  <h1 class="admin-title">JUGADORES</h1>

  <!-- 🔙 VOLVER -->
  <button class="back-btn" onclick="goBack()">Volver</button>

  <!-- ➕ AÑADIR -->
  <button class="add-btn" onclick="toggleForm()">+ Añadir jugador</button>

  <!-- 📥 FORM -->
  <div id="formJugador" class="form-card" style="display:none;">

    <input id="nombre" placeholder="Nombre">
    <input id="dorsal" placeholder="Dorsal">
    <input id="equipo" placeholder="Equipo" oninput="verificarEquipo()">

    <!-- 🔍 PREVIEW -->
    <div id="previewEquipo"></div>

    <button onclick="crearJugador()">Guardar</button>

  </div>

  <!-- 📋 TABLA -->
  <div class="admin-card">
    <table id="tablaJugadores">
      <tr>
        <th>Nombre</th>
        <th>Dorsal</th>
        <th>Equipo</th>
      </tr>
    </table>
  </div>

</div>

<footer>
  <p>© 2026 Haxec Esport — Hecho por Judameal</p>
</footer>

<script src="js/app.js"></script>

<script>
let equipoValido = null;

/* 🔙 VOLVER */
function goBack() {
  window.location.href = "/haxball.html";
}

/* 🔽 FORM */
function toggleForm() {
  const form = document.getElementById("formJugador");
  form.style.display = form.style.display === "none" ? "block" : "none";
}

/* 🔍 VALIDAR EQUIPO */
async function verificarEquipo() {
  const input = document.getElementById("equipo").value;
  const preview = document.getElementById("previewEquipo");

  if (!input) {
    preview.innerHTML = "";
    equipoValido = null;
    return;
  }

  const res = await fetch("/api/teams");
  const teams = await res.json();

  const encontrado = teams.find(t =>
    t.nombre.toLowerCase() === input.toLowerCase()
  );

  if (encontrado) {
    equipoValido = encontrado;

    preview.innerHTML = `
      <div class="preview-box preview-ok">
        <img src="${encontrado.logo}" width="30">
        <span><strong>${encontrado.nombre}</strong></span>
      </div>
    `;
  } else {
    equipoValido = null;

    preview.innerHTML = `
      <div class="preview-box preview-error">
        <span>Equipo no encontrado</span>
      </div>
    `;
  }
}

/* ➕ CREAR */
async function crearJugador() {
  const nombre = document.getElementById("nombre").value;
  const dorsal = document.getElementById("dorsal").value;

  if (!nombre || !dorsal) {
    alert("Completa los campos");
    return;
  }

  let equipoFinal = "Sin equipo";

  if (equipoValido) {
    equipoFinal = equipoValido.nombre;
  }

  await fetch("/api/jugadores", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      nombre,
      dorsal,
      equipo: equipoFinal
    })
  });

  location.reload();
}

/* 📥 CARGAR */
async function cargarJugadores() {
  const resJug = await fetch("/api/jugadores");
  const jugadores = await resJug.json();

  const resTeams = await fetch("/api/teams");
  const teams = await resTeams.json();

  const tabla = document.getElementById("tablaJugadores");

  jugadores.forEach(j => {
    const equipo = teams.find(t =>
      t.nombre.toLowerCase() === j.equipo.toLowerCase()
    );

    const logo = equipo ? `<img src="${equipo.logo}" width="30">` : "—";

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${j.nombre}</td>
      <td>#${j.dorsal}</td>
      <td>${logo}</td>
    `;

    tabla.appendChild(row);
  });
}

cargarJugadores();
</script>

</body>
</html>
