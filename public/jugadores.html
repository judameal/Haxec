<!DOCTYPE html>
<html>
<head>
  <title>Jugadores</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="img/logo.png">
    <h1>Haxec <span>Esport</span></h1>
  </div>
</header>

<div class="admin-container">

  <h1 class="admin-title">Jugadores</h1>

  <!-- 🔵 BOTÓN AÑADIR -->
  <button class="add-btn" onclick="toggleForm()">+ Añadir jugador</button>

  <div id="formJugador" class="form-card" style="display:none;">

  <input id="dorsal" placeholder="Dorsal">
  <input id="nombre" placeholder="Nombre">
  <input id="equipo" placeholder="Equipo" oninput="verificarEquipo()">

  <!-- 🔍 PREVIEW -->
  <div id="previewEquipo" style="margin-top:10px;"></div>

  <button onclick="crearJugador()">Guardar</button>

</div>

  <!-- 📋 LISTA -->
  <div class="admin-card">
    <table id="tablaJugadores">
      <tr>
        <th>Dorsal</th>
        <th>Nombre</th>
        <th>Equipo</th>
      </tr>
    </table>
  </div>

</div>

<button class="back-btn" onclick="goBack()">Volver</button>


<script>
    function goBack() {
      window.location.href = "/haxball.html";
    }
</script>
<script src="js/app.js"></script>

<script>
let equipoValido = null;

/* 🔍 verificar equipo */
async function verificarEquipo() {
  const input = document.getElementById("equipo").value;
  const preview = document.getElementById("previewEquipo");

  if (!input) {
    preview.innerHTML = "";
    equipoValido = null;
    return;
  }

  const res = await fetch("/api/teams");
  const teams = await res.json();

  const encontrado = teams.find(t =>
    t.nombre.toLowerCase() === input.toLowerCase()
  );

  if (encontrado) {
    equipoValido = encontrado.nombre;

    preview.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;">
        <img src="${encontrado.logo}" width="30">
        <span style="color:green;">Equipo válido</span>
      </div>
    `;
  } else {
    equipoValido = null;

    preview.innerHTML = `
      <span style="color:red;">Equipo no encontrado</span>
    `;
  }
}

const API = "/api";

/* 🔽 mostrar form */
function toggleForm() {
  const form = document.getElementById("formJugador");
  form.style.display = form.style.display === "none" ? "block" : "none";
}

/* ➕ crear jugador */
async function crearJugador() {
  const dorsal = document.getElementById("dorsal").value;
  const nombre = document.getElementById("nombre").value;

  let equipoFinal = "Sin equipo";

  if (equipoValido) {
    equipoFinal = equipoValido;
  }

  await fetch("/api/jugadores", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      dorsal,
      nombre,
      equipo: equipoFinal
    })
  });

  location.reload();
}

  await fetch("/api/jugadores", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      nombre,
      equipo: equipoFinal
    })
  });

  location.reload();
}

/* 📥 cargar jugadores */
async function cargarJugadores() {
  const res = await fetch(API + "/jugadores");
  const data = await res.json();

  const tabla = document.getElementById("tablaJugadores");

  data.forEach(j => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${j.dorsal}</td>
      <td>${j.nombre}</td>
      <td>${j.equipo}</td>
    `;

    tabla.appendChild(row);
  });
}

cargarJugadores();
</script>

</body>
</html>
