<!DOCTYPE html>
<html>
<head>
  <title>Jugadores</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="img/logo.png">
    <h1>Haxec <span>Esport</span></h1>
  </div>
</header>

<div class="admin-container">

  <h1 class="admin-title">Jugadores</h1>

  <!-- 🔵 BOTÓN AÑADIR -->
  <button class="add-btn" onclick="toggleForm()">+ Añadir jugador</button>

  <!-- 📥 FORMULARIO -->
  <div id="formJugador" class="form-card" style="display:none;">
    <input id="dorsal" placeholder="Dorsal">
    <input id="nombre" placeholder="Nombre">
    <input id="equipo" placeholder="Equipo">

    <button onclick="crearJugador()">Guardar</button>
  </div>

  <!-- 📋 LISTA -->
  <div class="admin-card">
    <table id="tablaJugadores">
      <tr>
        <th>Dorsal</th>
        <th>Nombre</th>
        <th>Equipo</th>
      </tr>
    </table>
  </div>

</div>

<script src="js/app.js"></script>

<script>
const API = "/api";

/* 🔽 mostrar form */
function toggleForm() {
  const form = document.getElementById("formJugador");
  form.style.display = form.style.display === "none" ? "block" : "none";
}

/* ➕ crear jugador */
async function crearJugador() {
  const dorsal = document.getElementById("dorsal").value;
  const nombre = document.getElementById("nombre").value;
  const equipo = document.getElementById("equipo").value;

  await fetch(API + "/jugadores", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ dorsal, nombre, equipo })
  });

  location.reload();
}

/* 📥 cargar jugadores */
async function cargarJugadores() {
  const res = await fetch(API + "/jugadores");
  const data = await res.json();

  const tabla = document.getElementById("tablaJugadores");

  data.forEach(j => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${j.dorsal}</td>
      <td>${j.nombre}</td>
      <td>${j.equipo}</td>
    `;

    tabla.appendChild(row);
  });
}

cargarJugadores();
</script>

</body>
</html>
