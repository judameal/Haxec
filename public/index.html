<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haxec Esport</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #e8eaf0;
      display: flex;
      flex-direction: column;
      font-family: 'DM Sans', sans-serif;
      color: #151616;
      overflow-x: hidden;
    }

    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .bg-layer::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    }

    .hero {
      position: relative;
      z-index: 5;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    .hero-inner {
      text-align: center;
      max-width: 520px;
      animation: fadeUp .6s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-title-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
      animation: fadeUp .6s .18s ease both;
    }

    .logo-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 260px;
      height: 260px;
      object-fit: contain;
      opacity: 0.0;
      pointer-events: none;
      z-index: 0;
    }

    .hero-title {
      position: relative;
      z-index: 1;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 12vw, 6rem);
      line-height: .95;
      letter-spacing: 3px;
      color: #0e0d0d;
      margin: 0;
    }
    .hero-title .green { color: #22c55e; }

    .hero-sub {
      font-size: 1rem;
      color: #0a0a0a;
      line-height: 1.6;
      margin-bottom: 44px;
      font-weight: 400;
      animation: fadeUp .6s .26s ease both;
    }

    .hero-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeUp .6s .34s ease both;
    }

    .btn-primary {
      background: #22c55e;
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 14px 32px;
      font-size: .95rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: .5px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, background .15s;
    }
    .btn-primary:hover {
      background: #16a34a;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(34,197,94,.35);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: transparent;
      color: #000;
      border: 1px solid rgba(31,30,30,0.2);
      border-radius: 10px;
      padding: 14px 32px;
      font-size: .95rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .15s;
    }
    .btn-ghost:hover {
      background: rgba(0,0,0,.05);
      border-color: rgba(0,0,0,.3);
      transform: translateY(-2px);
    }

    footer {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 18px;
      font-size: .75rem;
      color: #0a0a0a;
      border-top: 1px solid rgb(238, 232, 232);
    }
  </style>
</head>
