<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LigaPro Ecuabet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      font-family: 'Rajdhani', sans-serif;
      color: #0f1410;
      overflow-x: hidden;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 32px;
    }

    /* ── HERO ── */
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 48px;
      max-width: 900px;
      width: 100%;
    }

    /* ── LADO IZQUIERDO ── */
    .hero-left {
      flex: 1;
      min-width: 0;
    }

    .hero-eyebrow {
      font-family: 'Exo 2', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #b8860b;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp .45s ease .1s forwards;
    }

    .hero-title {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #0f1410;
      line-height: 1;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp .45s ease .18s forwards;
    }

    .hero-title .gold { color: #b8860b; }

    .hero-divider {
      width: 48px;
      height: 3px;
      background: #b8860b;
      border-radius: 2px;
      margin: 16px 0 20px;
      opacity: 0;
      animation: fadeUp .45s ease .24s forwards;
    }

    .hero-sub {
      font-size: 1rem;
      font-weight: 500;
      color: #5a5a5a;
      line-height: 1.6;
      margin-bottom: 40px;
      max-width: 360px;
      opacity: 0;
      animation: fadeUp .45s ease .3s forwards;
    }

    /* ── BOTONES ── */
    .hero-btns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp .45s ease .38s forwards;
    }

    .btn-primary {
      background: #0f1410;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px 30px;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .18s, transform .18s, box-shadow .18s;
    }
    .btn-primary:hover {
      background: #b8860b;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(184,134,11,.25);
    }

    .btn-ghost {
      background: transparent;
      color: #0f1410;
      border: 1.5px solid #d0d0d0;
      border-radius: 10px;
      padding: 12px 30px;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color .18s, color .18s, transform .18s;
    }
    .btn-ghost:hover {
      border-color: #0f1410;
      transform: translateY(-2px);
    }

    /* ── LOGO DERECHO ── */
    .hero-logo {
      flex-shrink: 0;
      width: 280px;
      opacity: 0;
      animation: fadeIn .6s ease .2s forwards;
    }

    .hero-logo img {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,.1));
    }

    /* ── BADGE ABAJO ── */
    .hero-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 36px;
      opacity: 0;
      animation: fadeUp .45s ease .48s forwards;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #b8860b;
    }

    .badge-text {
      font-family: 'Exo 2', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #9a9a9a;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 18px;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.72rem;
      color: #b0b0b0;
      border-top: 1px solid #eee;
      letter-spacing: 1px;
    }

    /* ── ANIMACIONES ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(.94); }
      to   { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 640px) {
      .hero { flex-direction: column-reverse; align-items: center; text-align: center; gap: 32px; }
      .hero-logo { width: 180px; }
      .hero-btns { justify-content: center; }
      .hero-sub { max-width: 100%; }
      .hero-badge { justify-content: center; }
    }
  </style>
</head>
<body>

<main>
  <div class="hero">

    <!-- TEXTO -->
    <div class="hero-left">
      <p class="hero-eyebrow">Temporada 1</p>
      <h1 class="hero-title">LigaPro<br><span class="gold">Ecuabet</span></h1>
      <div class="hero-divider"></div>
      <p class="hero-sub">
        La plataforma de estadísticas, resultados y clasificaciones de la liga.
      </p>
      <div class="hero-btns">
        <button class="btn-primary" onclick="goLogin()">Iniciar sesión</button>
        <button class="btn-ghost"   onclick="goRegister()">Crear cuenta</button>
      </div>
      <div class="hero-badge">
        <div class="badge-dot"></div>
        <span class="badge-text">LigaPro Ecuabet · Ecuador</span>
      </div>
    </div>

    <!-- LOGO -->
    <div class="hero-logo">
      <img src="https://assets.football-logos.cc/logos/ecuador/512x512/liga-pro-serie-a.9a546764.png" alt="LigaPro Ecuabet Logo">
  </div>
</main>

<footer>
  <p>© 2026 LigaPro Ecuabet — Hecho por Judameal</p>
</footer>

<script>
  function goLogin()    { window.location.href = "/login.html"; }
  function goRegister() { window.location.href = "/register.html"; }
</script>
</body>
</html>
