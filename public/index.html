<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haxec Esport</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #e8eaf0;
      display: flex;
      flex-direction: column;
      font-family: 'DM Sans', sans-serif;
      color: #151616;
      overflow-x: hidden;
    }

    /* ── FONDO ANIMADO ── */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .bg-layer::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(34,197,94,.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(34,197,94,.07) 0%, transparent 55%);
    }
    /* Cuadrícula sutil */
    .bg-layer::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,.06);
      backdrop-filter: blur(6px);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo img {
      width: 38px;
      height: 38px;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(34,197,94,.5));
    }
    .logo h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 2px;
      color: #080808;
      font-weight: 400;
    }
    .logo h1 span { color: #22c55e; }

    /* ── HERO ── */
    .hero {
      position: relative;
      z-index: 5;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    .hero-inner {
      text-align: center;
      max-width: 520px;
      animation: fadeUp .6s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Badge */
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.3);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #22c55e;
      margin-bottom: 24px;
      animation: fadeUp .6s .1s ease both;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .4; transform: scale(.7); }
    }

    /* Título */
    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 12vw, 6rem);
      line-height: .95;
      letter-spacing: 3px;
      color: #fff;
      margin-bottom: 16px;
      animation: fadeUp .6s .18s ease both;
    }
    .hero-title .green { color: #22c55e; }

    .hero-sub {
      font-size: 1rem;
      color: rgb(10, 10, 10);
      line-height: 1.6;
      margin-bottom: 44px;
      font-weight: 400;
      animation: fadeUp .6s .26s ease both;
    }

    /* Botones */
    .hero-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeUp .6s .34s ease both;
    }

    .btn-primary {
      background: #22c55e;
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 14px 32px;
      font-size: .95rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: .5px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, background .15s;
      box-shadow: 0 0 0 0 rgba(34,197,94,.4);
    }
    .btn-primary:hover {
      background: #16a34a;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(34,197,94,.35);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: transparent;
      color: #000000;
      border: 1px solid rgba(31, 30, 30, 0.2);
      border-radius: 10px;
      padding: 14px 32px;
      font-size: .95rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .15s;
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,.07);
      border-color: rgba(255,255,255,.4);
      transform: translateY(-2px);
    }

    /* Stats decorativos */
    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 52px;
      padding-top: 32px;
      border-top: 1px solid rgba(255,255,255,.07);
      animation: fadeUp .6s .44s ease both;
    }
    .hstat-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 1px;
      color: #22c55e;
    }
    .hstat-label {
      font-size: .68rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,.35);
      margin-top: 2px;
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 18px;
      font-size: .75rem;
      color: rgba(255,255,255,.2);
      border-top: 1px solid rgba(255,255,255,.05);
    }
  </style>
</head>
<body>

<div class="bg-layer"></div>

<header>
  <div class="logo">
    <img src="img/logo.png" alt="Haxec">
    <h1>Haxec <span>Esport</span></h1>
  </div>
</header>

<div class="hero">
  <div class="hero-inner">

    <h1 class="hero-title">
      Haxec<br><span class="green">Esport</span>
    </h1>

    <p class="hero-sub">
      Plataforma estadística de Haxec Esport.<br>
      Resultados, clasificaciones y mucho más.
    </p>

    <div class="hero-btns">
      <button class="btn-primary" onclick="goLogin()">Iniciar sesión</button>
      <button class="btn-ghost"   onclick="goRegister()">Crear cuenta</button>
    </div>

  </div>
</div>

<footer>
  <p>© 2026 Haxec Esport — Hecho por Judameal</p>
</footer>

<script>
function goLogin()    { window.location.href = "/login.html"; }
function goRegister() { window.location.href = "/register.html"; }
</script>
</body>
</html>
