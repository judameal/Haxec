<!DOCTYPE html>
<html>
<head>
  <title>Jugar Partido</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="img/logo.png">
    <h1>Haxec <span>Esport</span></h1>
  </div>
</header>

<div class="admin-container">

  <h1 class="admin-title">JUGAR PARTIDO</h1>

  <button class="back-btn" onclick="volver()">⬅ Volver</button>

  <!-- 🏟 INFO -->
  <div id="infoPartido" class="admin-card"></div>

  <!-- ⚽ RESULTADO -->
  <div class="form-card">
    <h3>Resultado</h3>
    <input type="number" id="golesLocal" placeholder="Goles local">
    <input type="number" id="golesVisitante" placeholder="Goles visitante">
  </div>

  <!-- 👥 EQUIPOS -->
  <div class="teams-container">

    <div class="team-box">
      <h3 id="nombreLocal"></h3>
      <div id="jugadoresLocal"></div>
    </div>

    <div class="team-box">
      <h3 id="nombreVisitante"></h3>
      <div id="jugadoresVisitante"></div>
    </div>

  </div>

  <!-- 📋 EVENTOS -->
  <div class="form-card">
    <h3>Eventos del partido</h3>
    <div id="eventos"></div>
  </div>

  <!-- ⭐ MVP -->
  <div class="form-card">
    <h3>MVP</h3>
    <select id="mvp"></select>
  </div>

  <!-- 📝 NOTAS -->
  <div class="form-card">
    <h3>Notas</h3>
    <textarea id="notas"></textarea>
  </div>

  <button class="add-btn" onclick="guardar()">Guardar Partido</button>

</div>

<footer>
  <p>© 2026 Haxec Esport — Hecho por Judameal</p>
</footer>

<script>
const API = "/api";

let match = null;
let eventos = [];

/* 🔙 */
function volver() {
  window.location.href = "/partidos.html";
}

/* 🔥 calendario */
function generarCalendario(equipos) {
  const jornadas = [];
  const lista = [...equipos];

  if (lista.length % 2 !== 0) lista.push(null);

  const n = lista.length;

  for (let i = 0; i < n - 1; i++) {
    const jornada = [];

    for (let j = 0; j < n / 2; j++) {
      const local = lista[j];
      const visitante = lista[n - 1 - j];

      if (local && visitante) {
        jornada.push({ local, visitante });
      }
    }

    jornadas.push(jornada);
    lista.splice(1, 0, lista.pop());
  }

  const vuelta = jornadas.map(j =>
    j.map(p => ({
      local: p.visitante,
      visitante: p.local
    }))
  );

  return [...jornadas, ...vuelta];
}

/* 📥 cargar */
async function cargar() {
  const sel = JSON.parse(localStorage.getItem("partidoSeleccionado"));

  const equipos = await (await fetch(API + "/teams")).json();
  const jugadores = await (await fetch(API + "/jugadores")).json();

  const calendario = generarCalendario(equipos);
  match = calendario[sel.jornada][sel.partido];

  document.getElementById("infoPartido").innerHTML = `
    <h3>
      <img src="${match.local.logo}" width="25"> ${match.local.nombre}
      vs
      ${match.visitante.nombre} <img src="${match.visitante.logo}" width="25">
    </h3>
  `;

  document.getElementById("nombreLocal").innerText = match.local.nombre;
  document.getElementById("nombreVisitante").innerText = match.visitante.nombre;

  const jugLocal = jugadores.filter(j => j.equipo === match.local.nombre);
  const jugVisit = jugadores.filter(j => j.equipo === match.visitante.nombre);

  renderJugadores(jugLocal, "jugadoresLocal", "local");
  renderJugadores(jugVisit, "jugadoresVisitante", "visitante");

  const mvp = document.getElementById("mvp");
  jugadores.forEach(j => {
    mvp.innerHTML += `<option value="${j.nombre}">${j.nombre}</option>`;
  });
}

/* 👤 mostrar jugadores */
function renderJugadores(lista, id, equipo) {
  const cont = document.getElementById(id);

  lista.forEach(j => {
    const div = document.createElement("div");
    div.className = "jugador-item";
    div.innerText = j.nombre;

    div.onclick = () => accionJugador(j.nombre, equipo);

    cont.appendChild(div);
  });
}

/* ⚡ acción */
function accionJugador(nombre, equipo) {
  const tipo = prompt("Acción: gol / asistencia / amarilla / roja");

  if (!tipo) return;

  const minuto = prompt("Minuto:");
  if (!minuto) return;

  eventos.push({
    jugador: nombre,
    tipo,
    minuto: parseInt(minuto),
    equipo
  });

  renderEventos();
}

/* 📋 render */
function renderEventos() {
  const cont = document.getElementById("eventos");

  eventos.sort((a,b) => a.minuto - b.minuto);

  cont.innerHTML = "";

  eventos.forEach(e => {
    cont.innerHTML += `
      <div>
        ${e.minuto}' - ${e.jugador} (${e.tipo})
      </div>
    `;
  });
}

/* 💾 guardar */
async function guardar() {
  const golesLocal = parseInt(document.getElementById("golesLocal").value) || 0;
  const golesVisitante = parseInt(document.getElementById("golesVisitante").value) || 0;
  const mvp = document.getElementById("mvp").value;
  const notas = document.getElementById("notas").value;

  const sel = JSON.parse(localStorage.getItem("partidoSeleccionado"));

  const data = await (await fetch(API + "/partidos")).json();

  const partido = data.find(p =>
    p.jornada === sel.jornada &&
    p.partido === sel.partido
  );

  if (!partido) {
    alert("Primero asigna horario");
    return;
  }

  await fetch(API + "/partidos", {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      id: partido._id,
      resultado: {
        local: golesLocal,
        visitante: golesVisitante
      },
      eventos,
      mvp,
      notas
    })
  });

  alert("Partido guardado ⚽");
  window.location.href = "/partidos.html";
}

cargar();
</script>

</body>
</html>
