<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copa Ecuador — Haxec Esport</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --copa-gold: #fbbf24;
      --copa-blue: #1e3a8a;
      --copa-accent: #3b82f6;
    }

    body {
      background: #0f172a;
      color: white;
      font-family: 'Outfit', sans-serif;
    }

    .admin-container {
      max-width: 1400px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .hero-cup {
      text-align: center;
      padding: 40px 0;
      background: linear-gradient(180deg, rgba(59, 130, 246, 0.2) 0%, transparent 100%);
      border-radius: 30px;
      margin-bottom: 40px;
    }

    .cup-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      letter-spacing: 4px;
      margin: 0;
      background: linear-gradient(90deg, #fff, var(--copa-gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-generate {
      background: var(--copa-gold);
      color: #000;
      border: none;
      padding: 12px 30px;
      border-radius: 12px;
      font-weight: 800;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 20px;
    }
    .btn-generate:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); }

    /* BRACKET SYSTEM */
    .bracket-container {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-top: 50px;
      overflow-x: auto;
      padding-bottom: 40px;
    }

    .round {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      min-width: 220px;
    }

    .round-title {
      text-align: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      color: var(--copa-gold);
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .match {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      margin: 15px 0;
      padding: 10px;
      position: relative;
      transition: all 0.2s;
    }
    .match:hover { background: rgba(255, 255, 255, 0.08); border-color: var(--copa-accent); }

    .team-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }
    .team-info { display: flex; align-items: center; gap: 10px; }
    .team-logo { width: 24px; height: 24px; object-fit: contain; }
    .team-name { font-weight: 600; font-size: 0.9rem; }
    .score { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--copa-gold); }

    .btn-play-cup {
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--copa-accent);
      color: white;
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .match:hover .btn-play-cup { opacity: 1; }

    .winner { color: var(--copa-gold); }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: #1e293b;
      padding: 30px;
      border-radius: 24px;
      width: 100%;
      max-width: 500px;
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img class="hero-logo-img" src="https://assets.football-logos.cc/logos/ecuador/512x512/liga-pro-serie-a.9a546764.png" alt="Copa Ecuador">
      <h1>Copa <span>Ecuador</span></h1>
    </div>
  </header>

  <div class="admin-container">
    <div class="hero-cup">
      <h1 class="cup-title">Copa Ecuador 2026</h1>
      <p style="color:rgba(255,255,255,0.6);">Eliminación directa · 16 Equipos · El camino a la gloria</p>
      <button class="btn-generate" id="btnGen" onclick="generarCopa()">⚙️ Generar Brackets (Octavos)</button>
    </div>

    <div class="bracket-container" id="bracket">
      <!-- Brackets se cargan aquí -->
    </div>
  </div>

  <script>
    const API = "/api/index?ruta=copa_partidos";
    const API_TEAMS = "/api/index?ruta=teams";
    let _bracketData = [];
    let _teams = [];

    async function init() {
      const [resB, resT] = await Promise.all([
        fetch(API).then(r => r.json()),
        fetch(API_TEAMS).then(r => r.json())
      ]);
      _bracketData = resB;
      _teams = resT;
      renderBracket();
    }

    async function generarCopa() {
      if (!confirm("¿Generar nueva Copa? Esto borrará el progreso actual.")) return;
      if (_teams.length < 16) { alert("Necesitas 16 equipos."); return; }

      const shuffled = [..._teams].sort(() => 0.5 - Math.random());
      const octavos = [];
      for (let i = 0; i < 8; i++) {
        octavos.push({
          id: "octavos_" + i,
          round: "octavos",
          local: { nombre: shuffled[i*2].nombre, logo: shuffled[i*2].logo },
          visitante: { nombre: shuffled[i*2+1].nombre, logo: shuffled[i*2+1].logo },
          resultado: { local: 0, visitante: 0 },
          jugado: false
        });
      }
      
      // Crear placeholders para siguientes rondas
      const rounds = ["cuartos", "semis", "final"];
      const counts = [4, 2, 1];
      const allMatches = [...octavos];

      rounds.forEach((r, idx) => {
        for (let i = 0; i < counts[idx]; i++) {
          allMatches.push({
            id: r + "_" + i,
            round: r,
            local: { nombre: "—", logo: "" },
            visitante: { nombre: "—", logo: "" },
            resultado: { local: 0, visitante: 0 },
            jugado: false
          });
        }
      });

      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ bracket: allMatches })
      });

      if (res.ok) location.reload();
    }

    function renderBracket() {
      const container = document.getElementById("bracket");
      container.innerHTML = "";
      if (!_bracketData.length) { container.innerHTML = "<p style='text-align:center; width:100%; opacity:0.5;'>Presiona Generar para iniciar el torneo</p>"; return; }

      const rounds = ["octavos", "cuartos", "semis", "final"];
      const roundLabels = ["Octavos", "Cuartos", "Semis", "Gran Final"];

      rounds.forEach((r, idx) => {
        const div = document.createElement("div");
        div.className = "round";
        div.innerHTML = `<div class="round-title">${roundLabels[idx]}</div>`;
        
        const matches = _bracketData.filter(m => m.round === r);
        matches.forEach(m => {
          const matchDiv = document.createElement("div");
          matchDiv.className = "match";
          const gl = m.resultado.local || 0;
          const gv = m.resultado.visitante || 0;
          const wl = m.jugado && gl > gv ? "winner" : "";
          const wv = m.jugado && gv > gl ? "winner" : "";

          matchDiv.innerHTML = `
            <div class="team-row ${wl}">
              <div class="team-info"><img class="team-logo" src="${m.local.logo}">${m.local.nombre}</div>
              <div class="score">${m.jugado ? gl : ""}</div>
            </div>
            <div class="team-row ${wv}">
              <div class="team-info"><img class="team-logo" src="${m.visitante.logo}">${m.visitante.nombre}</div>
              <div class="score">${m.jugado ? gv : ""}</div>
            </div>
            ${!m.jugado && m.local.nombre !== "—" && m.visitante.nombre !== "—" ? `<button class="btn-play-cup" onclick="jugarCopa('${m._id}')">▶</button>` : ""}
          `;
          div.appendChild(matchDiv);
        });
        container.appendChild(div);
      });
    }

    function jugarCopa(id) {
      localStorage.setItem("partidoSeleccionado", JSON.stringify({ pid: id, torneo: "copa" }));
      window.location.href = "/jugarpartido.html";
    }

    init();
  </script>
</body>
</html>
