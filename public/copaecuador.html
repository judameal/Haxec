<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copa Ecuador — Haxec Esport</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ══ BASE ══ */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── BACK BUTTON ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-head);
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 16px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      animation: fadeDown .4s ease .05s both;
      margin-bottom: 24px;
      align-self: flex-start;
    }
    .back-link:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateX(-3px);
      box-shadow: 0 4px 14px rgba(34,197,94,.15);
    }

    /* ══ PAGE LAYOUT ══ */
    .home-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
      position: relative;
      z-index: 1;
    }

    .hero-eyebrow {
      font-family: var(--font-head);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeDown .45s ease .1s forwards;
    }
    .hero-title {
      font-family: var(--font-head);
      font-size: clamp(2rem, 6vw, 3.4rem);
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--black);
      text-align: center;
      line-height: 1;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeDown .45s ease .18s forwards;
    }
    .hero-title span { color: var(--accent); }
    .hero-sub {
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 1px;
      margin-bottom: 26px;
      opacity: 0;
      animation: fadeDown .45s ease .24s forwards;
    }

    .actions-bar {
      display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeDown .45s ease .3s forwards;
    }
    .btn-action {
      font-family: var(--font-head);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      font-size: 0.8rem;
    }
    .btn-generate { background: var(--accent); color: var(--black); }
    .btn-schedule { background: var(--surface2); color: var(--text); border-color: var(--border) !important; }
    .btn-reset    { background: #dc2626; color: #fff; }
    .btn-action:hover { transform: translateY(-2px); filter: brightness(1.1); }

    /* ── BRACKET ── */
    .bracket-outer {
      overflow-x: auto;
      overflow-y: visible;
      padding: 10px 0 30px;
    }
    .bracket-grid {
      display: flex;
      align-items: stretch;
      min-width: max-content;
      position: relative;
    }

    /* ── ROUND COLUMN ── */
    .round-col {
      display: flex;
      flex-direction: column;
      min-width: 200px;
      position: relative;
      z-index: 1;
    }
    .round-label {
      font-family: var(--font-head);
      font-size: 0.65rem;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--accent);
      margin: 0 8px 0;
    }
    .matches-col {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      flex: 1;
      padding: 12px 0;
    }

    /* ── SPACER (holds SVG lines) ── */
    .round-spacer {
      width: 52px;
      flex-shrink: 0;
      position: relative;
      z-index: 0;
    }

    /* ── MATCH CARD ── */
    .match-wrap {
      position: relative;
      padding: 7px 8px;
    }
    .match-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      position: relative;
      z-index: 1;
    }
    .match-card:hover {
      border-color: var(--accent);
      box-shadow: 0 5px 18px var(--accent-glow);
      transform: translateY(-1px);
    }
    .match-card.jugado { background: var(--surface2); }

    /* DATE BAR */
    .match-date-bar {
      background: var(--black);
      border-bottom: 2px solid var(--accent);
      padding: 4px 10px;
      font-family: var(--font-head);
      font-size: 0.6rem;
      color: rgba(255,255,255,0.5);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* TEAM ROW */
    .team-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      gap: 7px;
      transition: background 0.15s;
    }
    .team-row + .team-row { border-top: 1px solid var(--border); }
    .team-row.winner { background: var(--surface3); }
    .team-info {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 0.78rem;
      color: var(--text);
      flex: 1;
      min-width: 0;
    }
    .team-row.winner .team-info { color: var(--accent-dark); }
    .team-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .team-row.tbd .team-name { color: var(--muted); font-style: italic; font-weight: 400; }

    .team-logo {
      width: 22px;
      height: 22px;
      object-fit: contain;
      border-radius: 3px;
      flex-shrink: 0;
      background: var(--surface3);
    }
    .team-row.tbd .team-logo { opacity: 0.25; }

    .score-box {
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 900;
      color: var(--muted);
      min-width: 22px;
      text-align: center;
    }
    .score-box.win {
      background: var(--black);
      color: var(--accent);
      border-radius: 5px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.88rem;
    }

    /* REPORT BTN */
    .btn-report-cup {
      display: block;
      margin: 0 10px 8px;
      width: calc(100% - 20px);
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px;
      font-size: 0.65rem;
      font-family: var(--font-head);
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .btn-report-cup:hover { background: var(--black); color: var(--accent); border-color: var(--black); }

    /* PLAY BTN */
    .btn-play-cup {
      position: absolute;
      right: -4px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--accent);
      color: var(--black);
      border: none;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.68rem;
      font-weight: 900;
      box-shadow: 0 3px 10px var(--accent-glow);
      transition: all 0.2s;
      z-index: 10;
    }
    .btn-play-cup:hover { transform: translateY(-50%) scale(1.2); background: var(--accent-dark); }

    /* EMPTY */
    .empty-bracket { text-align: center; padding: 70px 20px; color: var(--muted); width: 100%; }
    .empty-bracket .trophy { font-size: 3.5rem; margin-bottom: 12px; }

    /* CHAMPION BANNER - MINIMAL */
    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .champion-banner {
      margin: 40px auto 20px;
      background: var(--black);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      animation: dropIn 0.5s ease both;
    }
    .champion-trophy {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }
    .champion-logo {
      width: 70px; height: 70px;
      object-fit: contain;
      margin: 0 auto 12px;
      display: block;
    }
    .champion-name {
      font-family: var(--font-head);
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 1px;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .champion-title {
      font-family: var(--font-head);
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
    }
    .champion-title span {
      color: var(--accent);
    }

    /* SVG lines overlay */
    .bracket-svg {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 0;
      overflow: visible;
    }

    @keyframes slideUp {
      from { opacity:0; transform:translateY(28px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── INFORME OVERLAY ── */
    #informeOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,20,16,.82);
      backdrop-filter: blur(6px);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #informeOverlay.visible { display: flex; }

    .informe-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      width: 100%;
      max-width: 540px;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 24px 60px rgba(0,0,0,.35);
      animation: slideUp .25s cubic-bezier(.34,1.3,.64,1) both;
      color: var(--text);
    }
    .informe-header {
      background: var(--black);
      border-radius: 16px 16px 0 0;
      padding: 22px 24px 20px;
      text-align: center;
      position: relative;
      border-bottom: 2.5px solid var(--accent);
    }
    .informe-close {
      position: absolute; top:13px; right:15px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.7);
      border-radius: 50%; width:30px; height:30px;
      font-size:.85rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition: all .15s;
    }
    .informe-close:hover { background:var(--accent); color:var(--black); border-color:var(--accent); }
    .informe-ronda {
      font-family: var(--font-head);
      font-size:.65rem; letter-spacing:3px; text-transform:uppercase;
      color: var(--accent); font-weight:800; margin-bottom:18px;
    }
    .informe-teams {
      display: grid;
      grid-template-columns: 1fr 110px 1fr;
      align-items: center;
      gap: 6px;
    }
    .informe-team {
      display: flex; flex-direction:column;
      align-items:center; gap:8px;
    }
    .informe-team img { width:52px; height:52px; object-fit:contain; }
    .informe-team-name {
      font-family:var(--font-head); font-size:.75rem; font-weight:800;
      letter-spacing:.8px; text-transform:uppercase; color:#fff; text-align:center;
    }
    .informe-score-box { text-align:center; }
    .informe-score {
      font-family:var(--font-head); font-size:2.8rem; font-weight:900;
      color:#fff; letter-spacing:2px; line-height:1;
    }
    .informe-score-sep { color:var(--accent); margin:0 2px; }
    .informe-resultado-label {
      display:inline-block; margin-top:8px;
      background:var(--accent); color:var(--black);
      font-family:var(--font-head); font-size:.65rem; font-weight:800;
      letter-spacing:1.5px; text-transform:uppercase;
      padding:3px 12px; border-radius:20px;
    }
    .informe-fecha-label {
      font-size:.7rem; color:rgba(255,255,255,.4);
      margin-top:6px; font-family:var(--font-body);
    }
    .informe-body {
      padding:22px 24px 24px;
      background:var(--surface);
      border-radius:0 0 16px 16px;
    }
    .informe-section { margin-bottom:22px; }
    .informe-section:last-child { margin-bottom:0; }
    .informe-section-title {
      font-family:var(--font-head); font-size:.63rem;
      letter-spacing:2.5px; text-transform:uppercase;
      color:var(--accent-dark); font-weight:800;
      margin-bottom:10px;
      display:flex; align-items:center; gap:8px;
    }
    .informe-section-title::after { content:''; flex:1; height:1px; background:var(--border); }
    .mvp-card {
      background:var(--black); border-radius:12px;
      padding:14px 18px; display:flex; align-items:center; gap:14px;
    }
    .mvp-label { font-size:.62rem; color:var(--accent); text-transform:uppercase; letter-spacing:1.5px; font-weight:700; font-family:var(--font-head); }
    .mvp-nombre { font-size:1rem; font-weight:800; color:#fff; margin-top:3px; font-family:var(--font-head); letter-spacing:1px; }
    .valla-badge {
      display:inline-flex; align-items:center; gap:10px;
      background:var(--surface3); border:1.5px solid var(--accent);
      border-radius:10px; padding:10px 16px;
      font-size:.88rem; font-weight:700; color:var(--accent-dark);
      width:100%; font-family:var(--font-body);
    }
    .informe-stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .informe-stat-item {
      background:var(--surface2); border:1.5px solid var(--border);
      border-radius:10px; padding:10px 14px;
      display:flex; align-items:center; gap:10px;
    }
    .informe-stat-icon { font-size:1.1rem; flex-shrink:0; }
    .informe-stat-label { font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; font-weight:600; font-family:var(--font-head); }
    .informe-stat-val { font-size:.95rem; font-weight:800; color:var(--black); margin-top:2px; font-family:var(--font-head); }
    .timeline { display:flex; flex-direction:column; gap:5px; }
    .timeline-item {
      display:grid; grid-template-columns:38px 22px 1fr;
      align-items:center; gap:8px;
      padding:8px 10px; border-radius:8px;
      background:var(--surface2); border:1px solid var(--border);
      transition:background .15s, border-color .15s;
    }
    .timeline-item:hover { background:var(--surface3); border-color:var(--accent); }
    .timeline-min { font-family:var(--font-head); font-size:.72rem; font-weight:900; color:var(--accent-dark); text-align:right; }
    .timeline-icon { font-size:.88rem; text-align:center; }
    .timeline-nombre { font-size:.85rem; font-weight:700; color:var(--black); font-family:var(--font-head); }
    .timeline-sub { font-size:.7rem; color:var(--muted); margin-top:1px; }
    .notas-box {
      background:var(--surface2); border-left:3px solid var(--accent);
      border-radius:0 8px 8px 0; padding:12px 16px;
      font-size:.88rem; color:var(--text2); line-height:1.6; font-style:italic;
    }
    .informe-empty { text-align:center; color:var(--muted); font-size:.85rem; padding:16px 0; }
  </style>
</head>
<body>

  <div class="hex-mid"></div>

  <header>
    <div class="logo">
      <img src="https://r2.thesportsdb.com/images/media/league/badge/86kk7j1753772273.png/medium" alt="Copa Ecuador">
      <h1>Copa <span>Ecuador</span></h1>
    </div>
    <div id="nav" class="nav-buttons"></div>
  </header>

  <div class="home-wrap">

    <a class="back-link" href="/haxball.html">← Volver</a>

    <p class="hero-eyebrow">Copa Ecuador 2026</p>
    <h1 class="hero-title">Copa <span>Ecuador</span></h1>
    <p class="hero-sub">Torneo de Eliminación Directa</p>

    <div class="actions-bar" id="adminActions" style="display:none;">
      <button class="btn-action btn-generate" onclick="generarCopa()">⚙️ Generar Brackets</button>
      <button class="btn-action btn-schedule" onclick="window.location.href='/copahorario.html'">📅 Horarios</button>
      <button class="btn-action btn-reset" onclick="resetCopa()">🗑️ Reiniciar</button>
    </div>

    <div class="bracket-outer">
      <div class="bracket-grid" id="bracket"></div>
    </div>
  </div>

  <!-- INFORME OVERLAY -->
  <div id="informeOverlay" onclick="cerrarSiOverlay(event)">
    <div class="informe-card" id="informeCard"></div>
  </div>

  <script>
    const API       = "/api/index?ruta=copa_partidos";
    const API_TEAMS = "/api/index?ruta=teams";
    let _bracketData = [], _teams = [], _isAdmin = false;

    const ROUNDS      = ["octavos","cuartos","semis","final"];
    const ROUND_LABEL = { octavos:"Octavos de Final", cuartos:"Cuartos de Final", semis:"Semifinales", final:"Gran Final" };
    const ICONOS      = { gol:"⚽", asistencia:"👟", amarilla:"🟨", roja:"🟥" };

    /* ── INIT ── */
    async function init() {
      const user = JSON.parse(localStorage.getItem("user") || "null");
      _isAdmin = !!(user && user.role === "admin");
      if (_isAdmin) document.getElementById("adminActions").style.display = "flex";
      try {
        const [rb, rt] = await Promise.all([
          fetch(API).then(r => r.ok ? r.json() : []),
          fetch(API_TEAMS).then(r => r.ok ? r.json() : [])
        ]);
        _bracketData = Array.isArray(rb) ? rb : [];
        _teams       = Array.isArray(rt) ? rt : [];
        console.log(`✅ Cargados: ${_teams.length} equipos, ${_bracketData.length} partidos`);
      } catch(e) {
        console.error("Error al cargar datos:", e);
      }
      renderBracket();
    }

    /* ── LOGO HELPER ── */
    function logo(teamObj) {
      // Priority: logo stored in match → logo from teams DB → placeholder
      if (teamObj?.logo) return teamObj.logo;
      const t = _teams.find(t => t.nombre === teamObj?.nombre);
      return t?.logo || "";
    }

    /* ── GENERAR COPA ── */
    async function generarCopa() {
      if (_bracketData.length && !confirm("¿Generar nueva copa? Se borrará el torneo actual.")) return;

      const btn = document.querySelector(".btn-generate");
      const btnOriginal = btn?.innerHTML;
      if (btn) { btn.disabled = true; btn.textContent = "⏳ Cargando equipos..."; }

      try {
        // Siempre re-fetch equipos para asegurar datos frescos
        const rt = await fetch(API_TEAMS).then(r => r.ok ? r.json() : []);
        _teams = Array.isArray(rt) ? rt : [];

        if (!_teams.length) {
          alert("⚠️ No hay equipos en la base de datos. Agrega equipos primero.");
          if (btn) { btn.disabled = false; btn.innerHTML = btnOriginal; }
          return;
        }

        if (btn) btn.textContent = `⏳ Generando (${_teams.length} equipos)...`;
        console.log(`Generando copa con ${_teams.length} equipos:`, _teams.map(t => t.nombre));

        const shuffled = [..._teams].sort(() => 0.5 - Math.random());
        const all = [];

        // Con 16 equipos: octavos (8 partidos)
        // Con 8 equipos:  cuartos (4 partidos)
        const primerRound = shuffled.length >= 9 ? "octavos" : "cuartos";
        const numPartidosPrimerRound = Math.floor(Math.min(shuffled.length, 16) / 2);

        for (let i = 0; i < numPartidosPrimerRound; i++) {
          const l = shuffled[i * 2]     || { nombre: "—" };
          const v = shuffled[i * 2 + 1] || { nombre: "—" };
          all.push({
            round: primerRound, pos: i,
            local:     { nombre: l.nombre },
            visitante: { nombre: v.nombre },
            resultado: { local: 0, visitante: 0 }, jugado: false
          });
        }

        // Rondas siguientes vacías
        const siguientesRounds = primerRound === "octavos"
          ? ["cuartos", "semis", "final"]
          : ["semis", "final"];
        const siguientesCantidades = primerRound === "octavos"
          ? [4, 2, 1]
          : [2, 1];

        siguientesRounds.forEach((r, idx) => {
          for (let p = 0; p < siguientesCantidades[idx]; p++) {
            all.push({
              round: r, pos: p,
              local:     { nombre: "—" },
              visitante: { nombre: "—" },
              resultado: { local: 0, visitante: 0 }, jugado: false
            });
          }
        });

        console.log(`Total partidos generados: ${all.length}`, all.map(p => `${p.round}[${p.pos}]`));

        const res = await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ bracket: all })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.message || `Error ${res.status}`);

        console.log("Copa generada correctamente:", data);
        location.reload();

      } catch (e) {
        console.error("Error generando copa:", e);
        alert("❌ Error al generar brackets: " + e.message);
        if (btn) { btn.disabled = false; btn.innerHTML = btnOriginal; }
      }
    }

    async function resetCopa() {
      if (confirm("¿Borrar todo el torneo?")) {
        await fetch(API, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({bracket:[]}) });
        location.reload();
      }
    }

    /* ── RENDER BRACKET ── */
    function renderBracket() {
      const container = document.getElementById("bracket");
      container.innerHTML = "";

      if (!_bracketData.length) {
        container.innerHTML = `
          <div class="empty-bracket">
            <div class="trophy">🏆</div>
            <p>No hay torneo activo.</p>
            ${_isAdmin ? `<p style="margin-top:8px;font-size:.85rem;opacity:.5;">Genera los brackets desde el panel de admin.</p>` : ""}
          </div>`;
        return;
      }

      ROUNDS.forEach((r, ri) => {
        const matches = _bracketData.filter(m => m.round === r).sort((a,b) => a.pos - b.pos);
        if (!matches.length) return;

        // Round column
        const col = document.createElement("div");
        col.className = "round-col";

        const lbl = document.createElement("div");
        lbl.className = "round-label";
        lbl.textContent = ROUND_LABEL[r];
        col.appendChild(lbl);

        const matchesCol = document.createElement("div");
        matchesCol.className = "matches-col";

        matches.forEach(m => {
          const logoL = logo(m.local);
          const logoV = logo(m.visitante);
          const tL = !m.local?.nombre    || m.local.nombre    === "—";
          const tV = !m.visitante?.nombre || m.visitante.nombre === "—";
          const gl = m.jugado ? m.resultado?.local    : null;
          const gv = m.jugado ? m.resultado?.visitante : null;
          const wL = m.jugado && gl > gv;
          const wV = m.jugado && gv > gl;
          const fecha = m.fecha ? `📅 ${m.fecha}${m.hora ? " · " + m.hora : ""}` : "⏳ Pendiente";

          const wrap = document.createElement("div");
          wrap.className = "match-wrap";

          const card = document.createElement("div");
          card.className = "match-card" + (m.jugado ? " jugado" : "");
          card.dataset.round = r;
          card.dataset.pos   = m.pos;

          card.innerHTML = `
            <div class="match-date-bar">${fecha}</div>
            <div class="team-row ${wL?"winner":""} ${tL?"tbd":""}">
              <div class="team-info">
                ${logoL ? `<img class="team-logo" src="${logoL}" onerror="this.style.display='none'" alt="">` : `<span class="team-logo"></span>`}
                <span class="team-name">${tL ? "Por definir" : m.local.nombre}</span>
              </div>
              ${m.jugado ? `<div class="score-box ${wL?"win":""}">${gl}</div>` : `<div class="score-box" style="color:var(--border)">–</div>`}
            </div>
            <div class="team-row ${wV?"winner":""} ${tV?"tbd":""}">
              <div class="team-info">
                ${logoV ? `<img class="team-logo" src="${logoV}" onerror="this.style.display='none'" alt="">` : `<span class="team-logo"></span>`}
                <span class="team-name">${tV ? "Por definir" : m.visitante.nombre}</span>
              </div>
              ${m.jugado ? `<div class="score-box ${wV?"win":""}">${gv}</div>` : `<div class="score-box" style="color:var(--border)">–</div>`}
            </div>
            ${m.jugado ? `<button class="btn-report-cup" onclick="verInforme('${m._id}')">📝 Ver informe</button>` : ""}
          `;

          // Botón jugar — SOLO ADMIN
          if (_isAdmin && !m.jugado && !tL && !tV) {
            const btn = document.createElement("button");
            btn.className = "btn-play-cup";
            btn.title = "Jugar partido";
            btn.innerHTML = "▶";
            btn.onclick = () => jugarCopa(m._id);
            wrap.appendChild(card);
            wrap.appendChild(btn);
          } else {
            wrap.appendChild(card);
          }

          matchesCol.appendChild(wrap);
        });

        col.appendChild(matchesCol);
        container.appendChild(col);

        // Spacer between rounds (for SVG lines)
        if (ri < ROUNDS.length - 1) {
          const spacer = document.createElement("div");
          spacer.className = "round-spacer";
          spacer.dataset.from = r;
          spacer.dataset.to   = ROUNDS[ri + 1];
          container.appendChild(spacer);
        }
      });

      // Draw lines after layout
      requestAnimationFrame(() => drawLines());

      // Show Champion if final is played
      const finalMatch = _bracketData.find(m => m.round === "final");
      if (finalMatch && finalMatch.jugado) {
        const gl = finalMatch.resultado?.local || 0;
        const gv = finalMatch.resultado?.visitante || 0;
        if (gl !== gv) {
          const winner = gl > gv ? finalMatch.local : finalMatch.visitante;
          const champSection = document.createElement("div");
          champSection.className = "champion-banner";
          champSection.innerHTML = `
            <div class="champion-trophy">🏆</div>
            ${logo(winner) ? `<img class="champion-logo" src="${logo(winner)}" onerror="this.style.display='none'" alt="Campeón">` : ''}
            <div class="champion-name">${winner.nombre}</div>
            <div class="champion-title">Campeón de la <span>Copa Ecuador</span> 2026</div>
          `;
          container.parentElement.appendChild(champSection);
        }
      }
    }

    /* ── SVG BRACKET LINES ── */
    function drawLines() {
      const grid = document.getElementById("bracket");
      grid.querySelectorAll("svg.bracket-svg").forEach(s => s.remove());

      const gridRect = grid.getBoundingClientRect();
      const W = grid.scrollWidth;
      const H = grid.scrollHeight;

      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.classList.add("bracket-svg");
      svg.setAttribute("width", W);
      svg.setAttribute("height", H);
      svg.style.cssText = `position:absolute;top:0;left:0;width:${W}px;height:${H}px;pointer-events:none;z-index:0;overflow:visible`;

      const SL = grid.scrollLeft || 0;
      const ST = grid.scrollTop  || 0;

      for (let ri = 0; ri < ROUNDS.length - 1; ri++) {
        const rNow  = ROUNDS[ri];
        const rNext = ROUNDS[ri + 1];
        const leftCards  = [...grid.querySelectorAll(`[data-round="${rNow}"]`)].sort((a,b)=>+a.dataset.pos - +b.dataset.pos);
        const rightCards = [...grid.querySelectorAll(`[data-round="${rNext}"]`)].sort((a,b)=>+a.dataset.pos - +b.dataset.pos);

        rightCards.forEach((nextCard, i) => {
          const topCard = leftCards[i * 2];
          const botCard = leftCards[i * 2 + 1];
          if (!topCard || !botCard) return;

          const tR   = topCard.getBoundingClientRect();
          const bR   = botCard.getBoundingClientRect();
          const nR   = nextCard.getBoundingClientRect();

          const y1   = tR.top  + tR.height  / 2 - gridRect.top  + ST;
          const y2   = bR.top  + bR.height  / 2 - gridRect.top  + ST;
          const yN   = nR.top  + nR.height  / 2 - gridRect.top  + ST;
          const yMid = (y1 + y2) / 2;
          const x1   = tR.right  - gridRect.left + SL;
          const x2   = nR.left   - gridRect.left + SL;
          const xMid = x1 + (x2 - x1) / 2;

          const d = `M ${x1} ${y1} H ${xMid} V ${y2} M ${xMid} ${yMid} H ${x2}`;
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", d);
          path.setAttribute("fill", "none");
          path.setAttribute("stroke", "#b8860b");
          path.setAttribute("stroke-width", "1.5");
          path.setAttribute("stroke-opacity", "0.45");
          path.setAttribute("stroke-linecap", "round");
          svg.appendChild(path);
        });
      }

      grid.appendChild(svg);
    }

    /* ── INFORME ── */
    function verInforme(id) {
      const p = _bracketData.find(x => x._id === id);
      if (!p) return;

      const local     = p.local     || {};
      const visitante = p.visitante || {};
      const logoL = logo(local);
      const logoV = logo(visitante);
      const card  = document.getElementById("informeCard");
      const rondaLabel = (ROUND_LABEL[p.round] || p.round || "Copa Ecuador") + " · Copa Ecuador 2026";

      const eventos  = p.eventos || [];
      const gl = Number(p.resultado?.local    ?? 0);
      const gv = Number(p.resultado?.visitante ?? 0);
      const contar = (eq, tipo) => eventos.filter(e => e.equipo === eq && e.tipo === tipo).length;
      const localNom    = local.nombre    || "Local";
      const visitNom    = visitante.nombre || "Visitante";
      const resLabel = gl > gv ? "Victoria " + localNom : gv > gl ? "Victoria " + visitNom : "Empate";
      const vallaL = gv === 0;
      const vallaV = gl === 0;
      const evSorted = eventos.slice().sort((a,b) => a.minuto - b.minuto);

      let html = `
      <div class="informe-header">
        <button class="informe-close" onclick="cerrarReporte()">✕</button>
        <div class="informe-ronda">${rondaLabel}</div>
        <div class="informe-teams">
          <div class="informe-team">
            ${logoL ? `<img src="${logoL}" onerror="this.style.display='none'" alt="">` : ""}
            <div class="informe-team-name">${localNom}</div>
          </div>
          <div class="informe-score-box">
            <div class="informe-score"><span>${gl}</span><span class="informe-score-sep">–</span><span>${gv}</span></div>
            <div class="informe-resultado-label">${resLabel}</div>
            ${p.fecha ? `<div class="informe-fecha-label">${p.fecha}${p.hora ? " · " + p.hora : ""}</div>` : ""}
          </div>
          <div class="informe-team">
            ${logoV ? `<img src="${logoV}" onerror="this.style.display='none'" alt="">` : ""}
            <div class="informe-team-name">${visitNom}</div>
          </div>
        </div>
      </div>
      <div class="informe-body">`;

      // MVP
      if (p.mvp) html += `<div class="informe-section"><div class="informe-section-title">👑 MVP del partido</div><div class="mvp-card"><div style="font-size:1.5rem">👑</div><div><div class="mvp-label">Jugador más valioso</div><div class="mvp-nombre">${p.mvp}</div></div></div></div>`;

      // Valla
      if (vallaL || vallaV) {
        html += `<div class="informe-section"><div class="informe-section-title">🧤 Valla invicta</div><div style="display:flex;flex-direction:column;gap:6px;">`;
        if (vallaL) html += `<div class="valla-badge">🧤 ${localNom} — arco a 0</div>`;
        if (vallaV) html += `<div class="valla-badge">🧤 ${visitNom} — arco a 0</div>`;
        html += `</div></div>`;
      }

      // Stats
      html += `<div class="informe-section"><div class="informe-section-title">📊 Estadísticas</div><div class="informe-stats-grid">
        ${buildStat("⚽","Goles",gl,gv)}
        ${buildStat("👟","Asistencias",contar("local","asistencia"),contar("visitante","asistencia"))}
        ${buildStat("🟨","Amarillas",contar("local","amarilla"),contar("visitante","amarilla"))}
        ${buildStat("🟥","Rojas",contar("local","roja"),contar("visitante","roja"))}
      </div></div>`;

      // Timeline
      html += `<div class="informe-section"><div class="informe-section-title">📋 Cronología</div>`;
      if (evSorted.length) {
        html += `<div class="timeline">`;
        evSorted.forEach(e => {
          const eqNom = e.equipo === "local" ? localNom : visitNom;
          html += `<div class="timeline-item"><div class="timeline-min">${e.minuto}'</div><div class="timeline-icon">${ICONOS[e.tipo]||"•"}</div><div><div class="timeline-nombre">${e.jugador}</div><div class="timeline-sub">${eqNom} · ${e.tipo}</div></div></div>`;
        });
        html += `</div>`;
      } else {
        html += `<p class="informe-empty">Sin eventos registrados.</p>`;
      }
      html += `</div>`;

      // Notas
      if (p.notas) html += `<div class="informe-section"><div class="informe-section-title">📝 Notas</div><div class="notas-box">${p.notas}</div></div>`;

      html += `</div>`;
      card.innerHTML = html;
      document.getElementById("informeOverlay").classList.add("visible");
      document.body.style.overflow = "hidden";
    }

    function buildStat(icono, label, vL, vV) {
      return `<div class="informe-stat-item"><div class="informe-stat-icon">${icono}</div><div><div class="informe-stat-label">${label}</div><div class="informe-stat-val">${vL} – ${vV}</div></div></div>`;
    }

    function cerrarReporte() {
      document.getElementById("informeOverlay").classList.remove("visible");
      document.body.style.overflow = "";
    }
    function cerrarSiOverlay(e) { if (e.target === document.getElementById("informeOverlay")) cerrarReporte(); }

    function jugarCopa(id) {
      localStorage.setItem("partidoSeleccionado", JSON.stringify({ pid: id, torneo: "copa" }));
      window.location.href = "/jugarpartidocopa.html";
    }

    init();
  </script>
