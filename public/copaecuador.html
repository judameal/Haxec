<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copa Ecuador — Haxec Esport</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── HERO ── */
    .hero-cup {
      text-align: center;
      padding: 44px 24px 32px;
      background: var(--black);
      border-radius: 16px;
      margin-bottom: 32px;
      border-bottom: 3px solid var(--accent);
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .cup-title {
      font-family: var(--font-head);
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 900;
      letter-spacing: 5px;
      margin: 0 0 4px;
      color: #fff;
      text-transform: uppercase;
    }
    .cup-title span { color: var(--accent); }
    .cup-subtitle {
      font-family: var(--font-head);
      color: rgba(255,255,255,0.35);
      font-size: 0.72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 22px;
    }
    .actions-bar { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .btn-action {
      font-family: var(--font-head);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      font-size: 0.8rem;
    }
    .btn-generate { background: var(--accent); color: var(--black); }
    .btn-schedule { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2) !important; }
    .btn-reset    { background: #dc2626; color: #fff; }
    .btn-action:hover { transform: translateY(-2px); filter: brightness(1.1); }

    /* ── BRACKET ── */
    .bracket-outer {
      overflow-x: auto;
      overflow-y: visible;
      padding: 10px 0 30px;
    }
    .bracket-grid {
      display: flex;
      align-items: stretch;
      min-width: max-content;
      position: relative;
    }

    /* ── ROUND COLUMN ── */
    .round-col {
      display: flex;
      flex-direction: column;
      min-width: 200px;
      position: relative;
      z-index: 1;
    }
    .round-label {
      font-family: var(--font-head);
      font-size: 0.65rem;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--accent);
      margin: 0 8px 0;
    }
    .matches-col {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      flex: 1;
      padding: 12px 0;
    }

    /* ── SPACER (holds SVG lines) ── */
    .round-spacer {
      width: 52px;
      flex-shrink: 0;
      position: relative;
      z-index: 0;
    }

    /* ── MATCH CARD ── */
    .match-wrap {
      position: relative;
      padding: 7px 8px;
    }
    .match-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      position: relative;
      z-index: 1;
    }
    .match-card:hover {
      border-color: var(--accent);
      box-shadow: 0 5px 18px var(--accent-glow);
      transform: translateY(-1px);
    }
    .match-card.jugado { background: var(--surface2); }

    /* DATE BAR */
    .match-date-bar {
      background: var(--black);
      border-bottom: 2px solid var(--accent);
      padding: 4px 10px;
      font-family: var(--font-head);
      font-size: 0.6rem;
      color: rgba(255,255,255,0.5);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* TEAM ROW */
    .team-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      gap: 7px;
      transition: background 0.15s;
    }
    .team-row + .team-row { border-top: 1px solid var(--border); }
    .team-row.winner { background: var(--surface3); }
    .team-info {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 0.78rem;
      color: var(--text);
      flex: 1;
      min-width: 0;
    }
    .team-row.winner .team-info { color: var(--accent-dark); }
    .team-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .team-row.tbd .team-name { color: var(--muted); font-style: italic; font-weight: 400; }

    .team-logo {
      width: 22px;
      height: 22px;
      object-fit: contain;
      border-radius: 3px;
      flex-shrink: 0;
      background: var(--surface3);
    }
    .team-row.tbd .team-logo { opacity: 0.25; }

    .score-box {
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 900;
      color: var(--muted);
      min-width: 22px;
      text-align: center;
    }
    .score-box.win {
      background: var(--black);
      color: var(--accent);
      border-radius: 5px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.88rem;
    }

    /* REPORT BTN */
    .btn-report-cup {
      display: block;
      margin: 0 10px 8px;
      width: calc(100% - 20px);
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px;
      font-size: 0.65rem;
      font-family: var(--font-head);
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .btn-report-cup:hover { background: var(--black); color: var(--accent); border-color: var(--black); }

    /* PLAY BTN */
    .btn-play-cup {
      position: absolute;
      right: -4px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--accent);
      color: var(--black);
      border: none;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.68rem;
      font-weight: 900;
      box-shadow: 0 3px 10px var(--accent-glow);
      transition: all 0.2s;
      z-index: 10;
    }
    .btn-play-cup:hover { transform: translateY(-50%) scale(1.2); background: var(--accent-dark); }

    /* EMPTY */
    .empty-bracket { text-align: center; padding: 70px 20px; color: var(--muted); width: 100%; }
    .empty-bracket .trophy { font-size: 3.5rem; margin-bottom: 12px; }

    /* SVG lines overlay */
    .bracket-svg {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 0;
      overflow: visible;
    }

    /* ── MODAL ── */
    .modal {
      display: none; position: fixed; z-index: 1000;
      left: 0; top: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
    }
    .modal-content {
      background: var(--surface);
      border: 1.5px solid var(--border);
      margin: 8% auto; padding: 28px;
      border-radius: 16px; width: 90%; max-width: 440px;
      box-shadow: 0 16px 50px rgba(0,0,0,0.14);
      animation: fadeUp .2s ease both;
    }
    .modal-title {
      font-family: var(--font-head); font-size: 0.9rem; font-weight: 900;
      text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 18px; color: var(--black);
      border-bottom: 2px solid var(--accent); padding-bottom: 11px;
    }
    .report-mvp {
      background: var(--surface2); border: 1.5px solid var(--accent);
      border-radius: 10px; padding: 10px 14px; margin-bottom: 14px;
      display: flex; gap: 10px; align-items: center;
      font-weight: 700; color: var(--accent-dark); font-family: var(--font-head);
    }
    .report-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      font-size: 0.88rem; color: var(--text);
    }
    .report-item:last-child { border-bottom: none; }
    .event-tipo {
      font-size: 0.66rem; font-family: var(--font-head); font-weight: 800;
      text-transform: uppercase; letter-spacing: 1px;
      padding: 3px 7px; border-radius: 5px;
      background: var(--surface3); color: var(--muted);
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="https://r2.thesportsdb.com/images/media/league/badge/86kk7j1753772273.png/medium" alt="Copa Ecuador">
      <h1>Copa <span>Ecuador</span></h1>
    </div>
    <div class="nav-buttons">
      <button onclick="window.location.href='/haxball.html'">Atrás</button>
    </div>
  </header>

  <div class="admin-container">
    <div class="hero-cup">
      <h1 class="cup-title">Copa <span>Ecuador</span> 2026</h1>
      <p class="cup-subtitle">Torneo de Eliminación Directa</p>
      <div class="actions-bar" id="adminActions" style="display:none;">
        <button class="btn-action btn-generate" onclick="generarCopa()">⚙️ Generar Brackets</button>
        <button class="btn-action btn-schedule" onclick="window.location.href='/copahorario.html'">📅 Horarios</button>
        <button class="btn-action btn-reset" onclick="resetCopa()">🗑️ Reiniciar</button>
      </div>
    </div>

    <div class="bracket-outer">
      <div class="bracket-grid" id="bracket"></div>
    </div>
  </div>

  <!-- MODAL INFORME -->
  <div id="modalReporte" class="modal" onclick="cerrarSiOverlay(event)">
    <div class="modal-content">
      <div class="modal-title" id="reporteTitulo"></div>
      <div id="reporteBody"></div>
      <button class="add-btn" onclick="cerrarReporte()" style="margin-top:18px;width:100%;">Cerrar</button>
    </div>
  </div>

  <script>
    const API       = "/api/index?ruta=copa_partidos";
    const API_TEAMS = "/api/index?ruta=teams";
    let _bracketData = [], _teams = [], _isAdmin = false;

    const ROUNDS      = ["octavos","cuartos","semis","final"];
    const ROUND_LABEL = { octavos:"Octavos de Final", cuartos:"Cuartos de Final", semis:"Semifinales", final:"Gran Final" };
    const ICONOS      = { gol:"⚽", asistencia:"👟", amarilla:"🟨", roja:"🟥" };

    /* ── INIT ── */
    async function init() {
      const user = JSON.parse(localStorage.getItem("user") || "null");
      _isAdmin = !!(user && user.role === "admin");
      if (_isAdmin) document.getElementById("adminActions").style.display = "flex";
      try {
        const [rb, rt] = await Promise.all([
          fetch(API).then(r => r.json()),
          fetch(API_TEAMS).then(r => r.json())
        ]);
        _bracketData = Array.isArray(rb) ? rb : [];
        _teams       = Array.isArray(rt) ? rt : [];
      } catch(e) { console.error(e); }
      renderBracket();
    }

    /* ── LOGO HELPER ── */
    function logo(teamObj) {
      // Priority: logo stored in match → logo from teams DB → placeholder
      if (teamObj?.logo) return teamObj.logo;
      const t = _teams.find(t => t.nombre === teamObj?.nombre);
      return t?.logo || "";
    }

    /* ── GENERAR ── */
    async function generarCopa() {
      if (_bracketData.length && !confirm("¿Generar nueva copa? Se borrará el torneo actual.")) return;
      const shuffled = [..._teams].sort(() => 0.5 - Math.random());
      const all = [];
      for (let i = 0; i < 8; i++) {
        const l = shuffled[i*2]   || { nombre:"—", logo:"" };
        const v = shuffled[i*2+1] || { nombre:"—", logo:"" };
        all.push({ round:"octavos", pos:i,
          local:    { nombre:l.nombre, logo:l.logo||"" },
          visitante:{ nombre:v.nombre, logo:v.logo||"" },
          resultado:{ local:0, visitante:0 }, jugado:false });
      }
      ["cuartos","semis","final"].forEach((r,i) => {
        for (let p = 0; p < [4,2,1][i]; p++)
          all.push({ round:r, pos:p, local:{nombre:"—",logo:""}, visitante:{nombre:"—",logo:""}, resultado:{local:0,visitante:0}, jugado:false });
      });
      await fetch(API, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({bracket:all}) });
      location.reload();
    }

    async function resetCopa() {
      if (confirm("¿Borrar todo el torneo?")) {
        await fetch(API, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({bracket:[]}) });
        location.reload();
      }
    }

    /* ── RENDER BRACKET ── */
    function renderBracket() {
      const container = document.getElementById("bracket");
      container.innerHTML = "";

      if (!_bracketData.length) {
        container.innerHTML = `
          <div class="empty-bracket">
            <div class="trophy">🏆</div>
            <p>No hay torneo activo.</p>
            ${_isAdmin ? `<p style="margin-top:8px;font-size:.85rem;opacity:.5;">Genera los brackets desde el panel de admin.</p>` : ""}
          </div>`;
        return;
      }

      ROUNDS.forEach((r, ri) => {
        const matches = _bracketData.filter(m => m.round === r).sort((a,b) => a.pos - b.pos);
        if (!matches.length) return;

        // Round column
        const col = document.createElement("div");
        col.className = "round-col";

        const lbl = document.createElement("div");
        lbl.className = "round-label";
        lbl.textContent = ROUND_LABEL[r];
        col.appendChild(lbl);

        const matchesCol = document.createElement("div");
        matchesCol.className = "matches-col";

        matches.forEach(m => {
          const logoL = logo(m.local);
          const logoV = logo(m.visitante);
          const tL = !m.local?.nombre    || m.local.nombre    === "—";
          const tV = !m.visitante?.nombre || m.visitante.nombre === "—";
          const gl = m.jugado ? m.resultado?.local    : null;
          const gv = m.jugado ? m.resultado?.visitante : null;
          const wL = m.jugado && gl > gv;
          const wV = m.jugado && gv > gl;
          const fecha = m.fecha ? `📅 ${m.fecha}${m.hora ? " · " + m.hora : ""}` : "⏳ Pendiente";

          const wrap = document.createElement("div");
          wrap.className = "match-wrap";

          const card = document.createElement("div");
          card.className = "match-card" + (m.jugado ? " jugado" : "");
          card.dataset.round = r;
          card.dataset.pos   = m.pos;

          card.innerHTML = `
            <div class="match-date-bar">${fecha}</div>
            <div class="team-row ${wL?"winner":""} ${tL?"tbd":""}">
              <div class="team-info">
                ${logoL ? `<img class="team-logo" src="${logoL}" onerror="this.style.display='none'" alt="">` : `<span class="team-logo"></span>`}
                <span class="team-name">${tL ? "Por definir" : m.local.nombre}</span>
              </div>
              ${m.jugado ? `<div class="score-box ${wL?"win":""}">${gl}</div>` : `<div class="score-box" style="color:var(--border)">–</div>`}
            </div>
            <div class="team-row ${wV?"winner":""} ${tV?"tbd":""}">
              <div class="team-info">
                ${logoV ? `<img class="team-logo" src="${logoV}" onerror="this.style.display='none'" alt="">` : `<span class="team-logo"></span>`}
                <span class="team-name">${tV ? "Por definir" : m.visitante.nombre}</span>
              </div>
              ${m.jugado ? `<div class="score-box ${wV?"win":""}">${gv}</div>` : `<div class="score-box" style="color:var(--border)">–</div>`}
            </div>
            ${m.jugado ? `<button class="btn-report-cup" onclick="verInforme('${m._id}')">📝 Ver informe</button>` : ""}
          `;

          // Botón jugar — SOLO ADMIN
          if (_isAdmin && !m.jugado && !tL && !tV) {
            const btn = document.createElement("button");
            btn.className = "btn-play-cup";
            btn.title = "Jugar partido";
            btn.innerHTML = "▶";
            btn.onclick = () => jugarCopa(m._id);
            wrap.appendChild(card);
            wrap.appendChild(btn);
          } else {
            wrap.appendChild(card);
          }

          matchesCol.appendChild(wrap);
        });

        col.appendChild(matchesCol);
        container.appendChild(col);

        // Spacer between rounds (for SVG lines)
        if (ri < ROUNDS.length - 1) {
          const spacer = document.createElement("div");
          spacer.className = "round-spacer";
          spacer.dataset.from = r;
          spacer.dataset.to   = ROUNDS[ri + 1];
          container.appendChild(spacer);
        }
      });

      // Draw lines after layout
      requestAnimationFrame(() => drawLines());
    }

    /* ── SVG BRACKET LINES ── */
    function drawLines() {
      const grid = document.getElementById("bracket");
      grid.querySelectorAll("svg.bracket-svg").forEach(s => s.remove());

      const gridRect = grid.getBoundingClientRect();
      const W = grid.scrollWidth;
      const H = grid.scrollHeight;

      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.classList.add("bracket-svg");
      svg.setAttribute("width", W);
      svg.setAttribute("height", H);
      svg.style.cssText = `position:absolute;top:0;left:0;width:${W}px;height:${H}px;pointer-events:none;z-index:0;overflow:visible`;

      const SL = grid.scrollLeft || 0;
      const ST = grid.scrollTop  || 0;

      for (let ri = 0; ri < ROUNDS.length - 1; ri++) {
        const rNow  = ROUNDS[ri];
        const rNext = ROUNDS[ri + 1];
        const leftCards  = [...grid.querySelectorAll(`[data-round="${rNow}"]`)].sort((a,b)=>+a.dataset.pos - +b.dataset.pos);
        const rightCards = [...grid.querySelectorAll(`[data-round="${rNext}"]`)].sort((a,b)=>+a.dataset.pos - +b.dataset.pos);

        rightCards.forEach((nextCard, i) => {
          const topCard = leftCards[i * 2];
          const botCard = leftCards[i * 2 + 1];
          if (!topCard || !botCard) return;

          const tR   = topCard.getBoundingClientRect();
          const bR   = botCard.getBoundingClientRect();
          const nR   = nextCard.getBoundingClientRect();

          const y1   = tR.top  + tR.height  / 2 - gridRect.top  + ST;
          const y2   = bR.top  + bR.height  / 2 - gridRect.top  + ST;
          const yN   = nR.top  + nR.height  / 2 - gridRect.top  + ST;
          const yMid = (y1 + y2) / 2;
          const x1   = tR.right  - gridRect.left + SL;
          const x2   = nR.left   - gridRect.left + SL;
          const xMid = x1 + (x2 - x1) / 2;

          const d = `M ${x1} ${y1} H ${xMid} V ${y2} M ${xMid} ${yMid} H ${x2}`;
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", d);
          path.setAttribute("fill", "none");
          path.setAttribute("stroke", "#b8860b");
          path.setAttribute("stroke-width", "1.5");
          path.setAttribute("stroke-opacity", "0.45");
          path.setAttribute("stroke-linecap", "round");
          svg.appendChild(path);
        });
      }

      grid.appendChild(svg);
    }

    /* ── INFORME ── */
    function verInforme(id) {
      const p = _bracketData.find(x => x._id === id);
      if (!p) return;
      document.getElementById("reporteTitulo").textContent = `${p.local?.nombre} vs ${p.visitante?.nombre}`;
      let html = "";
      if (p.mvp) html += `<div class="report-mvp"><span>⭐</span><div><div style="font-size:.68rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;">MVP</div><div>${p.mvp}</div></div></div>`;
      if (p.eventos?.length) {
        const sorted = [...p.eventos].sort((a,b) => a.minuto - b.minuto);
        html += sorted.map(e => `
          <div class="report-item">
            <span>${e.minuto}' &nbsp;${ICONOS[e.tipo]||"•"}&nbsp; ${e.jugador}</span>
            <span class="event-tipo">${e.tipo}</span>
          </div>`).join("");
      } else {
        html += `<div style="text-align:center;padding:20px 0;color:var(--muted);font-size:.9rem;">Sin eventos registrados.</div>`;
      }
      document.getElementById("reporteBody").innerHTML = html;
      document.getElementById("modalReporte").style.display = "block";
    }

    function cerrarReporte() { document.getElementById("modalReporte").style.display = "none"; }
    function cerrarSiOverlay(e) { if (e.target === document.getElementById("modalReporte")) cerrarReporte(); }

    function jugarCopa(id) {
      localStorage.setItem("partidoSeleccionado", JSON.stringify({ pid: id, torneo: "copa" }));
      window.location.href = "/jugarpartidocopa.html";
    }

    init();
  </script>
</body>
</html>
