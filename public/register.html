<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro — Haxec Esport</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #e8eaf0;
      display: flex;
      flex-direction: column;
      font-family: 'DM Sans', sans-serif;
      color: #151616;
      overflow-x: hidden;
    }

    /* ── FONDO ── */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .bg-layer::before {
      content: "";
      position: absolute;
      inset: 0;
    }
    .bg-layer::after {
      content: "";
      position: absolute;
      inset: 0;
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);
    }

    /* ── MAIN ── */
    main {
      position: relative;
      z-index: 5;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* ── CARD ── */
    .auth-card {
      width: 100%;
      max-width: 400px;
      animation: cardIn .5s ease both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header { margin-bottom: 32px; }
    .card-eyebrow {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #22c55e;
      margin-bottom: 8px;
    }
    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 2px;
      color: #0e0d0d;
      font-weight: 400;
      line-height: 1;
    }
    .card-sub {
      font-size: .85rem;
      color: rgba(15, 15, 15, 0.596);
      margin-top: 6px;
    }

    /* ── FORM ── */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.301);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: .95rem;
      font-family: 'DM Sans', sans-serif;
      color: #fff;
      outline: none;
      transition: border-color .2s, background .2s, box-shadow .2s;
    }
    .form-input::placeholder { color: rgba(255,255,255,.2); }
    .form-input:focus {
      border-color: #22c55e;
      background: rgba(34,197,94,.06);
      box-shadow: 0 0 0 3px rgba(34,197,94,.12);
    }

    /* ── BOTÓN ── */
    .btn-submit {
      width: 100%;
      margin-top: 8px;
      background: #22c55e;
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: .95rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: .5px;
      cursor: pointer;
      transition: background .15s, transform .15s, box-shadow .15s;
    }
    .btn-submit:hover {
      background: #16a34a;
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(34,197,94,.3);
    }
    .btn-submit:active { transform: translateY(0); }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgb(27, 27, 27);
    }
    .divider span { font-size: .72rem; color: rgba(17, 16, 16, 0.89); white-space: nowrap; }

    /* Link login */
    .auth-footer {
      text-align: center;
      font-size: .85rem;
      color: rgba(27, 26, 26, 0.836);
    }
    .auth-footer a {
      color: #22c55e;
      font-weight: 700;
      text-decoration: none;
      transition: color .15s;
    }
    .auth-footer a:hover { color: #4ade80; }

    /* Mensaje */
    .toast-msg {
      display: none;
      padding: 11px 16px;
      border-radius: 8px;
      font-size: .83rem;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .toast-msg.error   { display: block; background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); color: #f87171; }
    .toast-msg.success { display: block; background: rgba(34,197,94,.1);  border: 1px solid rgba(34,197,94,.3);  color: #4ade80; }

    /* ── FOOTER ── */
    footer {
      position: relative; z-index: 10;
      text-align: center; padding: 18px;
      font-size: .75rem; color: rgba(255, 255, 255, 0.89);
      border-top: 1px solid rgb(0, 0, 0);
    }
  </style>
</head>
<body>

<div class="bg-layer"></div>

<main>
  <div class="auth-card">

    <div class="card-header">
      <div class="card-eyebrow">Únete a la liga</div>
      <div class="card-title">Crear cuenta</div>
      <div class="card-sub">Regístrate para seguir la temporada</div>
    </div>

    <div id="msgBox" class="toast-msg"></div>

    <div class="form-group">
      <label class="form-label" for="username">Usuario</label>
      <input class="form-input" id="username" type="text" placeholder="Elige un nombre de usuario" autocomplete="username">
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Contraseña</label>
      <input class="form-input" id="password" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" oninput="checkStrength(this.value)">
      <div class="strength-bar">
        <div class="strength-seg" id="seg1"></div>
        <div class="strength-seg" id="seg2"></div>
        <div class="strength-seg" id="seg3"></div>
      </div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>

    <button class="btn-submit" onclick="register()">Crear cuenta →</button>

    <div class="divider"><span>¿Ya eres miembro?</span></div>

    <p class="auth-footer">
      ¿Ya tienes cuenta? <a href="/login.html">Inicia sesión</a>
    </p>

  </div>
</main>

<footer>
  <p>© 2026 Haxec Esport — Hecho por Judameal</p>
</footer>

<script src="js/app.js"></script>
<script>
  document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") register();
  });

  function checkStrength(val) {
    var s1 = document.getElementById("seg1");
    var s2 = document.getElementById("seg2");
    var s3 = document.getElementById("seg3");
    var lbl = document.getElementById("strengthLabel");
    var len = val.length;

    s1.className = "strength-seg";
    s2.className = "strength-seg";
    s3.className = "strength-seg";
    lbl.textContent = "";

    if (!len) return;

    var hasUpper  = /[A-Z]/.test(val);
    var hasNum    = /[0-9]/.test(val);
    var hasSymbol = /[^a-zA-Z0-9]/.test(val);
    var score = (len >= 6 ? 1 : 0) + (hasUpper || hasNum ? 1 : 0) + (hasSymbol || (hasUpper && hasNum) ? 1 : 0);

    if (score === 1) {
      s1.classList.add("weak");
      lbl.textContent = "Débil";
      lbl.style.color = "#ef4444";
    } else if (score === 2) {
      s1.classList.add("medium"); s2.classList.add("medium");
      lbl.textContent = "Media";
      lbl.style.color = "#f59e0b";
    } else {
      s1.classList.add("strong"); s2.classList.add("strong"); s3.classList.add("strong");
      lbl.textContent = "Fuerte";
      lbl.style.color = "#22c55e";
    }
  }
</script>
</body>
</html>
