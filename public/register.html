<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro — LigaPro Ecuabet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f8f8f6;
      display: flex;
      flex-direction: column;
      font-family: 'Rajdhani', sans-serif;
      color: #0f1410;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 380px;
      background: #ffffff;
      border: 1.5px solid #e8e8e0;
      border-radius: 20px;
      padding: 40px 36px 34px;
      box-shadow: 0 8px 40px rgba(0,0,0,.07);
      animation: cardIn .5s cubic-bezier(.34,1.2,.64,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 30px;
      opacity: 0;
      animation: fadeUp .4s ease .1s forwards;
    }
    .logo-pill {
      background: #0f1410;
      color: #b8860b;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 5px;
    }
    .logo-sep { flex: 1; height: 1px; background: #e8e8e0; }

    .card-header {
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp .4s ease .18s forwards;
    }
    .card-eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #9a9a9a;
      margin-bottom: 6px;
    }
    .card-title {
      font-family: 'Exo 2', sans-serif;
      font-size: 1.9rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #0f1410;
      line-height: 1;
    }
    .card-title span { color: #b8860b; }

    .toast-msg {
      display: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.83rem;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .toast-msg.error {
      display: block;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
    }
    .toast-msg.success {
      display: block;
      background: #fefce8;
      border: 1px solid #fde68a;
      color: #92400e;
    }

    .form-group {
      margin-bottom: 14px;
      opacity: 0;
      animation: fadeUp .4s ease forwards;
    }
    .form-group:nth-child(1) { animation-delay: .24s; }
    .form-group:nth-child(2) { animation-delay: .30s; }

    .form-label {
      display: block;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #9a9a9a;
      margin-bottom: 7px;
    }

    .form-input {
      width: 100%;
      background: #f8f8f6;
      border: 1.5px solid #e8e8e0;
      border-radius: 10px;
      padding: 12px 15px;
      font-size: 0.95rem;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      color: #0f1410;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .form-input::placeholder { color: #c0c0b8; }
    .form-input:focus {
      border-color: #b8860b;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(184,134,11,.1);
    }

    /* Barra de fuerza */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    .strength-seg {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: #e8e8e0;
      transition: background .2s;
    }
    .strength-seg.weak   { background: #ef4444; }
    .strength-seg.medium { background: #f59e0b; }
    .strength-seg.strong { background: #b8860b; }
    .strength-label {
      font-size: 0.72rem;
      font-weight: 600;
      margin-top: 4px;
      letter-spacing: 1px;
      font-family: 'Exo 2', sans-serif;
    }

    .btn-submit {
      width: 100%;
      margin-top: 8px;
      background: #0f1410;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 0.85rem;
      font-weight: 800;
      font-family: 'Exo 2', sans-serif;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .18s, transform .18s, box-shadow .18s;
      opacity: 0;
      animation: fadeUp .4s ease .38s forwards;
    }
    .btn-submit:hover {
      background: #b8860b;
      color: #0f1410;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(184,134,11,.22);
    }
    .btn-submit:active { transform: translateY(0); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0 16px;
      opacity: 0;
      animation: fadeUp .4s ease .44s forwards;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e8e8e0;
    }
    .divider span {
      font-size: 0.68rem;
      color: #9a9a9a;
      white-space: nowrap;
      letter-spacing: 1.5px;
      font-family: 'Exo 2', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
    }

    .auth-footer {
      text-align: center;
      font-size: 0.88rem;
      color: #9a9a9a;
      opacity: 0;
      animation: fadeUp .4s ease .5s forwards;
    }
    .auth-footer a {
      color: #b8860b;
      font-weight: 700;
      text-decoration: none;
      transition: color .15s;
    }
    .auth-footer a:hover { color: #8a6508; }

    footer {
      text-align: center;
      padding: 16px;
      font-size: 0.72rem;
      color: #b0b0b0;
      border-top: 1px solid #e8e8e0;
      letter-spacing: 1px;
      font-family: 'Exo 2', sans-serif;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<main>
  <div class="auth-card">
    <div class="card-logo">
      <div class="logo-pill">LigaPro Ecuabet</div>
      <div class="logo-sep"></div>
    </div>
    <div class="card-header">
      <div class="card-eyebrow">Únete a la liga</div>
      <div class="card-title">Crear <span>cuenta</span></div>
    </div>
    <div id="msgBox" class="toast-msg"></div>
    <div class="form-group">
      <label class="form-label" for="username">Usuario</label>
      <input class="form-input" id="username" type="text" placeholder="Elige un nombre de usuario" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Contraseña</label>
      <input class="form-input" id="password" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" oninput="checkStrength(this.value)">
      <div class="strength-bar">
        <div class="strength-seg" id="seg1"></div>
        <div class="strength-seg" id="seg2"></div>
        <div class="strength-seg" id="seg3"></div>
      </div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>
    <button class="btn-submit" onclick="register()">Crear cuenta →</button>
    <div class="divider"><span>¿Ya eres miembro?</span></div>
    <p class="auth-footer">
      ¿Ya tienes cuenta? <a href="/login.html">Inicia sesión</a>
    </p>
  </div>
</main>

<footer>
  <p>© 2026 LigaPro Ecuabet — Hecho por Judameal</p>
</footer>

<script src="js/app.js"></script>
<script>
  document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") register();
  });

  function checkStrength(val) {
    var s1 = document.getElementById("seg1");
    var s2 = document.getElementById("seg2");
    var s3 = document.getElementById("seg3");
    var lbl = document.getElementById("strengthLabel");

    s1.className = "strength-seg";
    s2.className = "strength-seg";
    s3.className = "strength-seg";
    lbl.textContent = "";

    if (!val.length) return;

    var hasUpper  = /[A-Z]/.test(val);
    var hasNum    = /[0-9]/.test(val);
    var hasSymbol = /[^a-zA-Z0-9]/.test(val);
    var score = (val.length >= 6 ? 1 : 0) + (hasUpper || hasNum ? 1 : 0) + (hasSymbol || (hasUpper && hasNum) ? 1 : 0);

    if (score === 1) {
      s1.classList.add("weak");
      lbl.textContent = "Débil"; lbl.style.color = "#ef4444";
    } else if (score === 2) {
      s1.classList.add("medium"); s2.classList.add("medium");
      lbl.textContent = "Media"; lbl.style.color = "#f59e0b";
    } else {
      s1.classList.add("strong"); s2.classList.add("strong"); s3.classList.add("strong");
      lbl.textContent = "Fuerte"; lbl.style.color = "#b8860b";
    }
  }
</script>
</body>
</html>
