<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro — LigaPro Ecuabet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f8f8f6;
      display: flex;
      flex-direction: column;
      font-family: 'Rajdhani', sans-serif;
      color: #0f1410;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 380px;
      background: #ffffff;
      border: 1.5px solid #e8e8e0;
      border-radius: 20px;
      padding: 40px 36px 34px;
      box-shadow: 0 8px 40px rgba(0,0,0,.07);
      animation: cardIn .5s cubic-bezier(.34,1.2,.64,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 30px;
      opacity: 0;
      animation: fadeUp .4s ease .1s forwards;
    }
    .logo-pill {
      background: #0f1410;
      color: #b8860b;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 5px;
    }
    .logo-sep { flex: 1; height: 1px; background: #e8e8e0; }

    .card-header {
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp .4s ease .18s forwards;
    }
    .card-eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #9a9a9a;
      margin-bottom: 6px;
    }
    .card-title {
      font-family: 'Exo 2', sans-serif;
      font-size: 1.9rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #0f1410;
      line-height: 1;
    }
    .card-title span { color: #b8860b; }

    .toast-msg {
      display: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.83rem;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .toast-msg.error {
      display: block;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
    }
    .toast-msg.success {
      display: block;
      background: #fefce8;
      border: 1px solid #fde68a;
      color: #92400e;
    }

    .form-group {
      margin-bottom: 14px;
      opacity: 0;
      animation: fadeUp .4s ease forwards;
    }
    .form-group:nth-child(1) { animation-delay: .24s; }
    .form-group:nth-child(2) { animation-delay: .30s; }

    .form-label {
      display: block;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #9a9a9a;
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }
    .form-input {
      width: 100%;
      background: #f8f8f6;
      border: 1.5px solid #e8e8e0;
      border-radius: 10px;
      padding: 12px 40px 12px 15px;
      font-size: 0.95rem;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      color: #0f1410;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .form-input::placeholder { color: #c0c0b8; }
    .form-input:focus {
      border-color: #b8860b;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(184,134,11,.1);
    }

    /* Ojito para mostrar contraseña */
    .toggle-pass {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9a9a9a;
      font-size: 1rem;
      padding: 2px;
      line-height: 1;
      transition: color .15s;
    }
    .toggle-pass:hover { color: #b8860b; }

    /* Barra de fuerza — 5 segmentos */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    .strength-seg {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: #e8e8e0;
      transition: background .25s;
    }
    .strength-seg.s1 { background: #ef4444; }   /* muy débil */
    .strength-seg.s2 { background: #f97316; }   /* débil */
    .strength-seg.s3 { background: #f59e0b; }   /* media */
    .strength-seg.s4 { background: #84cc16; }   /* buena */
    .strength-seg.s5 { background: #b8860b; }   /* fuerte */

    .strength-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 5px;
    }
    .strength-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1px;
      font-family: 'Exo 2', sans-serif;
    }
    .strength-hint {
      font-size: 0.68rem;
      color: #9a9a9a;
      font-family: 'Exo 2', sans-serif;
      text-align: right;
      max-width: 180px;
    }

    /* Checklist de requisitos */
    .req-list {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .req-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: .5px;
      color: #b0b0b0;
      transition: color .2s;
    }
    .req-item.ok  { color: #b8860b; }
    .req-item.ok .req-icon::before  { content: "✓"; }
    .req-item:not(.ok) .req-icon::before { content: "○"; }
    .req-icon { font-size: .8rem; width: 14px; text-align: center; }

    .btn-submit {
      width: 100%;
      margin-top: 8px;
      background: #0f1410;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 0.85rem;
      font-weight: 800;
      font-family: 'Exo 2', sans-serif;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .18s, transform .18s, box-shadow .18s;
      opacity: 0;
      animation: fadeUp .4s ease .38s forwards;
    }
    .btn-submit:hover {
      background: #b8860b;
      color: #0f1410;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(184,134,11,.22);
    }
    .btn-submit:active { transform: translateY(0); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0 16px;
      opacity: 0;
      animation: fadeUp .4s ease .44s forwards;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e8e8e0;
    }
    .divider span {
      font-size: 0.68rem;
      color: #9a9a9a;
      white-space: nowrap;
      letter-spacing: 1.5px;
      font-family: 'Exo 2', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
    }

    .auth-footer {
      text-align: center;
      font-size: 0.88rem;
      color: #9a9a9a;
      opacity: 0;
      animation: fadeUp .4s ease .5s forwards;
    }
    .auth-footer a {
      color: #b8860b;
      font-weight: 700;
      text-decoration: none;
      transition: color .15s;
    }
    .auth-footer a:hover { color: #8a6508; }

    footer {
      text-align: center;
      padding: 16px;
      font-size: 0.72rem;
      color: #b0b0b0;
      border-top: 1px solid #e8e8e0;
      letter-spacing: 1px;
      font-family: 'Exo 2', sans-serif;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<main>
  <div class="auth-card">
    <div class="card-logo">
      <div class="logo-pill">LigaPro Ecuabet</div>
      <div class="logo-sep"></div>
    </div>
    <div class="card-header">
      <div class="card-eyebrow">Únete a la liga</div>
      <div class="card-title">Crear <span>cuenta</span></div>
    </div>

    <div id="msgBox" class="toast-msg"></div>

    <div class="form-group">
      <label class="form-label" for="username">Usuario</label>
      <div class="input-wrap">
        <input class="form-input" id="username" type="text"
          placeholder="Elige un nombre de usuario"
          autocomplete="username">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Contraseña</label>
      <div class="input-wrap">
        <input class="form-input" id="password" type="password"
          placeholder="Crea una contraseña segura"
          autocomplete="new-password"
          oninput="checkStrength(this.value)">
        <button type="button" class="toggle-pass" onclick="togglePass()" id="toggleBtn" title="Mostrar contraseña">👁</button>
      </div>

      <!-- Barra 5 segmentos -->
      <div class="strength-bar">
        <div class="strength-seg" id="seg1"></div>
        <div class="strength-seg" id="seg2"></div>
        <div class="strength-seg" id="seg3"></div>
        <div class="strength-seg" id="seg4"></div>
        <div class="strength-seg" id="seg5"></div>
      </div>
      <div class="strength-info">
        <div class="strength-label" id="strengthLabel"></div>
        <div class="strength-hint"  id="strengthHint"></div>
      </div>

      <!-- Checklist -->
      <div class="req-list">
        <div class="req-item" id="req-len">
          <span class="req-icon"></span> Mínimo 8 caracteres
        </div>
        <div class="req-item" id="req-upper">
          <span class="req-icon"></span> Al menos 1 mayúscula
        </div>
        <div class="req-item" id="req-num">
          <span class="req-icon"></span> Al menos 1 número
        </div>
        <div class="req-item" id="req-sym">
          <span class="req-icon"></span> Al menos 1 símbolo (!@#$%...)
        </div>
      </div>
    </div>

    <button class="btn-submit" onclick="register()">Crear cuenta →</button>

    <div class="divider"><span>¿Ya eres miembro?</span></div>
    <p class="auth-footer">
      ¿Ya tienes cuenta? <a href="/login.html">Inicia sesión</a>
    </p>
  </div>
</main>

<footer>
  <p>© 2026 LigaPro Ecuabet — Hecho por Judameal</p>
</footer>

<script src="js/app.js"></script>
<script>
  document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") register();
  });

  /* ── TOGGLE MOSTRAR/OCULTAR ── */
  function togglePass() {
    var inp = document.getElementById("password");
    var btn = document.getElementById("toggleBtn");
    if (inp.type === "password") {
      inp.type = "text";
      btn.textContent = "🙈";
    } else {
      inp.type = "password";
      btn.textContent = "👁";
    }
  }

  /* ── FORTALEZA REALISTA ──
     Score basado en:
     - Longitud progresiva
     - Mayúsculas
     - Minúsculas
     - Números
     - Símbolos
     - Penalización por patrones comunes (123, abc, aaaa, etc.)
  ── */
  function checkStrength(val) {
    var segs   = [1,2,3,4,5].map(function(i){ return document.getElementById("seg"+i); });
    var lbl    = document.getElementById("strengthLabel");
    var hint   = document.getElementById("strengthHint");

    // Requisitos
    var hasLen   = val.length >= 8;
    var hasUpper = /[A-Z]/.test(val);
    var hasNum   = /[0-9]/.test(val);
    var hasSym   = /[^a-zA-Z0-9]/.test(val);
    var hasLower = /[a-z]/.test(val);

    setReq("req-len",   hasLen);
    setReq("req-upper", hasUpper);
    setReq("req-num",   hasNum);
    setReq("req-sym",   hasSym);

    // Limpiar barra
    segs.forEach(function(s){ s.className = "strength-seg"; });
    lbl.textContent  = "";
    lbl.style.color  = "";
    hint.textContent = "";

    if (!val.length) return;

    // ── Calcular score (0–100) ──
    var score = 0;

    // Longitud: hasta 30 pts
    if (val.length >= 6)  score += 8;
    if (val.length >= 8)  score += 8;
    if (val.length >= 10) score += 7;
    if (val.length >= 14) score += 7;

    // Variedad de caracteres: hasta 40 pts
    if (hasLower) score += 5;
    if (hasUpper) score += 10;
    if (hasNum)   score += 10;
    if (hasSym)   score += 15;

    // Mezcla de tipos: bonus si tiene 3 o 4 tipos
    var tipos = [hasLower, hasUpper, hasNum, hasSym].filter(Boolean).length;
    if (tipos >= 3) score += 10;
    if (tipos === 4) score += 10;

    // Longitud extra bonus
    if (val.length >= 16) score += 10;

    // ── Penalizaciones ──
    // Secuencias numéricas (123, 321, etc.)
    if (/(?:012|123|234|345|456|567|678|789|890|987|876|765|654|543|432|321|210)/.test(val)) score -= 15;
    // Secuencias de letras (abc, xyz, etc.)
    if (/(?:abc|bcd|cde|def|efg|fgh|ghi|hij|ijk|jkl|klm|lmn|mno|nop|opq|pqr|qrs|rst|stu|tuv|uvw|vwx|wxy|xyz)/i.test(val)) score -= 15;
    // Caracteres repetidos 3+ veces seguidas
    if (/(.)\1{2,}/.test(val)) score -= 10;
    // Contraseñas muy comunes
    var comunes = ["password","contraseña","123456","qwerty","admin","ligapro","haxball","futbol","football","12345678"];
    if (comunes.some(function(c){ return val.toLowerCase().includes(c); })) score -= 25;

    score = Math.max(0, Math.min(100, score));

    // ── Nivel y colores ──
    var nivel, color, hintText, segCls;

    if (score < 20) {
      nivel = "Muy débil";   color = "#ef4444"; segCls = "s1"; hintText = "Demasiado fácil de adivinar";
      segs[0].classList.add(segCls);
    } else if (score < 40) {
      nivel = "Débil";       color = "#f97316"; segCls = "s2"; hintText = "Agrega números o símbolos";
      segs[0].classList.add(segCls); segs[1].classList.add(segCls);
    } else if (score < 60) {
      nivel = "Media";       color = "#f59e0b"; segCls = "s3"; hintText = "Agrega mayúsculas y símbolos";
      segs[0].classList.add(segCls); segs[1].classList.add(segCls); segs[2].classList.add(segCls);
    } else if (score < 80) {
      nivel = "Buena";       color = "#84cc16"; segCls = "s4"; hintText = "Casi perfecta, agrega más caracteres";
      segs.slice(0,4).forEach(function(s){ s.classList.add(segCls); });
    } else {
      nivel = "Fuerte 🔒";   color = "#b8860b"; segCls = "s5"; hintText = "¡Excelente contraseña!";
      segs.forEach(function(s){ s.classList.add(segCls); });
    }

    lbl.textContent  = nivel;
    lbl.style.color  = color;
    hint.textContent = hintText;
    hint.style.color = color;
  }

  function setReq(id, ok) {
    var el = document.getElementById(id);
    if (ok) el.classList.add("ok");
    else    el.classList.remove("ok");
  }
</script>
</body>
</html>
