<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipos — Haxec Esport</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f4f6f8;
      font-family: 'DM Sans', sans-serif;
      color: #111;
    }

    /* BOTÓN VOLVER — esquina superior derecha fijo */
    .back-btn {
      position: fixed;
      top: 18px;
      right: 24px;
      z-index: 100;
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 9px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      cursor: pointer;
      transition: border-color .15s, color .15s;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .back-btn:hover { border-color: #22c55e; color: #22c55e; }

    /* CONTAINER */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 24px;
    }

    /* TITLE */
    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 3px;
      color: #111;
      margin-bottom: 28px;
    }

    /* GRID — 3 columnas fijas */
    .equipos-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    @media (max-width: 700px) {
      .equipos-grid { grid-template-columns: 1fr; }
    }
    @media (min-width: 701px) and (max-width: 960px) {
      .equipos-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* CARD */
    .equipo-card {
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .2s;
    }
    .equipo-card:hover {
      border-color: #22c55e;
      box-shadow: 0 6px 24px rgba(34,197,94,.12);
      transform: translateY(-2px);
    }
    .equipo-card.open {
      border-color: #22c55e;
      box-shadow: 0 6px 24px rgba(34,197,94,.15);
      transform: translateY(-2px);
    }

    /* CARD HEADER */
    .card-header {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1.5px solid transparent;
      transition: border-color .2s;
    }
    .equipo-card.open .card-header {
      border-bottom-color: #e2e8f0;
    }

    .card-logo {
      width: 52px;
      height: 52px;
      object-fit: contain;
      border-radius: 10px;
      background: #f4f6f8;
      padding: 4px;
      flex-shrink: 0;
    }

    .card-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.15rem;
      letter-spacing: 2px;
      color: #111;
    }

    .card-chevron {
      margin-left: auto;
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      color: #bbb;
      transition: transform .25s, color .2s;
    }
    .equipo-card.open .card-chevron {
      transform: rotate(180deg);
      color: #22c55e;
    }

    /* JUGADORES PANEL */
    .card-players {
      max-height: 0;
      overflow: hidden;
      transition: max-height .35s ease;
    }
    .equipo-card.open .card-players {
      max-height: 800px;
    }

    .players-inner {
      padding: 14px 20px 18px;
    }

    .players-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 10px;
    }

    .player-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .player-row:last-child { border-bottom: none; }

    .player-dorsal {
      font-size: 0.9rem;
      color: #22c55e;
      font-weight: 700;
      min-width: 28px;
    }

    .player-name {
      font-size: 0.92rem;
      font-weight: 500;
      color: #222;
    }

    .sin-jugadores {
      font-size: 0.85rem;
      color: #bbb;
      font-style: italic;
      text-align: center;
      padding: 8px 0;
    }

    /* LOADING */
    #loading {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #e2e8f0;
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* EMPTY */
    .empty-state {
      text-align: center;
      padding: 70px 20px;
      color: #bbb;
    }
    .empty-state .empty-icon { font-size: 2.4rem; margin-bottom: 12px; opacity: .5; }
    .empty-state p {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 18px;
      font-size: .75rem;
      color: #fff;
      background: #111;
      margin-top: 48px;
      border-top: 2px solid #22c55e;
    }
  </style>
</head>
<body>

<button class="back-btn" onclick="window.location.href='/haxball.html'">⬅ Volver</button>

<div class="container">

  <h1 class="page-title">Equipos</h1>

  <div id="loading">
    <div class="spinner"></div>
    <p>Cargando equipos...</p>
  </div>

  <div id="equiposGrid" class="equipos-grid" style="display:none;"></div>

  <div id="emptyState" class="empty-state" style="display:none;">
    <div class="empty-icon">🏟️</div>
    <p>No hay equipos registrados</p>
  </div>

</div>

<footer>
  <p>© 2026 Haxec Esport — Hecho por Judameal</p>
</footer>

<script src="js/app.js"></script>
<script>
async function cargarVista() {
  const [resTeams, resJug] = await Promise.all([
    fetch("/api/teams"),
    fetch("/api/jugadores")
  ]);

  const teams     = await resTeams.json();
  const jugadores = await resJug.json();

  document.getElementById("loading").style.display = "none";

  if (!teams.length) {
    document.getElementById("emptyState").style.display = "block";
    return;
  }

  const grid = document.getElementById("equiposGrid");
  grid.style.display = "grid";

  teams.forEach(t => {
    const miembros = jugadores
      .filter(j => j.equipo.toLowerCase() === t.nombre.toLowerCase())
      .sort((a, b) => String(a.dorsal).localeCompare(String(b.dorsal), undefined, { numeric: true }));

    const jugadoresHTML = miembros.length > 0
      ? miembros.map(j => `
          <div class="player-row">
            <span class="player-dorsal">${j.dorsal}</span>
            <span class="player-name">${j.nombre}</span>
          </div>`).join("")
      : `<p class="sin-jugadores">Sin jugadores</p>`;

    const card = document.createElement("div");
    card.className = "equipo-card";
    card.innerHTML = `
      <div class="card-header">
        <img class="card-logo" src="${t.logo || 'img/logo.png'}" alt="${t.nombre}">
        <span class="card-name">${t.nombre}</span>
        <svg class="card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="card-players">
        <div class="players-inner">
          <div class="players-label">Jugadores · ${miembros.length}</div>
          ${jugadoresHTML}
        </div>
      </div>
    `;

    card.addEventListener("click", () => {
      card.classList.toggle("open");
    });

    grid.appendChild(card);
  });
}

cargarVista();
</script>

</body>
</html>
