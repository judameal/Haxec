<!DOCTYPE html>
<html lang="en">
<head>
    <title>Haxec Esport | Stats</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
  <div class="logo">
    <img src="img/logo.png" alt="logo">
    <h1>Haxec Esport</h1>
  </div>

  <div id="nav"></div>
</header>
    <div id="adminPanelBtn"></div>

<script>
const user = JSON.parse(localStorage.getItem("user"));
const nav = document.getElementById("nav");

if (user && user.role === "admin") {
  nav.innerHTML = `
    <button onclick="goAdmin()">Panel de Control</button>
    <button onclick="logout()">Cerrar sesión</button>
  `;
} else {
  nav.innerHTML = `
    <button onclick="logout()">Cerrar sesión</button>
  `;
}

function goAdmin() {
  window.location.href = "/dashboard.html";
}
</script>

  <h1>⚽ Estadísticas Haxball</h1>

  <ul>
    <li>📊 Tabla de posiciones</li>
    <li>⚽ Goleadores</li>
    <li>🎯 Asistencias</li>
    <li>🧤 Vallas invictas</li>
  </ul>


  <script>
    function back() {
      window.location.href = "/dashboard.html";
    }
  </script>
</html>
