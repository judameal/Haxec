<!DOCTYPE html>
<html lang="en">
<head>
    <title>Haxec Esport | Stats</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
  <div class="logo">
    <img src="img/logo.png" alt="Haxec">
    <h1>Haxec <span>Esport</span></h1>
  </div>

  <div id="nav" class="nav-buttons"></div>
</header>
    <div id="adminPanelBtn"></div>

<script>
const user = JSON.parse(localStorage.getItem("user"));
const nav = document.getElementById("nav");

if (user && user.role === "admin") {
  nav.innerHTML = `
    <button onclick="goAdmin()">Panel de Control</button>
    <button onclick="logout()">Cerrar sesión</button>
  `;
} else {
  nav.innerHTML = `
    <button onclick="logout()">Cerrar sesión</button>
  `;
}

function goAdmin() {
  window.location.href = "/dashboard.html";
}
</script>

  <div class="admin-container">

  <h1 class="admin-title">⚽ Estadísticas Haxball</h1>

  <div class="admin-card">

    <div class="stats-grid">
      <div class="stat-item">📊 Tabla de posiciones</div>
      <div class="stat-item">⚽ Goleadores</div>
      <div class="stat-item">🎯 Asistencias</div>
      <div class="stat-item">🧤 Vallas invictas</div>
    </div>

  </div>

</div>

<script src="js/app.js"></script>
  <script>
    function back() {
      window.location.href = "/dashboard.html";
    }
  </script>
</html>
