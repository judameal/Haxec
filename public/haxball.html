<!DOCTYPE html>
<html lang="en">
<head>
    <title>Haxec Esport | Stats</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
  <div class="logo">
    <img src="img/logo.png" alt="Haxec">
    <h1>Haxec <span>Esport</span></h1>
  </div>

  <div id="nav" class="nav-buttons"></div>
</header>
    <div id="adminPanelBtn"></div>

<script>
const user = JSON.parse(localStorage.getItem("user"));
const nav = document.getElementById("nav");

if (user && user.role === "admin") {
  nav.innerHTML = `
    <button onclick="goAdmin()">Panel de Control</button>
    <button onclick="logout()">Cerrar sesión</button>
  `;
} else {
  nav.innerHTML = `
    <button onclick="logout()">Cerrar sesión</button>
  `;
}

function goAdmin() {
  window.location.href = "/dashboard.html";
}
</script>

  <div class="center">

  <div class="main-card">

    <h1 class="main-title">Haxball</h1>
    <p class="main-sub">Selecciona una sección</p>

    <button class="main-btn" onclick="goTabla()">TABLA DE POSICIONES</button>
    <button class="main-btn" onclick="goPartidos()">PARTIDOS</button>
    <button class="main-btn" onclick="goStats()">ESTADÍSTICAS</button>

  </div>

</div>

<footer>
  <p>© 2026 Haxec Esport — Hecho por Judameal</p>
</footer>
<script>
function goTabla() {
  window.location.href = "/tabla.html";
}

function goPartidos() {
  window.location.href = "/partidos.html";
}

function goStats() {
  window.location.href = "/estadisticas.html";
}
</script>
<script src="js/app.js"></script>
  <script>
    function back() {
      window.location.href = "/dashboard.html";
    }
  </script>
</html>
