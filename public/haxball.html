<!DOCTYPE html>
<html lang="en">
<head>
    <title>Haxec Esport | Stats</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
  <div class="logo">
    <img src="img/logo.png" alt="Haxec">
    <h1>Haxec <span>Esport</span></h1>
  </div>

  <div class="nav-buttons">

  <div class="dropdown" id="adminMenu" style="display:none;">
    <button onclick="toggleMenu()">Panel de Control</button>

    <div class="dropdown-content" id="dropdownContent">
      <p class="dropdown-title">Administrar</p>
      <button onclick="goUsuarios()">Usuarios</button>
      <button onclick="goJugadores()">Jugadores</button>
      <button onclick="goTeams()">Equipos</button>
    </div>
  </div>

  <button onclick="logout()">Cerrar sesión</button>

</div>
</header>
    <div id="adminPanelBtn"></div>

<script>
const user = JSON.parse(localStorage.getItem("user"));
const adminMenu = document.getElementById("adminMenu");

if (user && user.role === "admin") {
  adminMenu.style.display = "block";
}

/* 🔽 abrir/cerrar menú */
function toggleMenu() {
  const menu = document.getElementById("dropdownContent");
  menu.classList.toggle("show");
}

/* 🔗 rutas */
function goUsuarios() {
  window.location.href = "/dashboard.html";
}

function goJugadores() {
  window.location.href = "/jugadores.html";
}

function goTeams() {
  window.location.href = "/teams.html";
}
</script>

  <div class="center">

  <div class="main-card">

    <h1 class="main-title">BIENVENIDO</h1>
    <p class="main-sub">Selecciona una sección</p>

    <button class="main-btn" onclick="goTabla()">TABLA DE POSICIONES</button>
    <button class="main-btn" onclick="goPartidos()">PARTIDOS</button>
    <button class="main-btn" onclick="goStats()">ESTADÍSTICAS</button>
    <button class="main-btn" onclick="goVerequipos()">EQUIPOS</button>

  </div>

</div>

<footer>
  <p>© 2026 Haxec Esport — Hecho por Judameal</p>
</footer>
<script>
function goTabla() {
  window.location.href = "/tabla.html";
}

function goPartidos() {
  window.location.href = "/partidos.html";
}

function goStats() {
  window.location.href = "/estadisticas.html";
}
function goVerequipos() {
  window.location.href = "/verequipos.html";
}
</script>
<script src="js/app.js"></script>
  <script>
    function back() {
      window.location.href = "/dashboard.html";
    }
  </script>
</html>
