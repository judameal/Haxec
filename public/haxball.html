<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LigaPro Ecuabet</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .home-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px 80px;
      position: relative;
      z-index: 1;
    }

    .hero-logo-img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 14px;
      opacity: 0;
      animation: fadeUp .5s ease .05s forwards;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,.12));
    }

    .hero-eyebrow {
      font-family: var(--font-head);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeUp .5s ease .1s forwards;
    }

    .hero-title {
      font-family: var(--font-head);
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--black);
      text-align: center;
      line-height: 1;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp .5s ease .2s forwards;
    }

    .hero-title span { color: var(--accent); }

    .hero-sub {
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 1px;
      margin-bottom: 44px;
      opacity: 0;
      animation: fadeUp .5s ease .3s forwards;
    }

    .hero-divider {
      width: 48px;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 0 auto 36px;
      opacity: 0;
      animation: fadeUp .5s ease .28s forwards;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      width: 100%;
      max-width: 600px;
      justify-items: center;
    }

    .menu-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 20px 18px;
      cursor: pointer;
      text-align: left;
      overflow: hidden;
      transition: border-color .22s, transform .22s, box-shadow .22s;
      opacity: 0;
      width: 100%;
      max-width: 200px;
    }

    /* Animaciones escalonadas para todos los botones */
    .menu-btn:nth-child(1) { animation: fadeUp .45s ease .35s forwards; }
    .menu-btn:nth-child(2) { animation: fadeUp .45s ease .42s forwards; }
    .menu-btn:nth-child(3) { animation: fadeUp .45s ease .49s forwards; }
    .menu-btn:nth-child(4) { animation: fadeUp .45s ease .56s forwards; }
    .menu-btn:nth-child(5) { animation: fadeUp .45s ease .63s forwards; }
    .menu-btn:nth-child(6) { animation: fadeUp .45s ease .70s forwards; }
    .menu-btn:nth-child(7) { animation: fadeUp .45s ease .77s forwards; }

    .menu-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      z-index: 0;
      border-radius: inherit;
    }

    .menu-btn:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(34,197,94,.18);
    }

    .menu-btn:hover::after { transform: scaleX(1); }

    .menu-btn:hover .btn-icon,
    .menu-btn:hover .btn-label,
    .menu-btn:hover .btn-desc { color: var(--black); }

    .btn-icon {
      font-size: 1.4rem;
      position: relative;
      z-index: 1;
      transition: color .22s;
    }

    .btn-label {
      font-family: var(--font-head);
      font-size: 0.8rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--black);
      position: relative;
      z-index: 1;
      transition: color .22s;
      line-height: 1;
    }

    .btn-desc {
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      position: relative;
      z-index: 1;
      transition: color .22s;
      line-height: 1.3;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .menu-grid {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 12px;
        max-width: 500px;
      }
    }

    @media (max-width: 480px) {
      .menu-grid {
        grid-template-columns: 1fr;
        max-width: 300px;
        gap: 14px;
      }
      
      .menu-btn {
        max-width: none;
        justify-content: center;
        align-items: center;
        text-align: center;
      }
      
      .btn-icon {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

<div class="hex-mid"></div>

<header>
  <div class="logo">
    <img src="https://assets.football-logos.cc/logos/ecuador/512x512/liga-pro-serie-a.9a546764.png" alt="LigaPro Ecuabet Logo">
    <h1>LigaPro <span>Ecuabet</span></h1>
  </div>

  <div class="nav-buttons">
    <div class="dropdown" id="adminMenu" style="display:none;">
      <button onclick="toggleMenu()">Panel de Control</button>
      <div class="dropdown-content" id="dropdownContent">
        <p class="dropdown-title">Administrar</p>
        <button onclick="goUsuarios()">Usuarios</button>
        <button onclick="goJugadores()">Jugadores</button>
        <button onclick="goTeams()">Equipos</button>
      </div>
    </div>
    <button onclick="logout()">Cerrar sesión</button>
  </div>
</header>

<div class="home-wrap">

  <img
    class="hero-logo-img"
    src="https://assets.football-logos.cc/logos/ecuador/512x512/liga-pro-serie-a.9a546764.png"
    alt="LigaPro Ecuabet"
  >

  <p class="hero-eyebrow">Temporada 1</p>
  <h1 class="hero-title">LigaPro <span>Ecuabet</span></h1>
  <p class="hero-sub">Selecciona una sección para continuar</p>
  <div class="hero-divider"></div>

  <div class="menu-grid">

    <button class="menu-btn" onclick="goTabla()">
      <span class="btn-icon">📋</span>
      <span class="btn-label">Tabla</span>
      <span class="btn-desc">Posiciones de equipos</span>
    </button>

    <button class="menu-btn" onclick="goPartidos()">
      <span class="btn-icon">⚽</span>
      <span class="btn-label">Partidos</span>
      <span class="btn-desc">Jornadas y resultados</span>
    </button>

    <button class="menu-btn" onclick="goStats()">
      <span class="btn-icon">📊</span>
      <span class="btn-label">Estadísticas</span>
      <span class="btn-desc">Números del torneo</span>
    </button>

    <button class="menu-btn" onclick="goVerequipos()">
      <span class="btn-icon">🛡️</span>
      <span class="btn-label">Equipos</span>
      <span class="btn-desc">Ver todos los clubes</span>
    </button>

    <button class="menu-btn" onclick="goVerJugadores()">
      <span class="btn-icon">👤</span>
      <span class="btn-label">Jugadores</span>
      <span class="btn-desc">Cartas y estadísticas</span>
    </button>

    <button class="menu-btn" onclick="goVerCopa()">
      <span class="btn-icon">🏆</span>
      <span class="btn-label">Copa Ecuador</span>
      <span class="btn-desc">Llaves y resultados</span>
    </button>

    <button class="menu-btn" onclick="goVerSupercopa()">
      <span class="btn-icon">⭐</span>
      <span class="btn-label">Supercopa</span>
      <span class="btn-desc">Lo mejor de la liga y copa</span>
    </button>

  </div>

</div>

<footer>
  <p>© 2026 LigaPro Ecuabet — Hecho por Judameal</p>
</footer>

<script src="js/app.js"></script>
<script>
  const user = JSON.parse(localStorage.getItem("user"));
  const adminMenu = document.getElementById("adminMenu");

  if (user && user.role === "admin") {
    adminMenu.style.display = "block";
  }

  function toggleMenu() {
    document.getElementById("dropdownContent").classList.toggle("show");
  }

  function logout() {
    localStorage.removeItem("user");
    window.location.href = "/index.html";
  }

  function goUsuarios()     { window.location.href = "/dashboard.html"; }
  function goJugadores()    { window.location.href = "/jugadores.html"; }
  function goTeams()        { window.location.href = "/teams.html"; }
  function goTabla()        { window.location.href = "/tabla.html"; }
  function goPartidos()     { window.location.href = "/partidos.html"; }
  function goStats()        { window.location.href = "/estadisticas.html"; }
  function goVerequipos()   { window.location.href = "/verequipos.html"; }
  function goVerJugadores() { window.location.href = "/verjugadores.html"; }
  function goVerCopa()      { window.location.href = "/copa.html"; }
  function goVerSupercopa() { window.location.href = "/Supercopa.html"; }
</script>

</body>
</html>
