<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabla de Posiciones — Haxec Esport</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="hex-mid"></div>

<header>
  <div class="logo">
    <img src="img/logo.png" alt="Logo">
    <h1>Haxec <span>Esport</span></h1>
  </div>
</header>

<div class="admin-container">

  <h1 class="admin-title">Tabla de Posiciones</h1>

  <button class="back-btn" onclick="goBack()">← Volver</button>

  <div class="admin-card" style="padding:0;">
    <div class="tabla-wrapper">
      <table id="tabla">
        <thead>
          <tr>
            <th>#</th>
            <th style="text-align:left;padding-left:16px;">Equipo</th>
            <th>PJ</th>
            <th>G</th>
            <th>E</th>
            <th>P</th>
            <th>GF</th>
            <th>GC</th>
            <th>DG</th>
            <th>PTS</th>
            <th>%</th>
          </tr>
        </thead>
        <tbody id="tablaBody">
          <tr>
            <td colspan="11">
              <div class="loading-state">
                <div class="spinner"></div>
                Cargando tabla...
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<footer>
  <p>© 2026 Haxec Esport — Hecho por Judameal</p>
</footer>

<script>
const API = "/api";

function goBack() {
  window.location.href = "/haxball.html";
}

async function cargarTabla() {
  const tbody = document.getElementById("tablaBody");

  try {
    // Traer tabla
    let resTabla = await fetch(API + "/tabla");
    let data = await resTabla.json();

    // Si vacía → inicializar y recargar
    if (!data.length) {
      await fetch(API + "/tabla", { method: "POST" });
      resTabla = await fetch(API + "/tabla");
      data = await resTabla.json();
    }

    // Traer equipos para logos
    const equipos = await fetch(API + "/teams").then(r => r.json());

    // Ordenar: puntos → diferencia de goles → GF
    data.sort((a, b) =>
      (b.PTS - a.PTS) || (b.DG - a.DG) || (b.GF - a.GF)
    );

    tbody.innerHTML = "";

    if (!data.length) {
      tbody.innerHTML = `
        <tr><td colspan="11" style="text-align:center;padding:40px;color:var(--muted);">
          Sin datos aún
        </td></tr>
      `;
      return;
    }

    data.forEach((t, index) => {
      const equipo = equipos.find(e =>
        e.nombre.toLowerCase() === t.equipo.toLowerCase()
      );
      const logo = equipo
        ? `<img src="${equipo.logo}" alt="${t.equipo}" onerror="this.style.display='none'">`
        : "";

      const pj = t.PJ || 0;
      const pts = t.PTS || 0;
      const pct = pj > 0 ? Math.round((pts / (pj * 3)) * 100) : 0;

      // Color posición
      let posColor = "var(--muted)";
      if (index === 0) posColor = "var(--yellow)";
      else if (index === 1) posColor = "var(--accent)";
      else if (index === 2) posColor = "var(--green)";

      const tr = document.createElement("tr");
      tr.style.animation = `fadeUp .3s ease ${index * 0.05}s both`;

      tr.innerHTML = `
        <td style="color:${posColor};font-family:var(--font-head);font-size:1.1rem;font-weight:900;">
          ${index + 1}
        </td>
        <td>
          <div class="equipo-cell">
            ${logo}
            <span style="font-weight:700;">${t.equipo}</span>
          </div>
        </td>
        <td>${pj}</td>
        <td style="color:var(--green);font-weight:700;">${t.G || 0}</td>
        <td>${t.E || 0}</td>
        <td style="color:var(--red);font-weight:700;">${t.P || 0}</td>
        <td>${t.GF || 0}</td>
        <td>${t.GC || 0}</td>
        <td style="color:${(t.DG || 0) >= 0 ? 'var(--green)' : 'var(--red)'}; font-weight:700;">
          ${(t.DG || 0) >= 0 ? '+' : ''}${t.DG || 0}
        </td>
        <td>
          <span class="pts-badge">${pts}</span>
        </td>
        <td>
          <div class="pct-bar-cell">
            <div class="pct-bar" style="width:${pct * 0.5}px; max-width:50px;"></div>
            <span class="pct-text">${pct}%</span>
          </div>
        </td>
      `;

      tbody.appendChild(tr);
    });

  } catch (err) {
    console.error(err);
    tbody.innerHTML = `
      <tr><td colspan="11" style="text-align:center;padding:40px;color:var(--muted);">
        ⚠️ Error al cargar la tabla
      </td></tr>
    `;
  }
}

cargarTabla();
</script>

</body>
</html>
