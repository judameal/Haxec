<!DOCTYPE html>
<html>
<head>
  <title>Tabla de Posiciones</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="img/logo.png">
    <h1>Haxec <span>Esport</span></h1>
  </div>
</header>

<div class="admin-container">

  <h1 class="admin-title">TABLA DE POSICIONES</h1>

  <button class="back-btn" onclick="goBack()">Volver</button>

  <div class="admin-card">
    <table id="tabla">
      <tr>
        <th>#</th>
        <th>Equipo</th>
        <th>PJ</th>
        <th>G</th>
        <th>E</th>
        <th>P</th>
        <th>GF</th>
        <th>GC</th>
        <th>DG</th>
        <th>PTS</th>
        <th>%</th>
      </tr>
    </table>
  </div>

</div>

<footer>
  <p>© 2026 Haxec Esport — Hecho por Judameal</p>
</footer>

<script>
const API = "/api";

if (!data.length) {
  await fetch(API + "/tabla", { method: "POST" });
  location.reload();
}

/* 🔙 */
function goBack() {
  window.location.href = "/haxball.html";
}

/* 📥 cargar tabla REAL */
async function cargarTabla() {

  const resTabla = await fetch(API + "/tabla");
  const data = await resTabla.json();

  const resTeams = await fetch(API + "/teams");
  const equipos = await resTeams.json();

  const tabla = document.getElementById("tabla");

  // 🔥 ordenar por puntos y DG
  data.sort((a,b) =>
    b.PTS - a.PTS || b.DG - a.DG
  );

  data.forEach((t, index) => {

    const equipo = equipos.find(e =>
      e.nombre.toLowerCase() === t.equipo.toLowerCase()
    );

    const logo = equipo ? `<img src="${equipo.logo}" width="25">` : "";

    const porcentaje = t.PJ > 0
      ? ((t.PTS / (t.PJ * 3)) * 100).toFixed(0)
      : 0;

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${index + 1}</td>
      <td style="display:flex; align-items:center; gap:10px;">
        ${logo} ${t.equipo}
      </td>
      <td>${t.PJ || 0}</td>
      <td>${t.G || 0}</td>
      <td>${t.E || 0}</td>
      <td>${t.P || 0}</td>
      <td>${t.GF || 0}</td>
      <td>${t.GC || 0}</td>
      <td>${t.DG || 0}</td>
      <td><strong>${t.PTS || 0}</strong></td>
      <td>${porcentaje}%</td>
    `;

    tabla.appendChild(row);
  });
}

cargarTabla();
</script>

</body>
</html>
