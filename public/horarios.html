<!DOCTYPE html>
<html>

<head>
  <title>Asignar Horario</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <header>
    <div class="logo">
      <img class="hero-logo-img"
        src="https://assets.football-logos.cc/logos/ecuador/512x512/liga-pro-serie-a.9a546764.png"
        alt="LigaPro Ecuabet">
      <h1>LigaPro <span>Ecuabet</span></h1>
    </div>
  </header>

  <div class="admin-container">

    <h1 class="admin-title">ASIGNAR HORARIO</h1>

    <button class="back-btn" onclick="goBack()">⬅ Volver</button>

    <div class="form-card">

      <p id="infoPartido" style="margin-bottom:10px;"></p>

      <input type="date" id="fecha">
      <input type="time" id="hora">

      <button onclick="guardarHorario()">Guardar</button>

    </div>

  </div>

  <footer>
    <p>© 2026 LigaPro Ecuabet — Hecho por Judameal</p>
  </footer>

  <script>
    const API_PARTIDOS = "/api/index?ruta=partidos";

    /* 🔙 VOLVER */
    function goBack() {
      window.location.href = "/partidos.html";
    }

    /* 📥 MOSTRAR INFO DEL PARTIDO */
    async function cargarInfo() {
      const seleccionado = JSON.parse(localStorage.getItem("partidoSeleccionado"));

      if (!seleccionado || !seleccionado.pid) {
        alert("No hay partido seleccionado");
        goBack();
        return;
      }

      try {
        // Cargar todos los partidos y filtrar por _id
        const res = await fetch(API_PARTIDOS);
        const data = await res.json();

        const partido = data.find(p => String(p._id) === String(seleccionado.pid));

        if (!partido) {
          alert("Partido no encontrado en la base de datos");
          goBack();
          return;
        }

        // Guardar el _id en window para usarlo al guardar
        window._partidoId = String(partido._id);

        const local = partido.local?.nombre || "—";
        const visitante = partido.visitante?.nombre || "—";
        const jornada = (partido.jornada ?? 0) + 1;

        document.getElementById("infoPartido").innerHTML = `
          <strong>Jornada ${jornada}: ${local} vs ${visitante}</strong>
        `;

        // 🔥 Pre-cargar horario existente
        if (partido.fecha) document.getElementById("fecha").value = partido.fecha;
        if (partido.hora) document.getElementById("hora").value = partido.hora;

      } catch (err) {
        console.error(err);
        alert("Error al cargar el partido");
        goBack();
      }
    }

    /* 💾 GUARDAR */
    async function guardarHorario() {
      const fecha = document.getElementById("fecha").value;
      const hora = document.getElementById("hora").value;

      if (!fecha || !hora) {
        alert("Completa fecha y hora");
        return;
      }

      if (!window._partidoId) {
        alert("Error: no se pudo identificar el partido");
        return;
      }

      try {
        const res = await fetch(API_PARTIDOS, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            id: window._partidoId,
            soloHorario: true,
            fecha,
            hora
          })
        });

        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.message || "Error desconocido");
        }

        alert("Horario guardado ✅");
        window.location.href = "/partidos.html";

      } catch (err) {
        console.error(err);
        alert("Error al guardar: " + err.message);
      }
    }

    cargarInfo();
  </script>

</body>

</html>
