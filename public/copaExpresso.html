<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copa Expresso | LigaPro Ecuabet</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── ESPECÍFICO COPA EXPRESSO (mismo CSS anterior) ───────── */
    .copa-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      position: relative;
      z-index: 1;
    }

    .copa-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .copa-title {
      font-family: var(--font-head);
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .copa-subtitle {
      font-size: 1.1rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .setup-section {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 40px;
      text-align: center;
    }

    .btn-setup {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: var(--black);
      border: none;
      padding: 16px 40px;
      border-radius: 14px;
      font-family: var(--font-head);
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .3s;
      box-shadow: 0 6px 24px var(--accent-glow);
      margin: 0 8px;
    }

    .btn-setup:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px var(--accent-glow);
    }

    .btn-setup:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    /* ── BRACKETS (igual que antes) ─────────────────────────── */
    .bracket-container {
      display: flex;
      flex-direction: column;
      gap: 60px;
      margin-bottom: 50px;
    }

    .bracket-round {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 40px 80px;
      align-items: center;
      position: relative;
    }

    .bracket-round::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, var(--accent), transparent);
      z-index: 0;
    }

    .match-bracket {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      box-shadow: 0 8px 32px rgba(0,0,0,.08);
      transition: all .3s ease;
      z-index: 1;
    }

    .match-bracket:hover {
      border-color: var(--accent);
      box-shadow: 0 16px 48px var(--accent-glow);
      transform: translateY(-4px);
    }

    .match-round {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: var(--black);
      padding: 4px 12px;
      border-radius: 20px;
      font-family: var(--font-head);
      font-size: 0.7rem;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .match-teams {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 20px;
    }

    .team-bracket {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      background: var(--surface2);
      border-radius: 12px;
      border: 1.5px solid var(--border);
      transition: all .2s;
    }

    .team-bracket:hover {
      border-color: var(--accent);
      background: var(--surface3);
    }

    .team-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .team-logo-bracket {
      width: 40px;
      height: 40px;
      object-fit: contain;
      border-radius: 8px;
    }

    .team-name-bracket {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 1rem;
      color: var(--black);
      letter-spacing: 1px;
    }

    .match-score {
      font-family: var(--font-head);
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--accent);
      min-width: 60px;
      text-align: center;
    }

    .match-status {
      text-align: center;
      margin-top: 12px;
    }

    .status-pending { color: var(--muted); font-size: 0.8rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .status-result { font-family: var(--font-head); font-size: 0.85rem; font-weight: 800; padding: 6px 14px; border-radius: 20px; background: var(--accent); color: var(--black); display: inline-block; }

    .bracket-semis { grid-template-columns: 1fr 120px 1fr; gap: 40px 60px; }
    .bracket-final { grid-template-columns: 1fr; justify-items: center; }
    .final-connector { position: absolute; top: 50%; left: -60px; width: 60px; height: 4px; background: var(--accent); transform: translateY(-50%); }

    /* ── MODAL JUGAR PARTIDO ────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
      opacity: 0;
      visibility: hidden;
      transition: all .3s;
    }

    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .modal-play {
      background: var(--surface);
      border: 2px solid var(--accent);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 24px 80px rgba(0,0,0,.3);
      transform: scale(.9) translateY(20px);
      transition: all .3s;
    }

    .modal-overlay.show .modal-play {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      text-align: center;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 3px solid var(--accent);
    }

    .modal-title {
      font-family: var(--font-head);
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 3px;
      color: var(--black);
      margin-bottom: 8px;
    }

    .teams-play {
      display: grid;
      grid-template-columns: 1fr 80px 1fr;
      gap: 20px;
      align-items: center;
      margin-bottom: 32px;
    }

    .team-play {
      text-align: center;
    }

    .logo-play {
      width: 64px;
      height: 64px;
      object-fit: contain;
      border-radius: 12px;
      margin-bottom: 12px;
      border: 3px solid var(--border);
    }

    .name-play {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--black);
    }

    .score-input {
      width: 100%;
      font-family: var(--font-head);
      font-size: 3rem;
      font-weight: 900;
      text-align: center;
      padding: 20px;
      border: 3px solid var(--border);
      border-radius: 16px;
      background: var(--surface2);
      color: var(--black);
      margin-bottom: 24px;
      transition: all .2s;
    }

    .score-input:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 4px var(--accent-glow);
      outline: none;
    }

    .modal-actions {
      display: flex;
      gap: 16px;
    }

    .btn-confirm {
      flex: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: var(--black);
      border: none;
      padding: 16px 32px;
      border-radius: 14px;
      font-family: var(--font-head);
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .3s;
    }

    .btn-confirm:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px var(--accent-glow);
    }

    .btn-cancel {
      background: transparent;
      border: 2px solid var(--border);
      color: var(--text2);
      padding: 16px 32px;
      border-radius: 14px;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-cancel:hover {
      border-color: var(--red);
      color: var(--red);
    }

    /* ── ESTADÍSTICAS (igual que antes) ─────────────────────── */
    .stats-section {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      margin-top: 50px;
    }

    .stats-header { text-align: center; margin-bottom: 40px; }
    .stats-title {
      font-family: var(--font-head);
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 8px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .stat-leaderboard {
      background: var(--surface2);
      border-radius: 16px;
      padding: 28px;
      border: 1.5px solid var(--border);
    }

    .leaderboard-title {
      font-family: var(--font-head);
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
      text-align: center;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--accent);
    }

    .leaderboard-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: var(--surface);
      border-radius: 12px;
      margin-bottom: 12px;
      border: 1.5px solid var(--border);
      transition: all .2s;
    }

    .leaderboard-item:hover { border-color: var(--accent); transform: translateX(4px); }

    .leader-pos { font-family: var(--font-head); font-size: 1.4rem; font-weight: 900; color: var(--accent); width: 44px; text-align: center; }
    .leader-pos.gold { color: #ffd700; }
    .leader-pos.silver { color: #c0c0c0; }
    .leader-pos.bronze { color: #cd7f32; }

    .leader-team { display: flex; align-items: center; gap: 12px; flex: 1; }
    .leader-logo { width: 36px; height: 36px; object-fit: contain; border-radius: 6px; }
    .leader-name { font-weight: 800; font-size: 1rem; color: var(--black); }
    .leader-stat { font-family: var(--font-head); font-weight: 900; font-size: 1.3rem; color: var(--accent); min-width: 48px; text-align: right; }

    /* ── MOBILE ─────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .bracket-round { grid-template-columns: 1fr; gap: 30px 0; }
      .bracket-round::before { display: none; }
      .bracket-semis { grid-template-columns: 1fr; }
      .final-connector { display: none; }
      .copa-container { padding: 24px 16px 60px; }
      .teams-play { grid-template-columns: 1fr; gap: 16px; text-align: center; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="https://assets.football-logos.cc/logos/ecuador/512x512/liga-pro-serie-a.9a546764.png" alt="LigaPro">
    <h1>Copa <span>Expresso</span></h1>
  </div>
  <div class="nav-buttons">
    <button onclick="window.location.href='index.html'">← Volver</button>
  </div>
</header>

<div class="copa-container">
  
  <!-- SETUP -->
  <div class="setup-section" id="setupSection">
    <h2 style="font-family: var(--font-head); font-size: 1.8rem; font-weight: 900; margin-bottom: 24px; color: var(--black);">
       🏆 Configurar Copa Expresso
    </h2>
    <p style="color: var(--text2); margin-bottom: 32px; font-size: 1.1rem;">
      Selecciona 8 equipos para el torneo de eliminación directa
    </p>
    <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
      <button class="btn-setup" onclick="loadTeams()">📋 Cargar Equipos</button>
      <button class="btn-setup" id="generateBtn" onclick="generateBracket()" disabled>🎲 Generar Bracket</button>
    </div>
    <div id="teamsList" style="margin-top: 24px; display: none;"></div>
  </div>

  <!-- BRACKETS (oculto inicialmente) -->
  <div id="bracketSection" style="display: none;">
    <div class="copa-header">
      <h1 class="copa-title">Copa Expresso</h1>
      <p class="copa-subtitle">Eliminación Directa - 8 Equipos</p>
    </div>

    <div class="bracket-container" id="bracketContainer">
      <!-- Se genera dinámicamente -->
    </div>
  </div>

  <!-- ESTADÍSTICAS (oculto inicialmente) -->
  <div id="statsSection" class="stats-section" style="display: none;">
    <div class="stats-header">
      <h2 class="stats-title">🏆 Estadísticas Copa Expresso</h2>
    </div>
    <div class="stats-grid">
      <div class="stat-leaderboard">
        <h3 class="leaderboard-title">⚽ Goleadores</h3>
        <div id="goleadores"></div>
      </div>
      <div class="stat-leaderboard">
        <h3 class="leaderboard-title">🎯 Asistencias</h3>
        <div id="asistencias"></div>
      </div>
      <div class="stat-leaderboard">
        <h3 class="leaderboard-title">⭐ MVP</h3>
        <div id="mvps"></div>
      </div>
    </div>
  </div>

</div>

<!-- MODAL JUGAR PARTIDO -->
<div class="modal-overlay" id="playModal">
  <div class="modal-play">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Cuartos de Final</h3>
      <div class="teams-play" id="modalTeams">
        <!-- Equipos se cargan dinámicamente -->
      </div>
    </div>
    
    <input type="number" class="score-input" id="scoreLocal" placeholder="0" min="0">
    <span style="font-family: var(--font-head); font-size: 2.5rem; font-weight: 900; color: var(--muted);">VS</span>
    <input type="number" class="score-input" id="scoreVisitante" placeholder="0" min="0">
    
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" onclick="saveMatchResult()">Guardar Resultado</button>
    </div>
  </div>
</div>

<footer>
  <p>© 2025 LigaPro Ecuabet — Copa Expresso</p>
</footer>

<script>
  // ── ESTADO GLOBAL ───────────────────────────────────────────
  let equiposCopa = [];
  let bracket = {
    cuartos: Array(4).fill(null),
    semis: Array(2).fill(null),
    final: null
  };
  let currentMatch = null;

  // ── CARGAR EQUIPOS ──────────────────────────────────────────
  async function loadTeams() {
    try {
      const response = await fetch('/api/teams');
      equiposCopa = await response.json();
      
      showTeamsList();
      document.getElementById('generateBtn').disabled = false;
      
      toast('✅ Equipos cargados correctamente');
    } catch (error) {
      toast('❌ Error cargando equipos', 'error');
      console.error(error);
    }
  }

  function showTeamsList() {
    const container = document.getElementById('teamsList');
    container.innerHTML = `
      <h3 style="font-family: var(--font-head); font-size: 1.2rem; margin-bottom: 20px; color: var(--black);">
        ${equiposCopa.length} Equipos Disponibles:
      </h3>
      <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; max-height: 300px; overflow-y: auto;">
        ${equiposCopa.map((team, i) => `
          <div style="display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--surface2); border-radius: 10px; border: 1.5px solid var(--border);">
            <img src="${team.logo || 'https://via.placeholder.com/40x40/gray/white?text=?'}"
                 alt="${team.nombre}" style="width: 40px; height: 40px; object-fit: contain; border-radius: 6px;">
            <span style="font-weight: 700; flex: 1;">${team.nombre}</span>
          </div>
        `).join('')}
      </div>
    `;
    container.style.display = 'block';
  }

  // ── GENERAR BRACKET ────────────────────────────────────────
  function generateBracket() {
    if (equiposCopa.length < 8) {
      toast('⚠️ Necesitas al menos 8 equipos', 'warning');
      return;
    }

    // Mezclar y tomar 8 equipos
    const shuffled = [...equiposCopa].sort(() => Math.random() - 0.5).slice(0, 8);
    
    // Asignar a cuartos
    bracket.cuartos = [
      { local: shuffled[0], visitante: shuffled[1], score: null, jugado: false },
      { local: shuffled[2], visitante: shuffled[3], score: null, jugado: false },
      { local: shuffled[4], visitante: shuffled[5], score: null, jugado: false },
      { local: shuffled[6], visitante: shuffled[7], score: null, jugado: false }
    ];

    renderBracket();
    document.getElementById('setupSection').style.display = 'none';
    document.getElementById('bracketSection').style.display = 'block';
    
    toast('🎲 Bracket generado correctamente!');
  }

  // ── RENDER BRACKET ────────────────────────────────────────
  function renderBracket() {
    const container = document.getElementById('bracketContainer');
    
    container.innerHTML = `
      <!-- CUARTOS -->
      <div class="bracket-round">
        ${bracket.cuartos.map((match, i) => renderMatchCard(match, i + 1, 'Cuartos')).join('')}
      </div>

      <!-- SEMIS -->
      <div class="bracket-round bracket-semis">
        <div class="match-bracket">
          <div class="match-round">Semis</div>
          <div class="match-teams">
            <div class="team-bracket">
              <div class="team-info">
                <img class="team-logo-bracket" src="${bracket.cuartos[0]?.score ? bracket.cuartos[0].local.logo : ''}" alt="">
                <span class="team-name-bracket">${bracket.cuartos[0]?.score ? bracket.cuartos[0].local.nombre : 'Ganador 1'}</span>
              </div>
              <span class="match-score">-</span>
            </div>
            <div class="team-bracket">
              <div class="team-info">
                <img class="team-logo-bracket" src="${bracket.cuartos[3]?.score ? bracket.cuartos[3].local.logo : ''}" alt="">
                <span class="team-name-bracket">${bracket.cuartos[3]?.score ? bracket.cuartos[3].local.nombre : 'Ganador 4'}</span>
              </div>
              <span class="match-score">-</span>
            </div>
          </div>
          <div class="match-status">
            <div class="status-pending">Pendiente</div>
            <button class="btn-play-match" onclick="playMatch(5)" ${!bracket.cuartos[0]?.score || !bracket.cuartos[3]?.score ? 'disabled' : ''}>Jugar Semifinal</button>
          </div>
        </div>
        <div class="final-connector"></div>
        <div class="match-bracket">
          <div class="match-round">Semis</div>
          <div class="match-teams">
            <div class="team-bracket">
              <div class="team-info">
                <img class="team-logo-bracket" src="${bracket.cuartos[1]?.score ? bracket.cuartos[1].local.logo : ''}" alt="">
                <span class="team-name-bracket">${bracket.cuartos[1]?.score ? bracket.cuartos[1].local.nombre : 'Ganador 2'}</span>
              </div>
              <span class="match-score">-</span>
            </div>
            <div class="team-bracket">
              <div class="team-info">
                <img class="team-logo-bracket" src="${bracket.cuartos[2]?.score ? bracket.cuartos[2].local.logo : ''}" alt="">
                <span class="team-name-bracket">${bracket.cuartos[2]?.score ? bracket.cuartos[2].local.nombre : 'Ganador 3'}</span>
              </div>
              <span class="match-score">-</span>
            </div>
          </div>
          <div class="match-status">
            <div class="status-pending">Pendiente</div>
            <button class="btn-play-match" onclick="playMatch(6)" ${!bracket.cuartos[1]?.score || !bracket.cuartos[2]?.score ? 'disabled' : ''}>Jugar Semifinal</button>
          </div>
        </div>
      </div>

      <!-- FINAL -->
      <div class="bracket-round bracket-final">
        <div class="match-bracket">
          <div class="match-round">🏆 FINAL</div>
          <div class="match-teams">
            <div class="team-bracket">
              <div class="team-info">
                <img class="team-logo-bracket" src="" alt="">
                <span class="team-name-bracket">Ganador Semifinal 1</span>
              </div>
              <span class="match-score">-</span>
            </div>
            <div class="team-bracket">
              <div class="team-info">
                <img class="team-logo-bracket" src="" alt="">
                <span class="team-name-bracket">Ganador Semifinal 2</span>
              </div>
              <span class="match-score">-</span>
            </div>
          </div>
          <div class="match-status">
            <div class="status-pending">Pendiente</div>
            <button class="btn-play-match" onclick="playMatch(7)" disabled>Jugar Final</button>
          </div>
        </div>
      </div>
    `;
  }

  function renderMatchCard(match, matchId, round) {
    const scoreLocal = match?.score?.local || '-';
    const scoreVisitante = match?.score?.visitante || '-';
    const status = match?.jugado ? 'status-result' : 'status-pending';
    const statusText = match?.jugado ? `${scoreLocal}-${scoreVisitante}` : 'Pendiente';
    
    return `
      <div class="match-bracket">
        <div class="match-round">${round}</div>
        <div class="match-teams">
          <div class="team-bracket">
            <div class="team-info">
              <img class="team-logo-bracket" src="${match.local.logo || ''}" alt="${match.local.nombre}">
              <span class="team-name-bracket">${match.local.nombre}</span>
            </div>
            <span class="match-score">${scoreLocal}</span>
          </div>
          <div class="team-bracket">
            <div class="team-info">
              <img class="team-logo-bracket" src="${match.visitante.logo || ''}" alt="${match.visitante.nombre}">
              <span class="team-name-bracket">${match.visitante.nombre}</span>
            </div>
            <span class="match-score">${scoreVisitante}</span>
          </div>
        </div>
        <div class="match-status">
          <div class="${status}">${statusText}</div>
          <button class="btn-play-match" onclick="playMatch(${matchId})" ${match.jugado ? 'disabled' : ''}>
            ${match.jugado ? '✅ Jugado' : 'Jugar Partido'}
          </button>
        </div>
      </div>
    `;
  }

  // ── MODAL PARTIDO ──────────────────────────────────────────
  function playMatch(matchId) {
    currentMatch = { id: matchId };
    document.getElementById('playModal').classList.add('show');
    
    // TODO: Cargar equipos específicos del match
    document.getElementById('modalTitle').textContent = `Partido #${matchId}`;
  }

  function closeModal() {
    document.getElementById('playModal').classList.remove('show');
    document.getElementById('scoreLocal').value = '';
    document.getElementById('scoreVisitante').value = '';
  }

  async function saveMatchResult() {
    const scoreLocal = parseInt(document.getElementById('scoreLocal').value) || 0;
    const scoreVisitante = parseInt(document.getElementById('scoreVisitante').value) || 0;
    
    if (scoreLocal === 0 && scoreVisitante === 0) {
      toast('⚠️ Ingresa al menos un gol', 'warning');
      return;
    }

    try {
      // TODO: POST /api/copaExpresso/partidos
      // { torneo: 'copa_expresso', matchId, scoreLocal, scoreVisitante }
      
      // Simular guardado
      const matchIndex = currentMatch.id - 1;
      if (matchIndex < bracket.cuartos.length) {
        bracket.cuartos[matchIndex].score = { local: scoreLocal, visitante: scoreVisitante };
        bracket.cuartos[matchIndex].jugado = true;
      }
      
      renderBracket();
      closeModal();
      toast('✅ Resultado guardado correctamente');
      
    } catch (error) {
      toast('❌ Error guardando resultado', 'error');
      console.error(error);
    }
  }

  // ── TOAST ──────────────────────────────────────────────────
  function toast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    
    setTimeout(() => {
      toast.remove();
    }, 3000);
  }

  // ── INICIALIZAR ────────────────────────────────────────────
  window.addEventListener('load', () => {
    // Cargar datos existentes si hay

  });
</script>
