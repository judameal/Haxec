<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjetas Rojas — LigaPro Ecuabet</title>
  <meta name="description" content="Jugadores expulsados en la LigaPro Ecuabet por competición.">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .ap-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .admin-title {
      animation: fadeDown .4s ease both;
    }

    .back-btn {
      animation: fadeDown .4s ease .08s both;
    }

    .page-sub {
      color: var(--muted);
      font-size: .88rem;
      margin-bottom: 24px;
      font-weight: 500;
      animation: fadeDown .4s ease .14s both;
    }

    .comp-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeDown .4s ease .18s forwards;
    }

    .comp-tab {
      padding: 9px 20px;
      border-radius: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--muted);
      font-family: var(--font-head);
      font-size: .76rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .2s;
    }

    .comp-tab:hover {
      border-color: #cc2200;
      color: var(--text);
    }

    .comp-tab.active {
      background: #cc2200;
      color: #fff;
      border-color: #cc2200;
      box-shadow: 0 4px 14px rgba(204, 34, 0, .3);
    }

    .warn-note {
      background: rgba(204, 34, 0, .08);
      border-left: 3px solid #cc2200;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .section-block {
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp .45s ease both;
    }

    .section-block:nth-child(1) {
      animation-delay: .22s;
    }

    .section-block:nth-child(2) {
      animation-delay: .34s;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .section-header h2 {
      font-family: var(--font-head);
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--black);
      margin: 0;
      white-space: nowrap;
    }

    .section-header h2 span {
      color: #cc2200;
    }

    .section-line {
      flex: 1;
      height: 1.5px;
      background: var(--border);
    }

    .stats-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .05);
    }

    .stats-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .stats-table thead tr {
      background: #900;
      border-bottom: 2px solid #cc2200;
    }

    .stats-table th {
      padding: 11px 16px;
      font-family: var(--font-head);
      font-size: .7rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .85);
      text-align: left;
    }

    .stats-table th.center {
      text-align: center;
    }

    .stats-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .14s;
    }

    .stats-table tbody tr:last-child {
      border-bottom: none;
    }

    .stats-table tbody tr:hover {
      background: var(--surface2);
    }

    .stats-table td {
      padding: 11px 16px;
      font-size: .9rem;
      font-weight: 500;
      color: var(--text);
      vertical-align: middle;
      background: transparent;
      border-bottom: none;
    }

    .stats-table td.center {
      text-align: center;
    }

    .col-rank {
      width: 50px;
    }

    .rank-num {
      font-family: var(--font-head);
      font-size: .9rem;
      font-weight: 900;
      color: var(--muted);
      display: inline-block;
      width: 28px;
      text-align: center;
    }

    .rank-num.gold {
      color: #f59e0b;
    }

    .rank-num.silver {
      color: #94a3b8;
    }

    .rank-num.bronze {
      color: #b45309;
    }

    .player-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .player-avatar-sm {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
    }

    .avatar-initials-sm {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #900;
      border: 1.5px solid #cc2200;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-size: .68rem;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
    }

    .player-info-name {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: .9rem;
      color: var(--black);
    }

    .player-info-team {
      font-size: .75rem;
      color: var(--muted);
      font-weight: 500;
      margin-top: 1px;
    }

    .col-stat {
      width: 90px;
    }

    .stat-badge {
      display: inline-block;
      background: #cc2200;
      color: #fff;
      font-family: var(--font-head);
      font-weight: 900;
      border-radius: 7px;
      padding: 3px 12px;
      font-size: .9rem;
      min-width: 32px;
      text-align: center;
    }

    .empty-msg {
      text-align: center;
      color: var(--muted);
      padding: 32px 0;
      font-size: .88rem;
      font-family: var(--font-head);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .loading-state {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px;
    }

    .section-panel {
      display: none;
    }

    .section-panel.active {
      display: block;
    }

    @media(max-width:500px) {
      .comp-tabs {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="hex-mid"></div>

  <header>
    <div class="logo">
      <img class="hero-logo-img"
        src="https://assets.football-logos.cc/logos/ecuador/512x512/liga-pro-serie-a.9a546764.png"
        alt="LigaPro Ecuabet">
      <h1>LigaPro <span>Ecuabet</span></h1>
    </div>
  </header>

  <div class="admin-container">
    <div class="ap-title-row">
      <h1 class="admin-title">🟥 Tarjetas Rojas</h1>
      <button class="back-btn" onclick="history.back()">⬅ Volver</button>
    </div>
    <p class="page-sub">Expulsiones · Liga · Copa · Supercopa</p>

    <div class="warn-note">🚨 Jugadores expulsados en cada competición. Tarjeta roja directa.</div>

    <div class="comp-tabs">
      <button class="comp-tab active" id="tab-liga" onclick="switchTab('liga')">📋 Liga</button>
      <button class="comp-tab" id="tab-copa" onclick="switchTab('copa')">🏆 Copa</button>
      <button class="comp-tab" id="tab-supercopa" onclick="switchTab('supercopa')">⭐ Supercopa</button>
      <button class="comp-tab" id="tab-total" onclick="switchTab('total')">📊 Total</button>
    </div>

    <!-- LIGA -->
    <div class="section-panel active" id="panel-liga">
      <div class="section-block">
        <div class="section-header">
          <h2>🟥 Rojas en <span>Liga</span></h2>
          <div class="section-line"></div>
        </div>
        <div class="stats-card">
          <div id="rojas-liga">
            <div class="loading-state">
              <div class="spinner"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- COPA -->
    <div class="section-panel" id="panel-copa">
      <div class="section-block">
        <div class="section-header">
          <h2>🏆 Rojas en <span>Copa</span></h2>
          <div class="section-line"></div>
        </div>
        <div class="stats-card">
          <div id="rojas-copa">
            <div class="loading-state">
              <div class="spinner"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- SUPERCOPA -->
    <div class="section-panel" id="panel-supercopa">
      <div class="section-block">
        <div class="section-header">
          <h2>⭐ Rojas en <span>Supercopa</span></h2>
          <div class="section-line"></div>
        </div>
        <div class="stats-card">
          <div id="rojas-supercopa">
            <div class="loading-state">
              <div class="spinner"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- TOTAL -->
    <div class="section-panel" id="panel-total">
      <div class="section-block">
        <div class="section-header">
          <h2>📊 Rojas <span>totales</span></h2>
          <div class="section-line"></div>
        </div>
        <div class="stats-card">
          <div id="rojas-total">
            <div class="loading-state">
              <div class="spinner"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2026 LigaPro Ecuabet — Hecho por Judameal</p>
  </footer>

  <script>
    function iniciales(n) { return String(n).split(" ").map(p => p[0]).join("").toUpperCase().slice(0, 2); }
    function rankClass(i) { return i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : ""; }
    function rankIcon(i) { return i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : String(i + 1); }

    function switchTab(tab) {
      document.querySelectorAll(".comp-tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".section-panel").forEach(p => p.classList.remove("active"));
      document.getElementById("tab-" + tab).classList.add("active");
      document.getElementById("panel-" + tab).classList.add("active");
    }

    function renderRojas(contId, jugadores, campo) {
      const cont = document.getElementById(contId);
      const lista = jugadores
        .filter(j => (j[campo] || 0) > 0)
        .sort((a, b) => (b[campo] || 0) - (a[campo] || 0));

      if (!lista.length) {
        cont.innerHTML = '<p class="empty-msg">Sin tarjetas rojas. ¡Excelente disciplina!</p>';
        return;
      }

      let filas = "";
      for (let i = 0; i < lista.length; i++) {
        const j = lista[i];
        const avatarHTML = j.foto
          ? `<img class="player-avatar-sm" src="${j.foto}" alt="${j.nombre}">`
          : `<div class="avatar-initials-sm">${iniciales(j.nombre)}</div>`;
        filas += `<tr>
      <td class="col-rank center"><span class="rank-num ${rankClass(i)}">${rankIcon(i)}</span></td>
      <td><div class="player-cell">${avatarHTML}<div>
        <div class="player-info-name">${j.nombre}</div>
        <div class="player-info-team">${j.equipo || "Sin equipo"}</div>
      </div></div></td>
      <td class="col-stat center"><span class="stat-badge">🟥 ${j[campo] || 0}</span></td>
    </tr>`;
      }

      cont.innerHTML = `<table class="stats-table">
    <colgroup><col class="col-rank"><col><col class="col-stat"></colgroup>
    <thead><tr><th class="center">#</th><th>Jugador</th><th class="center">Rojas</th></tr></thead>
    <tbody>${filas}</tbody>
  </table>`;
    }

    async function cargar() {
      try {
        const jugadores = await fetch("/api/index?ruta=jugadores").then(r => r.json());
        renderRojas("rojas-liga", jugadores, "rojas_liga");
        renderRojas("rojas-copa", jugadores, "rojas_copa");
        renderRojas("rojas-supercopa", jugadores, "rojas_supercopa");
        renderRojas("rojas-total", jugadores, "rojas");
      } catch (e) {
        console.error("Error rojas:", e);
      }
    }
    cargar();
  </script>
</body>

</html>
