<!DOCTYPE html>
<html>
<head>
  <title>Equipos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="img/logo.png">
    <h1>Haxec <span>Esport</span></h1>
  </div>
</header>

<div class="admin-container">

  <!-- 🔙 VOLVER ARRIBA -->
  <button class="back-btn" onclick="goBack()">⬅ Volver</button>

  <h1 class="admin-title" style="font-weight:bold; text-transform:uppercase;">
    EQUIPOS
  </h1>

  <!-- 🔵 BOTÓN -->
  <button class="add-btn" onclick="toggleForm()">+ Añadir equipo</button>

  <!-- 📥 FORM -->
  <div id="formTeam" class="form-card" style="display:none;">
    <input id="nombre" placeholder="Nombre del equipo">

    <!-- 📂 SUBIR ARCHIVO -->
    <input type="file" id="logo">

    <input id="local" placeholder="Color local">
    <input id="visitante" placeholder="Color visitante">

    <button onclick="crearEquipo()">Guardar</button>
  </div>

  <!-- 📋 LISTA -->
  <div class="admin-card">
    <table id="tablaTeams">
      <tr>
        <th>Logo</th>
        <th>Nombre</th>
        <th>Local</th>
        <th>Visitante</th>
        <th>Acciones</th>
      </tr>
    </table>
  </div>

</div>

<script>
const API = "/api";

/* 🔽 mostrar form */
function toggleForm() {
  const form = document.getElementById("formTeam");
  form.style.display = form.style.display === "none" ? "block" : "none";
}

/* 📂 convertir imagen a base64 */
function convertirBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
  });
}

/* ➕ crear equipo */
async function crearEquipo() {
  const nombre = document.getElementById("nombre").value;
  const file = document.getElementById("logo").files[0];
  const local = document.getElementById("local").value;
  const visitante = document.getElementById("visitante").value;

  if (!file) {
    alert("Sube un logo");
    return;
  }

  const logo = await convertirBase64(file);

  await fetch(API + "/teams", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ nombre, logo, local, visitante })
  });

  location.reload();
}

/* 📥 cargar equipos */
async function cargarTeams() {
  const res = await fetch(API + "/teams");
  const teams = await res.json();

  const resJug = await fetch("/api/jugadores");
  const jugadores = await resJug.json();

  const tabla = document.getElementById("tablaTeams");

  teams.forEach(t => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td><img src="${t.logo}" width="30"></td>
      <td class="clickable" onclick="toggleEquipo('${t.nombre}', '${t._id}')">
        ${t.nombre}
      </td>
      <td>${t.local}</td>
      <td>${t.visitante}</td>
      <td class="actions">
        <button onclick="eliminar('${t._id}')">Eliminar</button>
      </td>
    `;

    tabla.appendChild(row);

    // 🔽 FILA OCULTA (DETALLE)
    const detailRow = document.createElement("tr");
    detailRow.id = "detalle-" + t._id;
    detailRow.style.display = "none";

    const jugadoresEquipo = jugadores.filter(j =>
      j.equipo.toLowerCase() === t.nombre.toLowerCase()
    );

    detailRow.innerHTML = `
      <td colspan="5">
        <div class="team-detail">

          <img src="${t.logo}" class="team-logo-big">

          <h2>${t.nombre}</h2>

          <h3>Jugadores:</h3>

          ${
            jugadoresEquipo.length > 0
              ? jugadoresEquipo.map(j => `
                  <p>${j.dorsal} - ${j.nombre}</p>
                `).join("")
              : "<p>Sin jugadores</p>"
          }

        </div>
      </td>
    `;

    tabla.appendChild(detailRow);
  });
}

function toggleEquipo(nombre, id) {
  const fila = document.getElementById("detalle-" + id);

  if (fila.style.display === "none") {
    fila.style.display = "table-row";
  } else {
    fila.style.display = "none";
  }
}
/* ❌ eliminar */
async function eliminar(id) {
  await fetch(API + "/teams", {
    method: "DELETE",
    body: JSON.stringify({ id })
  });

  location.reload();
}

/* 🔙 volver */
function goBack() {
  window.location.href = "/haxball.html";
}

cargarTeams();
</script>

</body>
</html>
