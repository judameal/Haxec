<!DOCTYPE html>
<html>
<head>
  <title>Equipos</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .ap-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }
    .color-dot {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      vertical-align: middle;
      margin-right: 6px;
    }
    .color-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.88rem;
      font-weight: 600;
    }
    .form-card label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
      margin-top: 4px;
    }
    .form-card input[type="file"] {
      padding: 8px 12px;
      font-size: 0.88rem;
      cursor: pointer;
    }
    .form-save-btn {
      width: 100%;
      background: var(--black);
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 9px;
      font-family: var(--font-head);
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 6px;
      transition: all .2s;
    }
    .form-save-btn:hover {
      background: var(--accent);
      color: var(--black);
    }
    .team-nombre-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: color .2s;
    }
    .team-nombre-cell:hover { color: var(--accent); }
    .team-nombre-cell img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      border-radius: 5px;
    }
    .expand-arrow {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--muted);
      transition: transform .2s;
    }
    .expand-arrow.open { transform: rotate(180deg); }
    .player-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.82rem;
      font-weight: 600;
      margin: 3px;
    }
    .player-chip .chip-dorsal {
      background: var(--black);
      color: var(--accent);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: var(--font-head);
      font-size: 0.72rem;
      font-weight: 900;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="img/logo.png" alt="Haxec">
    <h1>Haxec <span>Esport</span></h1>
  </div>
</header>

<div class="admin-container">

  <div class="ap-title-row">
    <h1 class="admin-title">Equipos</h1>
    <button class="back-btn" onclick="goBack()">⬅ Volver</button>
  </div>

  <button class="add-btn" onclick="toggleForm()">+ Añadir equipo</button>

  <div id="formTeam" class="form-card" style="display:none; margin-top:16px;">
    <h3>Nuevo equipo</h3>

    <label>Nombre del equipo</label>
    <input id="nombre" placeholder="Ej: Los Cracks FC">

    <label>Logo (imagen)</label>
    <input type="file" id="logo" accept="image/*">

    <label>Color local</label>
    <input id="local" placeholder="Ej: #22c55e o Verde">

    <label>Color visitante</label>
    <input id="visitante" placeholder="Ej: #ffffff o Blanco">

    <button class="form-save-btn" onclick="crearEquipo()">Guardar equipo</button>
  </div>

  <div class="admin-card">
    <table id="tablaTeams">
      <thead>
        <tr>
          <th style="text-align:left; padding-left:16px;">Equipo</th>
          <th>Local</th>
          <th>Visitante</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<footer>
  <p>© 2026 Haxec Esport — Hecho por Judameal</p>
</footer>
<script src="js/app.js"></script>
<script>


function toggleForm() {
  const form = document.getElementById("formTeam");
  form.style.display = form.style.display === "none" ? "block" : "none";
}

function convertirBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
  });
}

async function crearEquipo() {
  const nombre = document.getElementById("nombre").value;
  const file = document.getElementById("logo").files[0];
  const local = document.getElementById("local").value;
  const visitante = document.getElementById("visitante").value;

  if (!nombre || !file) {
    alert("El nombre y el logo son obligatorios");
    return;
  }

  const logo = await convertirBase64(file);

  await fetch(API + "/teams", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ nombre, logo, local, visitante })
  });

  location.reload();
}

async function cargarTeams() {
  const res = await fetch(API + "/teams");
  const teams = await res.json();

  const resJug = await fetch("/api/jugadores");
  const jugadores = await resJug.json();

  const tbody = document.querySelector("#tablaTeams tbody");

  teams.forEach(t => {
    const jugadoresEquipo = jugadores.filter(j =>
      j.equipo.toLowerCase() === t.nombre.toLowerCase()
    );

    const localDot = t.local
      ? `<span class="color-dot" style="background:${t.local};"></span>${t.local}`
      : "—";
    const visitanteDot = t.visitante
      ? `<span class="color-dot" style="background:${t.visitante};"></span>${t.visitante}`
      : "—";

    // Fila principal
    const row = document.createElement("tr");
    row.innerHTML = `
      <td style="padding-left:16px;">
        <div class="team-nombre-cell" onclick="toggleEquipo('${t._id}')">
          <img src="${t.logo}" alt="${t.nombre}">
          <span>${t.nombre}</span>
          <span class="expand-arrow" id="arrow-${t._id}">▼</span>
        </div>
      </td>
      <td><div class="color-cell">${localDot}</div></td>
      <td><div class="color-cell">${visitanteDot}</div></td>
      <td class="actions">
        <button onclick="eliminar('${t._id}')" style="border-color:#ef4444;color:#ef4444;">Eliminar</button>
      </td>
    `;
    tbody.appendChild(row);

    // Fila detalle expandible
    const detailRow = document.createElement("tr");
    detailRow.id = "detalle-" + t._id;
    detailRow.style.display = "none";

    const chipsHTML = jugadoresEquipo.length > 0
      ? jugadoresEquipo.map(j => `
          <span class="player-chip">
            <span class="chip-dorsal">${j.dorsal}</span>
            ${j.nombre}
          </span>`).join("")
      : `<span style="color:var(--muted);font-size:0.88rem;font-style:italic;">Sin jugadores registrados</span>`;

    detailRow.innerHTML = `
      <td colspan="4" style="background:var(--surface2); padding:16px 20px;">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
          <img src="${t.logo}" width="40" style="border-radius:8px;">
          <div>
            <div style="font-family:var(--font-head);font-weight:900;font-size:1rem;letter-spacing:1px;">${t.nombre}</div>
            <div style="font-size:0.78rem;color:var(--muted);">${jugadoresEquipo.length} jugador${jugadoresEquipo.length !== 1 ? 'es' : ''}</div>
          </div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:2px;">
          ${chipsHTML}
        </div>
      </td>
    `;
    tbody.appendChild(detailRow);
  });
}

function toggleEquipo(id) {
  const fila = document.getElementById("detalle-" + id);
  const arrow = document.getElementById("arrow-" + id);
  const abierto = fila.style.display !== "none";
  fila.style.display = abierto ? "none" : "table-row";
  arrow.classList.toggle("open", !abierto);
}

async function eliminar(id) {
  if (!confirm("¿Eliminar este equipo?")) return;
  await fetch(API + "/teams", {
    method: "DELETE",
    body: JSON.stringify({ id })
  });
  location.reload();
}

function goBack() {
  window.location.href = "/haxball.html";
}

cargarTeams();
</script>

</body>
</html>
